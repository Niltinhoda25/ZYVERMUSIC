<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Oficial</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #9d4edd; --bg: #050505; --surface: #121212; --danger: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        #main-content { height: 100vh; overflow-y: auto; padding-bottom: 150px; scrollbar-width: none; }
        #main-content::-webkit-scrollbar { display: none; }

        header { padding: 25px 15px; background: linear-gradient(to bottom, #151515, var(--bg)); display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: -1.5px; }
        .logo span { color: var(--accent); }

        .top-buttons { display: flex; gap: 10px; padding: 0 15px 15px; }
        .btn-header { flex: 1; padding: 15px; border-radius: 20px; background: #1a1a1a; border: 1px solid #333; font-weight: 800; font-size: 12px; text-transform: uppercase; cursor: pointer; text-align: center; }
        .btn-header.active { background: var(--accent); border: none; }

        .section-title { padding: 15px 15px 10px; font-size: 14px; font-weight: 900; color: #ff7a00; text-transform: uppercase; }
        
        .ranking-wrapper { display: flex; overflow-x: auto; gap: 15px; padding: 0 15px 25px; scrollbar-width: none; }
        .rank-card { min-width: 280px; background: var(--surface); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #222; }
        .rank-card img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        
        .lista-geral { display: flex; flex-direction: column; padding: 0 12px; }
        .item-card { display: flex; align-items: center; padding: 12px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .item-card img { width: 55px; height: 55px; border-radius: 10px; margin-right: 15px; object-fit: cover; }

        /* MODO TIKTOK CLIPES */
        #tiktok-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; overflow-y: scroll; snap-type: y mandatory; }
        .clip-section { width: 100%; height: 100%; position: relative; snap-align: start; flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .clip-ui { position: absolute; bottom: 40px; left: 20px; right: 80px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .clip-btns { position: absolute; bottom: 60px; right: 15px; display: flex; flex-direction: column; gap: 20px; }
        .c-btn { width: 50px; height: 50px; border-radius: 50%; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .close-clips { position: fixed; top: 30px; left: 20px; z-index: 6000; font-size: 24px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 50%; cursor: pointer; }

        #player { position: fixed; bottom: 15px; left: 12px; right: 12px; background: rgba(20,20,20,0.95); backdrop-filter: blur(20px); padding: 15px; border-radius: 25px; display: none; align-items: center; gap: 15px; z-index: 3000; border: 1px solid #333; }
        .p-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="tiktok-container">
        <i class="fa fa-arrow-left close-clips" onclick="fecharClipes()"></i>
        <div id="clips-feed"></div>
    </div>

    <div id="main-content">
        <header><div class="logo">ZYVER<span>MUSIC</span></div></header>

        <div class="top-buttons">
            <div class="btn-header" onclick="abrirMinhaPlaylist()"><i class="fa fa-heart"></i> Playlist</div>
            <div class="btn-header active" onclick="abrirClipes()"><i class="fa fa-video"></i> Clipes</div>
        </div>

        <div class="section-title">🔥 Mais Tocadas</div>
        <div id="top-10" class="ranking-wrapper"></div>
        
        <div class="section-title" id="lib-name" style="color:white">Biblioteca</div>
        <div id="grid-geral" class="lista-geral"></div>
    </div>

    <div id="player">
        <img id="p-img" class="p-img" src="">
        <div style="flex:1; overflow:hidden;">
            <h5 id="p-name" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h5>
        </div>
        <div onclick="togglePlay()" style="cursor:pointer; padding: 10px;">
            <i class="fa fa-pause" id="play-icon" style="font-size:28px;"></i>
        </div>
        <audio id="audio-engine"></audio>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        let allMusics = [];
        let allClips = [];
        let userPlaylist = JSON.parse(localStorage.getItem('zyver_playlist')) || [];

        const audio = document.getElementById('audio-engine');
        const pImg = document.getElementById('p-img');

        async function init() {
            const [mSnap, cSnap] = await Promise.all([getDocs(collection(db, "musics")), getDocs(collection(db, "clips"))]);
            allMusics = mSnap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
            allClips = cSnap.docs.map(d => ({id: d.id, ...d.data()}));

            renderTop(allMusics);
            renderList(allMusics);
        }

        window.abrirClipes = () => {
            const feed = document.getElementById('clips-feed');
            feed.innerHTML = allClips.map(c => `
                <div class="clip-section">
                    <video src="${c.url}" loop playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                    <div class="clip-ui"><h3>${c.title}</h3></div>
                    <div class="clip-btns">
                        <div class="c-btn" onclick="this.style.color='#ff4444'"><i class="fa fa-heart"></i></div>
                        <div class="c-btn" onclick="compartilhar('Assista esse clipe na Zyver!')"><i class="fa fa-share"></i></div>
                    </div>
                </div>
            `).join('');
            document.getElementById('tiktok-container').style.display = 'block';
            if(!audio.paused) audio.pause();
            setTimeout(() => { document.querySelector('video')?.play(); }, 300);
        };

        window.fecharClipes = () => {
            document.getElementById('tiktok-container').style.display = 'none';
            document.querySelectorAll('video').forEach(v => v.pause());
        };

        window.toggleFav = (id) => {
            const music = allMusics.find(m => m.id === id);
            const index = userPlaylist.findIndex(p => p.id === id);
            if(index > -1) {
                userPlaylist.splice(index, 1);
            } else {
                userPlaylist.push(music);
            }
            localStorage.setItem('zyver_playlist', JSON.stringify(userPlaylist));
            alert("Favoritos atualizados!");
        };

        window.abrirMinhaPlaylist = () => {
            if(userPlaylist.length === 0) return alert("Sua playlist está vazia!");
            document.getElementById('lib-name').innerText = "Favoritos ❤️";
            renderList(userPlaylist);
        };

        window.compartilhar = (txt) => {
            if (navigator.share) {
                navigator.share({ title: 'ZyverMusic', text: txt, url: window.location.href });
            } else {
                alert("Link pronto para compartilhar!");
            }
        };

        window.play = async (id, url, n, i) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-name').innerText = n;
            pImg.src = i;
            audio.src = url;
            audio.play();
            updateDoc(doc(db, "musics", id), { plays: increment(1) }).catch(e => {});
        };

        window.togglePlay = () => {
            if(audio.paused) { audio.play(); document.getElementById('play-icon').className = 'fa fa-pause'; }
            else { audio.pause(); document.getElementById('play-icon').className = 'fa fa-play'; }
        };

        function renderTop(data) {
            const top = [...data].sort((a,b) => (b.plays || 0) - (a.plays || 0)).slice(0, 10);
            document.getElementById('top-10').innerHTML = top.map((m, i) => `
                <div class="rank-card" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <img src="${m.cover}">
                    <div style="overflow:hidden"><h3 style="font-size:14px;">#${i+1} ${m.title}</h3></div>
                </div>`).join('');
        }

        function renderList(data) {
            document.getElementById('grid-geral').innerHTML = data.map(m => `
                <div class="item-card">
                    <img src="${m.cover}" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <div style="flex:1" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')">
                        <h4 style="font-size:15px;">${m.title}</h4>
                    </div>
                    <i class="fa fa-heart" style="margin-right:15px; color:#444" onclick="toggleFav('${m.id}'); this.style.color='#9d4edd'"></i>
                    <i class="fa fa-share" onclick="compartilhar('Ouça: ${m.title}')"></i>
                </div>`).join('');
        }

        init();
    </script>
</body>
</html>
