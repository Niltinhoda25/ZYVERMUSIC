<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZyverMusic | v8.9 Elite 8051%</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22ZyverMusic%22,%22short_name%22:%22Zyver%22,%22display%22:%22standalone%22,%22background_color%22:%22#121212%22,%22theme_color%22:%22#1DB954%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/3844/3844724.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <script>
        (function(s){
            s.dataset.zone='10697810';
            s.src='https://nap5k.com/tag.min.js';
        })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --sp-green: #1DB954; 
            --sp-black: #121212;
            --sp-light: #181818;
            --sp-gray: #b3b3b3;
        }

        /* TRAVA DE TELA E RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Figtree', sans-serif; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; touch-action: pan-y; }

        #scroller {
            height: 100vh; width: 100%; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 280px; scrollbar-width: none;
            background: linear-gradient(to bottom, #222 0%, #121212 40%);
            -webkit-overflow-scrolling: touch;
        }
        #scroller::-webkit-scrollbar { display: none; }

        header { padding: 50px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: -1.5px; color: white; }
        .logo span { color: var(--sp-green); }

        .search-area { margin: 15px 20px 25px; position: relative; }
        .search-area input {
            width: 100%; background: #fff; border: none; padding: 16px 45px;
            border-radius: 4px; font-size: 15px; font-weight: 700; color: #000;
        }
        .search-area i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #555; }

        .section-title { padding: 15px 20px; font-size: 22px; font-weight: 800; color: white; }

        /* GRID HORIZONTAL */
        .h-grid { display: flex; overflow-x: auto; padding: 10px 20px; gap: 16px; scrollbar-width: none; }
        .h-grid::-webkit-scrollbar { display: none; }
        .card { min-width: 150px; background: var(--sp-light); padding: 12px; border-radius: 8px; }
        .card img { width: 126px; height: 126px; border-radius: 4px; object-fit: cover; }
        .card b { display: block; margin-top: 12px; font-size: 13px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* LISTA COM BOTÃO ADICIONAR (+) */
        .track-row { display: flex; align-items: center; padding: 10px 20px; transition: 0.2s; }
        .track-row:active { background: rgba(255,255,255,0.1); }
        .track-img { width: 50px; height: 50px; border-radius: 4px; margin-right: 15px; object-fit: cover; }
        .track-info { flex: 1; overflow: hidden; color: white; } /* CORREÇÃO: TEXTO BRANCO */
        .track-info b { font-size: 16px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-info span { font-size: 13px; color: var(--sp-gray); }
        .add-to-pl { color: var(--sp-gray); font-size: 20px; padding: 10px; }

        /* PLAYER */
        #player {
            position: fixed; bottom: 95px; left: 8px; right: 8px;
            background: #282828; border-radius: 8px; padding: 8px 12px;
            display: none; align-items: center; gap: 12px; z-index: 6000;
        }
        .p-img { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; }
        .p-info { flex: 1; overflow: hidden; color: white; }
        .p-info b { font-size: 13px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-info span { font-size: 11px; color: var(--sp-green); font-weight: 700; }

        /* NAV */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: #000; display: flex; justify-content: space-around; padding-top: 12px; z-index: 5000;
        }
        .nav-item { color: var(--sp-gray); text-align: center; flex: 1; }
        .nav-item.active { color: white; }
        .nav-item i { font-size: 24px; margin-bottom: 4px; }
        .nav-item span { display: block; font-size: 10px; font-weight: 600; }

        /* MODAIS - CORREÇÃO DE TEXTO BRANCO */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 9999; display: none; flex-direction: column;
            padding: 50px 20px; color: white; /* GARANTE LETRAS BRANCAS */
        }
        .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-green {
            background: var(--sp-green); color: black; border: none; padding: 18px;
            border-radius: 50px; font-weight: 900; font-size: 16px; margin-top: 20px;
        }
        .pl-select-item { 
            padding: 15px; background: var(--sp-light); margin-bottom: 10px; 
            border-radius: 8px; font-weight: 700; color: white; /* LETRAS BRANCAS NAS PLAYLISTS */
        }

        /* FULLSCREEN */
        .fs-btn { font-size: 20px; color: white; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="modal-lib" class="modal">
        <div class="modal-head">
            <h2 style="font-size: 24px;">Sua Biblioteca</h2>
            <i class="fa fa-times fa-2x" onclick="fecharM('modal-lib')"></i>
        </div>
        <div id="lib-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="modal-create" class="modal">
        <div class="modal-head">
            <h2>Criar Playlist</h2>
            <i class="fa fa-times fa-2x" onclick="fecharM('modal-create')"></i>
        </div>
        <input type="text" id="pl-name-input" placeholder="Nome da playlist" style="width:100%; background:#333; border:none; padding:15px; border-radius:4px; color:white; margin-bottom:20px; font-size: 16px;">
        <div id="selection-list" style="overflow-y:auto; flex:1;"></div>
        <button class="btn-green" onclick="salvarNovaPL()">CRIAR PLAYLIST CLOUD</button>
    </div>

    <div id="modal-add-to" class="modal">
        <div class="modal-head">
            <h2>Adicionar à playlist</h2>
            <i class="fa fa-times fa-2x" onclick="fecharM('modal-add-to')"></i>
        </div>
        <div id="my-playlists-options" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="scroller">
        <header>
            <div class="logo">Zyver<span>Music</span></div>
            <i class="fa fa-expand fs-btn" onclick="toggleFullScreen()"></i>
        </header>

        <div class="search-area">
            <i class="fa fa-search"></i>
            <input type="text" id="search-input" placeholder="O que você quer ouvir?" oninput="filtrarMusicas()">
        </div>

        <div class="section-title">Feito para você</div>
        <div id="top-row" class="h-grid"></div>

        <div class="section-title" style="margin-top:20px;">Músicas recomendadas</div>
        <div id="main-list"></div>
    </div>

    <div id="player">
        <img id="p-img" class="p-img" src="">
        <div class="p-info">
            <b id="p-title">...</b>
            <span id="p-status">Tocando de Zyver Cloud</span>
        </div>
        <div style="display:flex; align-items:center; gap:20px; color:white;">
            <i class="fa fa-forward-step" onclick="proxima()" style="color:#b3b3b3;"></i>
            <i class="fa fa-play" id="p-play-icon" onclick="toggleP()" style="font-size:26px;"></i>
        </div>
        <audio id="audio-core"></audio>
    </div>

    <nav>
        <div class="nav-item active" onclick="location.reload()"><i class="fa fa-house"></i><span>Início</span></div>
        <div class="nav-item" onclick="abrirM('modal-create')"><i class="fa fa-plus-square"></i><span>Criar</span></div>
        <div class="nav-item" onclick="carregarBiblioteca()"><i class="fa fa-book-open"></i><span>Biblioteca</span></div>
    </nav>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, addDoc, doc, getDoc, updateDoc, increment, query, orderBy, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let todasMusicas = [], selecionadasParaNova = [], musicaParaAdicionar = null;
        const playerAudio = document.getElementById('audio-core');

        async function init() {
            const snap = await getDocs(query(collection(db, "musics"), orderBy("plays", "desc")));
            todasMusicas = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
            
            const plId = new URLSearchParams(window.location.search).get('pl');
            if(plId) {
                const plSnap = await getDoc(doc(db, "playlists", plId));
                if(plSnap.exists()) renderizarLista(plSnap.data().musicas);
            } else {
                renderizarLista(todasMusicas);
            }
            renderizarTop();
        }

        function renderizarLista(dados) {
            document.getElementById('main-list').innerHTML = dados.map(m => `
                <div class="track-row">
                    <img class="track-img" src="${m.cover}" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <div class="track-info" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')">
                        <b>${m.title}</b>
                        <span>Música • Zyver</span>
                    </div>
                    <i class="fa fa-plus add-to-pl" onclick="prepararAdicao('${m.id}')"></i>
                </div>
            `).join('');
        }

        function renderizarTop() {
            document.getElementById('top-row').innerHTML = todasMusicas.slice(0, 10).map(m => `
                <div class="card" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <img src="${m.cover}">
                    <b>${m.title}</b>
                </div>
            `).join('');
        }

        window.tocar = (id, url, title, img) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-img').src = img;
            playerAudio.src = url; playerAudio.play();
            document.getElementById('p-play-icon').className = 'fa fa-pause';
            updateDoc(doc(db, "musics", id), { plays: increment(1) });
        };

        window.toggleP = () => {
            if(playerAudio.paused) { playerAudio.play(); document.getElementById('p-play-icon').className = 'fa fa-pause'; }
            else { playerAudio.pause(); document.getElementById('p-play-icon').className = 'fa fa-play'; }
        };

        playerAudio.onended = () => proxima();
        window.proxima = () => {
            const r = todasMusicas[Math.floor(Math.random() * todasMusicas.length)];
            tocar(r.id, r.url, r.title, r.cover);
        };

        // LÓGICA DE BIBLIOTECA E PLAYLISTS
        window.carregarBiblioteca = async () => {
            abrirM('modal-lib');
            const snap = await getDocs(collection(db, "playlists"));
            document.getElementById('lib-list').innerHTML = snap.docs.map(d => `
                <div class="track-row">
                    <div class="track-info" onclick="window.location.href='?pl=${d.id}'">
                        <b>${d.data().nome || 'Sem Nome'}</b>
                        <span>${d.data().musicas ? d.data().musicas.length : 0} músicas</span>
                    </div>
                    <i class="fa fa-share-nodes" onclick="copiarLink('${d.id}')" style="color:var(--sp-green); font-size:20px;"></i>
                </div>
            `).join('');
        };

        window.prepararAdicao = async (idMusica) => {
            musicaParaAdicionar = todasMusicas.find(m => m.id === idMusica);
            abrirM('modal-add-to');
            const snap = await getDocs(collection(db, "playlists"));
            document.getElementById('my-playlists-options').innerHTML = snap.docs.map(d => `
                <div class="pl-select-item" onclick="confirmarAdicao('${d.id}')">
                    ${d.data().nome || 'Sem Nome'}
                </div>
            `).join('');
        };

        window.confirmarAdicao = async (idPlaylist) => {
            await updateDoc(doc(db, "playlists", idPlaylist), {
                musicas: arrayUnion(musicaParaAdicionar)
            });
            alert("Música adicionada à playlist!");
            fecharM('modal-add-to');
        };

        window.salvarNovaPL = async () => {
            const nome = document.getElementById('pl-name-input').value;
            if(!nome || selecionadasParaNova.length === 0) return alert("Dê um nome e selecione músicas!");
            const lista = todasMusicas.filter(m => selecionadasParaNova.includes(m.id));
            const docRef = await addDoc(collection(db, "playlists"), { nome, musicas: lista });
            prompt("Playlist criada! Link:", window.location.origin + window.location.pathname + "?pl=" + docRef.id);
            fecharM('modal-create');
        };

        window.marcarParaPL = (id) => {
            const el = document.getElementById(`sel-${id}`);
            if(selecionadasParaNova.includes(id)) {
                selecionadasParaNova = selecionadasParaNova.filter(x => x !== id);
                el.style.background = "none";
            } else {
                selecionadasParaNova.push(id);
                el.style.background = "rgba(29, 185, 84, 0.3)";
            }
        };

        // UI HELPERS
        window.abrirM = (id) => {
            document.getElementById(id).style.display = 'flex';
            if(id === 'modal-create') {
                document.getElementById('selection-list').innerHTML = todasMusicas.map(m => `
                    <div class="track-row" id="sel-${m.id}" onclick="marcarParaPL('${m.id}')">
                        <img class="track-img" src="${m.cover}">
                        <div class="track-info"><b>${m.title}</b></div>
                    </div>
                `).join('');
            }
        };
        window.fecharM = (id) => document.getElementById(id).style.display = 'none';
        window.filtrarMusicas = () => {
            const v = document.getElementById('search-input').value.toLowerCase();
            renderizarLista(todasMusicas.filter(m => m.title.toLowerCase().includes(v)));
        };
        window.copiarLink = (id) => {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?pl=" + id);
            alert("Link copiado!");
        };
        window.toggleFullScreen = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };

        init();
    </script>
</body>
</html>
