<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyverMusic | Explore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#09090b] text-zinc-100 font-sans min-h-screen pb-32">

    <nav class="flex justify-between items-center p-6 border-b border-zinc-800 sticky top-0 bg-[#09090b]/90 backdrop-blur-md z-50">
        <h1 class="text-2xl font-black tracking-tighter text-indigo-500">ZYVER<span class="text-white">MUSIC</span></h1>
        <a href="admin.html" class="text-[10px] uppercase tracking-widest text-zinc-600 hover:text-indigo-400 transition">Painel Admin</a>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <header class="mb-10">
            <h2 class="text-4xl font-bold">Descobrir</h2>
            <p class="text-zinc-500">As melhores tracks selecionadas para você.</p>
        </header>
        
        <div id="music-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
            </div>
    </main>

    <div id="player-bar" class="fixed bottom-0 left-0 w-full bg-zinc-950/95 border-t border-zinc-800 p-4 transform translate-y-full transition-all duration-500 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            
            <div class="flex items-center gap-4 w-full md:w-1/3">
                <img id="player-img" src="" class="w-14 h-14 rounded-lg object-cover shadow-2xl border border-zinc-800">
                <div class="overflow-hidden">
                    <p id="player-title" class="font-bold truncate"></p>
                    <p class="text-xs text-zinc-500">ZyverMusic Player</p>
                </div>
            </div>

            <div class="flex flex-col items-center gap-2 w-full md:w-1/3">
                <div class="flex items-center gap-8">
                    <button id="play-pause-btn" class="bg-white text-black w-12 h-12 rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition">
                        <i class="fas fa-play text-lg"></i>
                    </button>
                </div>
                <div class="flex items-center gap-3 w-full">
                    <span id="current-time" class="text-[10px] text-zinc-500 font-mono">0:00</span>
                    <div class="relative w-full h-1 bg-zinc-800 rounded-full overflow-hidden">
                        <div id="progress-fill" class="absolute top-0 left-0 h-full bg-indigo-500 w-0"></div>
                    </div>
                    <span id="duration-time" class="text-[10px] text-zinc-500 font-mono">0:00</span>
                </div>
            </div>

            <div class="hidden md:flex items-center justify-end gap-3 w-1/3">
                <i class="fas fa-volume-up text-zinc-500 text-sm"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" class="w-24 accent-indigo-500 h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>
    <script type="module" src="app.js"></script>
</body>
</html>
