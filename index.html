<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyverMusic | Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#09090b] text-zinc-100 font-sans min-h-screen pb-40">

    <nav class="flex flex-col md:flex-row justify-between items-center p-6 border-b border-zinc-800 sticky top-0 bg-[#09090b]/90 backdrop-blur-md z-50 gap-4">
        <h1 class="text-2xl font-black tracking-tighter text-indigo-500">ZYVER<span class="text-white">MUSIC</span></h1>
        
        <div class="relative w-full md:w-96">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
            <input type="text" id="search-input" placeholder="O que queres ouvir hoje?" class="w-full bg-zinc-900 border border-zinc-800 py-2 pl-12 pr-4 rounded-full outline-none focus:border-indigo-500 transition">
        </div>

        <a href="admin.html" class="text-[10px] uppercase tracking-widest text-zinc-600 hover:text-indigo-400">Admin</a>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-4 flex gap-3 overflow-x-auto no-scrollbar">
        <button onclick="filterCategory('all')" class="category-btn active px-6 py-1.5 rounded-full bg-zinc-800 text-sm font-bold border border-zinc-700 hover:bg-indigo-600 transition">Tudo</button>
        <button onclick="filterCategory('Trap')" class="category-btn px-6 py-1.5 rounded-full bg-zinc-800 text-sm font-bold border border-zinc-700 hover:bg-indigo-600 transition">Trap</button>
        <button onclick="filterCategory('Funk')" class="category-btn px-6 py-1.5 rounded-full bg-zinc-800 text-sm font-bold border border-zinc-700 hover:bg-indigo-600 transition">Funk</button>
        <button onclick="filterCategory('Hip Hop')" class="category-btn px-6 py-1.5 rounded-full bg-zinc-800 text-sm font-bold border border-zinc-700 hover:bg-indigo-600 transition">Hip Hop</button>
    </div>

    <main class="max-w-7xl mx-auto p-6">
        <div id="music-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
            </div>
    </main>

    <div id="player-bar" class="fixed bottom-0 left-0 w-full bg-zinc-950/95 border-t border-zinc-800 p-4 transform translate-y-full transition-all duration-500 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4 w-full md:w-1/3">
                <img id="player-img" src="" class="w-14 h-14 rounded-lg object-cover shadow-2xl border border-zinc-800">
                <div class="overflow-hidden text-left">
                    <p id="player-title" class="font-bold truncate text-sm"></p>
                    <p id="player-category" class="text-[10px] text-indigo-400 font-bold uppercase"></p>
                </div>
            </div>
            <div class="flex flex-col items-center gap-2 w-full md:w-1/3">
                <button id="play-pause-btn" class="bg-white text-black w-12 h-12 rounded-full flex items-center justify-center hover:scale-110 transition"><i class="fas fa-play"></i></button>
                <div class="flex items-center gap-3 w-full text-[10px] font-mono">
                    <span id="current-time">0:00</span>
                    <div class="relative w-full h-1 bg-zinc-800 rounded-full cursor-pointer overflow-hidden" id="progress-container">
                        <div id="progress-fill" class="absolute top-0 left-0 h-full bg-indigo-500 w-0"></div>
                    </div>
                    <span id="duration-time">0:00</span>
                </div>
            </div>
            <div class="hidden md:flex items-center justify-end gap-6 w-1/3">
                <a id="download-link" href="#" download class="text-zinc-500 hover:text-white transition" title="Baixar Música">
                    <i class="fas fa-download"></i>
                </a>
                <i class="fas fa-volume-up text-zinc-500 text-sm"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" class="w-24 accent-indigo-500 h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>
    <script type="module" src="app.js"></script>
</body>
</html>
