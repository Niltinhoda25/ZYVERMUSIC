<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Oficial</title>

    <script>
        function carregarAnuncioSutil() {
            const agora = Date.now();
            const ultimoAnuncio = localStorage.getItem('last_ad_time') || 0;
            if (agora - ultimoAnuncio > 45000) { 
                (function(s){
                    s.dataset.zone='10697810';
                    s.src='https://nap5k.com/tag.min.js';
                    localStorage.setItem('last_ad_time', Date.now());
                })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
            }
        }
        carregarAnuncioSutil();
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #9d4edd; --bg: #050505; --surface: #121212; --success: #2ecc71; --danger: #e74c3c; --share: #3498db; --whats: #25d366; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        #main-content { height: 100vh; overflow-y: auto; padding-bottom: 240px; scrollbar-width: none; }
        #main-content::-webkit-scrollbar { display: none; }

        header { padding: 20px 15px; background: #000; display: flex; flex-direction: column; gap: 15px; position: sticky; top: 0; z-index: 1000; }
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 22px; font-weight: 900; text-transform: uppercase; }
        .logo span { color: var(--accent); }

        /* BARRA DE PESQUISA */
        .search-container { position: relative; width: 100%; }
        .search-input { width: 100%; background: #151515; border: 1px solid #333; padding: 12px 15px 12px 40px; border-radius: 12px; color: white; font-size: 14px; outline: none; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; }

        .btn-nav { background: #1a1a1a; color: white; padding: 10px 15px; border-radius: 20px; border: 1px solid #333; font-weight: 800; font-size: 10px; cursor: pointer; }
        .btn-nav.active { background: var(--accent); border: none; }

        /* SUPORTE */
        .btn-support { position: fixed; bottom: 100px; right: 20px; background: var(--whats); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; z-index: 4500; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-decoration: none; }

        .section-title { padding: 20px 15px 10px; font-size: 13px; font-weight: 900; color: #ff7a00; text-transform: uppercase; }

        /* RANKING */
        .ranking-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 0 15px 25px; scrollbar-width: none; }
        .rank-card { min-width: 240px; background: var(--surface); border-radius: 18px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #222; }
        .rank-card img { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; }

        /* MODAIS / GAVETAS */
        .full-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; flex-direction: column; }
        .modal-header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }

        /* PLAYLISTS NO MODAL */
        .playlist-row { padding: 15px; border-bottom: 1px solid #111; }
        .pl-actions { display: flex; gap: 15px; margin-top: 10px; }
        .btn-icon { font-size: 17px; cursor: pointer; }
        .share-btn { color: var(--share); }
        .del-btn { color: var(--danger); }

        /* PLAYER DISCO */
        #player { position: fixed; bottom: 15px; left: 10px; right: 10px; background: rgba(15,15,15,0.98); backdrop-filter: blur(25px); padding: 12px; border-radius: 22px; display: none; align-items: center; gap: 12px; z-index: 4000; border: 1px solid #333; }
        .p-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        
        @keyframes rotateDisk { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: rotateDisk 6s linear infinite; }

        .btn-big { background: var(--success); color: white; padding: 18px; border-radius: 15px; border: none; font-weight: 900; margin: 15px; text-transform: uppercase; }
        .select-item { display: flex; align-items: center; padding: 12px; background: #111; border-radius: 12px; border: 1px solid #222; margin-bottom: 8px; }
    </style>
</head>
<body>

    <a href="https://wa.me/5500000000000" target="_blank" class="btn-support"><i class="fab fa-whatsapp"></i></a>

    <div id="my-playlists-modal" class="full-modal">
        <div class="modal-header">
            <i class="fa fa-arrow-left" onclick="fecharPlaylists()"></i>
            <h3 style="font-weight:900;">Minhas Playlists</h3>
        </div>
        <div id="playlists-list-area" style="flex:1; overflow-y: auto;"></div>
    </div>

    <div id="creator-modal" class="full-modal">
        <div class="modal-header">
            <i class="fa fa-close" onclick="fecharCriador()"></i>
            <h3 style="font-weight:900;">Nova Playlist</h3>
        </div>
        <input type="text" id="pl-name-field" style="background:#151515; border:1px solid #333; padding:15px; margin:15px; border-radius:12px; color:white;" placeholder="Nome da Playlist...">
        <div id="selection-list" style="flex:1; overflow-y: auto; padding: 0 15px;"></div>
        <button class="btn-big" onclick="finalizarPlaylist()">CRIAR E SALVAR</button>
    </div>

    <div id="main-content">
        <header>
            <div class="header-top">
                <div class="logo">ZYVER<span>MUSIC</span></div>
                <div style="display:flex; gap:8px;">
                    <button class="btn-nav active" onclick="abrirPlaylists()"><i class="fa fa-folder"></i> PLAYLISTS</button>
                    <button class="btn-nav" style="background:var(--accent); border:none;" onclick="abrirCriador()">+ CRIAR</button>
                </div>
            </div>
            <div class="search-container">
                <i class="fa fa-search search-icon"></i>
                <input type="text" id="search-bar" class="search-input" placeholder="O que você quer ouvir?" oninput="filtrarMusicas()">
            </div>
        </header>

        <div id="shared-area" style="display:none; padding: 0 15px;">
            <div class="section-title">⭐ Playlist Recebida</div>
            <div id="shared-scroll" class="ranking-scroll"></div>
            <button class="btn-big" id="btn-import" style="width:100%; margin: 10px 0;">IMPORTAR PARA MINHA CONTA</button>
        </div>

        <div class="section-title"><i class="fa fa-fire"></i> Top 10 Mais Tocadas</div>
        <div id="top-10" class="ranking-scroll"></div>

        <div class="section-title"><i class="fa fa-list"></i> Biblioteca Geral</div>
        <div id="all-musics-list" style="padding: 0 15px; display: flex; flex-direction: column; gap: 8px;"></div>
    </div>

    <div id="player">
        <img id="p-img" class="p-img" src="">
        <div style="flex:1; overflow:hidden;">
            <b id="p-name" style="font-size:13px; white-space:nowrap; display:block;">Música</b>
            <small style="color:var(--accent); font-weight:bold; font-size:10px;">REPRODUZINDO</small>
        </div>
        <i class="fa fa-pause" id="play-btn" onclick="controlarPlay()" style="font-size:26px;"></i>
        <audio id="audio-engine"></audio>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, addDoc, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        let musics = [];
        let selectedIds = [];
        let myPlaylists = JSON.parse(localStorage.getItem('z_user_pl')) || [];
        const audio = document.getElementById('audio-engine');
        const pImg = document.getElementById('p-img');

        async function startup() {
            const snap = await getDocs(collection(db, "musics"));
            musics = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
            renderRanking();
            renderGeral(musics);
            verificarURL();
        }

        // --- BUSCA ---
        window.filtrarMusicas = () => {
            const termo = document.getElementById('search-bar').value.toLowerCase();
            const filtradas = musics.filter(m => m.title.toLowerCase().includes(termo));
            renderGeral(filtradas);
        };

        // --- PLAYLISTS MODAL ---
        window.abrirPlaylists = () => {
            document.getElementById('my-playlists-modal').style.display = 'flex';
            const area = document.getElementById('playlists-list-area');
            if(myPlaylists.length === 0) {
                area.innerHTML = "<p style='padding:20px; color:#666;'>Nenhuma playlist criada ainda.</p>";
                return;
            }
            area.innerHTML = myPlaylists.map(pl => `
                <div class="playlist-row">
                    <b style="font-size:16px;">${pl.nome}</b>
                    <div class="pl-actions">
                        <i class="fa fa-paper-plane btn-icon share-btn" onclick="compartilharPL('${pl.cloudId}', '${pl.nome}')"></i>
                        <i class="fa fa-trash-can btn-icon del-btn" onclick="excluirPL(${pl.id})"></i>
                    </div>
                    <div class="ranking-scroll" style="padding:10px 0 0 0;">
                        ${pl.musicas.map(m => `<img src="${m.cover}" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')" style="width:80px; height:80px; border-radius:10px; margin-right:8px;">`).join('')}
                    </div>
                </div>
            `).join('');
        };
        window.fecharPlaylists = () => document.getElementById('my-playlists-modal').style.display = 'none';

        // --- SISTEMA ---
        async function verificarURL() {
            const urlId = new URLSearchParams(window.location.search).get('pl');
            if(urlId) {
                const res = await getDoc(doc(db, "playlists", urlId));
                if(res.exists()) {
                    const data = res.data();
                    document.getElementById('shared-area').style.display = 'block';
                    document.getElementById('shared-scroll').innerHTML = data.musicas.map(m => `
                        <div class="rank-card" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')"><img src="${m.cover}"> <b>${m.title}</b></div>`).join('');
                    document.getElementById('btn-import').onclick = () => {
                        myPlaylists.push({id: Date.now(), cloudId: urlId, nome: data.nome, musicas: data.musicas});
                        localStorage.setItem('z_user_pl', JSON.stringify(myPlaylists));
                        alert("Playlist importada!");
                        abrirPlaylists();
                    };
                }
            }
        }

        window.finalizarPlaylist = async () => {
            const nome = document.getElementById('pl-name-field').value;
            if(!nome || selectedIds.length === 0) return alert("Preencha tudo!");
            const musicasData = musics.filter(m => selectedIds.includes(m.id));
            const cloudRef = await addDoc(collection(db, "playlists"), { nome, musicas: musicasData });
            myPlaylists.push({id: Date.now(), cloudId: cloudRef.id, nome, musicas: musicasData});
            localStorage.setItem('z_user_pl', JSON.stringify(myPlaylists));
            fecharCriador();
            abrirPlaylists();
        };

        window.compartilharPL = (cloudId, nome) => {
            const shareLink = window.location.origin + window.location.pathname + "?pl=" + cloudId;
            navigator.share({ title: 'ZyverMusic', text: 'Minha Playlist: ' + nome, url: shareLink });
        };

        window.excluirPL = (id) => {
            if(confirm("Excluir playlist?")) {
                myPlaylists = myPlaylists.filter(p => p.id !== id);
                localStorage.setItem('z_user_pl', JSON.stringify(myPlaylists));
                abrirPlaylists();
            }
        };

        window.tocar = (id, url, title, cover) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-name').innerText = title;
            pImg.src = cover;
            pImg.classList.add('spinning');
            audio.src = url;
            audio.play();
            updateDoc(doc(db, "musics", id), { plays: increment(1) }).catch(()=>{});
        };

        window.controlarPlay = () => {
            if(audio.paused) { audio.play(); pImg.classList.add('spinning'); document.getElementById('play-btn').className = 'fa fa-pause'; }
            else { audio.pause(); pImg.classList.remove('spinning'); document.getElementById('play-btn').className = 'fa fa-play'; }
        };

        window.abrirCriador = () => {
            document.getElementById('creator-modal').style.display = 'flex';
            document.getElementById('selection-list').innerHTML = musics.map(m => `
                <div class="select-item" id="it-${m.id}" onclick="toggleM('${m.id}')">
                    <img src="${m.cover}" style="width:40px; height:40px; border-radius:8px; margin-right:12px;"> <b>${m.title}</b>
                    <i class="fa fa-check-circle" style="margin-left:auto; color:#222;"></i>
                </div>`).join('');
        };

        window.toggleM = (id) => {
            const el = document.getElementById(`it-${id}`);
            if(selectedIds.includes(id)) { selectedIds = selectedIds.filter(x => x !== id); el.style.borderColor = "#222"; el.querySelector('.fa-check-circle').style.color = "#222"; }
            else { selectedIds.push(id); el.style.borderColor = "var(--success)"; el.querySelector('.fa-check-circle').style.color = "var(--success)"; }
        };

        window.fecharCriador = () => { document.getElementById('creator-modal').style.display = 'none'; selectedIds = []; };

        function renderRanking() {
            const top = [...musics].sort((a,b) => (b.plays || 0) - (a.plays || 0)).slice(0, 10);
            document.getElementById('top-10').innerHTML = top.map(m => `
                <div class="rank-card" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')"><img src="${m.cover}"> <b>${m.title}</b></div>`).join('');
        }

        function renderGeral(lista) {
            document.getElementById('all-musics-list').innerHTML = lista.map(m => `
                <div class="select-item" style="margin:0;" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')"><img src="${m.cover}" style="width:40px; height:40px; border-radius:8px; margin-right:12px;"> <b>${m.title}</b></div>`).join('');
        }

        startup();
    </script>
</body>
</html>
