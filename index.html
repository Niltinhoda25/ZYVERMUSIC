<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZyverMusic | v11.2 Master</title>
    
    <script>
        (function(s){s.dataset.zone='10697810';s.src='https://nap5k.com/tag.min.js';})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --neon: #1DB954; 
            --bg: #000000; 
            --card: #121212; 
            --text: #ffffff;
            --gray: #b3b3b3;
            --danger: #ff4444;
        }

        /* RESET PROFISSIONAL */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Figtree', sans-serif; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); position: fixed; }

        /* VISUALIZADOR DISCRETO */
        #visualizer { position: fixed; bottom: 0; left: 0; width: 100%; height: 120px; z-index: -1; opacity: 0.3; pointer-events: none; }

        #scroller {
            height: 100vh; width: 100%; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 280px; scrollbar-width: none;
            background: linear-gradient(to bottom, #1a1a1a 0%, #000 35%);
        }
        #scroller::-webkit-scrollbar { display: none; }

        /* HEADER & UI ELEMENTS */
        header { padding: 60px 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 32px; font-weight: 900; letter-spacing: -2.5px; }
        .logo span { color: var(--neon); text-shadow: 0 0 10px rgba(29,185,84,0.5); }
        .fs-btn { font-size: 20px; color: var(--gray); cursor: pointer; padding: 10px; transition: 0.3s; }
        .fs-btn:active { transform: scale(1.2); color: white; }

        .search-wrap { margin: 10px 20px 25px; position: relative; }
        .search-wrap input { width: 100%; background: #fff; border: none; padding: 18px 55px; border-radius: 10px; font-size: 16px; font-weight: 700; color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .search-wrap i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #888; font-size: 20px; }

        /* SEÇÕES */
        .section-h { padding: 25px 20px 15px; font-size: 24px; font-weight: 900; }
        .h-list { display: flex; overflow-x: auto; padding: 10px 20px; gap: 18px; scrollbar-width: none; }
        .card-p { min-width: 165px; background: var(--card); padding: 15px; border-radius: 12px; transition: 0.3s; }
        .card-p:active { transform: scale(0.95); }
        .card-p img { width: 135px; height: 135px; border-radius: 8px; object-fit: cover; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        .card-p b { display: block; margin-top: 12px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* TRACKS */
        .track-item { display: flex; align-items: center; padding: 12px 20px; margin: 5px 10px; border-radius: 10px; transition: 0.2s; }
        .track-item:active { background: rgba(255,255,255,0.05); }
        .track-img { width: 55px; height: 55px; border-radius: 6px; margin-right: 18px; object-fit: cover; }
        .track-meta { flex: 1; overflow: hidden; }
        .track-meta b { font-size: 17px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta span { font-size: 12px; color: var(--gray); font-weight: 600; }

        /* PLAYER OMEGA */
        #player-ui {
            position: fixed; bottom: 100px; left: 12px; right: 12px;
            background: #252525; border-radius: 15px; padding: 18px; z-index: 6000;
            display: none; flex-direction: column; gap: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.05);
        }
        .p-row { display: flex; align-items: center; gap: 15px; }
        .p-thumb { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .p-ctrls { display: flex; align-items: center; gap: 22px; }
        .p-play { font-size: 44px; color: var(--neon); cursor: pointer; }

        .progress-bar { width: 100%; height: 5px; background: #444; border-radius: 10px; position: relative; overflow: hidden; }
        #p-fill { width: 0%; height: 100%; background: var(--neon); border-radius: 10px; transition: width 0.1s linear; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; height: 95px; background: linear-gradient(to top, #000 80%, transparent); display: flex; justify-content: space-around; align-items: center; z-index: 5000; }
        .nav-link { color: var(--gray); text-decoration: none; text-align: center; flex: 1; transition: 0.3s; }
        .nav-link i { font-size: 24px; margin-bottom: 5px; display: block; }
        .nav-link span { font-size: 11px; font-weight: 700; }
        .nav-link.active { color: white; }

        /* MODAIS */
        .modal-ui { position: fixed; inset: 0; background: #0c0c0c; z-index: 9999; display: none; flex-direction: column; padding: 80px 25px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .lib-card { background: #181818; margin-bottom: 15px; border-radius: 15px; padding: 20px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #222; }
        .btn-del { color: var(--danger); font-size: 20px; padding: 10px; }

        #loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="loader"><i class="fa fa-spinner fa-spin fa-3x" style="color:var(--neon);"></i></div>
    <canvas id="visualizer"></canvas>

    <div id="m-lib" class="modal-ui">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h2 style="font-size:32px; font-weight:900;">Sua Biblioteca</h2>
            <i class="fa fa-times-circle fa-2x" onclick="closeU('m-lib')"></i>
        </div>
        <div id="my-lib-render" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="m-create" class="modal-ui">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-size:28px;">Nova Playlist</h2>
            <i class="fa fa-times-circle fa-2x" onclick="closeU('m-create')"></i>
        </div>
        <input type="text" id="new-name" style="width:100%; background:#1a1a1a; border:1px solid #333; padding:20px; border-radius:12px; color:white; margin-bottom:20px; font-size:18px;" placeholder="Nome da playlist...">
        <div id="select-tracks-ui" style="overflow-y:auto; flex:1; border-top:1px solid #222; padding-top:15px;"></div>
        <button onclick="saveNewPL()" style="background:var(--neon); color:black; border:none; padding:20px; border-radius:50px; font-weight:900; width:100%; margin-top:20px; font-size:16px;">CRIAR AGORA</button>
    </div>

    <div id="scroller">
        <header>
            <div class="logo">Zyver<span>Music</span></div>
            <i class="fa fa-expand fs-btn" onclick="toggleFS()"></i>
        </header>

        <div class="search-wrap">
            <i class="fa fa-search"></i>
            <input type="text" id="main-search" placeholder="O que vamos ouvir?" oninput="liveSearch()">
        </div>

        <div class="section-h">Em Destaque</div>
        <div id="top-row-ui" class="h-list"></div>

        <div class="section-h" style="margin-top:20px;">Explorar</div>
        <div id="main-list-ui"></div>
    </div>

    <div id="player-ui">
        <div class="p-row">
            <img id="p-img" class="p-thumb" src="">
            <div style="flex:1; overflow:hidden;">
                <b id="p-title" style="display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">...</b>
                <span style="font-size:11px; color:var(--neon); font-weight:800;">ZYVER CLOUD PLAYER</span>
            </div>
            <div class="p-ctrls">
                <i class="fa fa-step-backward" style="font-size:22px;" onclick="prevS()"></i>
                <i class="fa fa-play-circle p-play" id="p-icon" onclick="togglePlay()"></i>
                <i class="fa fa-step-forward" style="font-size:22px;" onclick="nextS()"></i>
            </div>
        </div>
        <div class="progress-bar" onclick="seek(event)">
            <div id="p-fill"></div>
        </div>
        <audio id="core-engine" crossorigin="anonymous"></audio>
    </div>

    <nav>
        <a href="#" class="nav-link active" onclick="location.reload()"><i class="fa fa-house"></i><span>Início</span></a>
        <a href="#" class="nav-link" onclick="openU('m-create')"><i class="fa fa-plus-square"></i><span>Criar</span></a>
        <a href="#" class="nav-link" onclick="loadLib()"><i class="fa fa-book-open"></i><span>Biblioteca</span></a>
    </nav>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, addDoc, doc, getDoc, updateDoc, deleteDoc, increment, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allSongs = [], currentQueue = [], currentIndex = -1, selNew = [];
        let deviceID = localStorage.getItem('zyver_device_id') || localStorage.getItem('zyver_id_v11');
        
        if(!deviceID) {
            deviceID = 'zy_' + Math.random().toString(36).substr(2, 10);
            localStorage.setItem('zyver_device_id', deviceID);
        }

        const engine = document.getElementById('core-engine');

        async function init() {
            try {
                const snap = await getDocs(collection(db, "musics"));
                allSongs = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
                currentQueue = [...allSongs];
                
                const plId = new URLSearchParams(window.location.search).get('pl');
                if(plId) {
                    const pl = await getDoc(doc(db, "playlists", plId));
                    if(pl.exists()) {
                        currentQueue = pl.data().musicas || [];
                        renderMain(currentQueue);
                    }
                } else { renderMain(allSongs); }
                
                renderTop();
                document.getElementById('loader').style.display='none';
            } catch(e) { console.error("Firebase Error: ", e); }
        }

        window.toggleFS = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };

        function renderMain(data) {
            document.getElementById('main-list-ui').innerHTML = data.map((m, i) => `
                <div class="track-item" onclick="playIndex(${i})">
                    <img class="track-img" src="${m.cover}">
                    <div class="track-meta"><b>${m.title}</b><span>Música Premium</span></div>
                </div>
            `).join('');
        }

        function renderTop() {
            document.getElementById('top-row-ui').innerHTML = allSongs.slice(0, 10).map(m => `
                <div class="card-p" onclick="playByID('${m.id}')">
                    <img src="${m.cover}"><b>${m.title}</b>
                </div>
            `).join('');
        }

        window.playByID = (id) => {
            const idx = currentQueue.findIndex(s => s.id === id);
            if(idx !== -1) playIndex(idx);
            else {
                const song = allSongs.find(s => s.id === id);
                currentQueue = [song];
                playIndex(0);
            }
        };

        window.playIndex = (i) => {
            const m = currentQueue[i];
            currentIndex = i;
            document.getElementById('player-ui').style.display = 'flex';
            document.getElementById('p-title').innerText = m.title;
            document.getElementById('p-img').src = m.cover;
            engine.src = m.url;
            engine.play().catch(() => console.log("User interaction required"));
            document.getElementById('p-icon').className = 'fa fa-pause-circle p-play';
            updateDoc(doc(db, "musics", m.id), { plays: increment(1) });
        };

        window.togglePlay = () => {
            if(engine.paused) { engine.play(); document.getElementById('p-icon').className = 'fa fa-pause-circle p-play'; }
            else { engine.pause(); document.getElementById('p-icon').className = 'fa fa-play-circle p-play'; }
        };

        window.nextS = () => { if(currentIndex < currentQueue.length -1) playIndex(currentIndex + 1); };
        window.prevS = () => { if(currentIndex > 0) playIndex(currentIndex - 1); };

        engine.ontimeupdate = () => {
            const p = (engine.currentTime / engine.duration) * 100;
            document.getElementById('p-fill').style.width = p + "%";
        };

        window.seek = (e) => {
            const rect = e.currentTarget.getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            engine.currentTime = pos * engine.duration;
        };

        window.liveSearch = () => {
            const val = document.getElementById('main-search').value.toLowerCase();
            const res = allSongs.filter(m => m.title.toLowerCase().includes(val));
            renderMain(res);
        };

        window.loadLib = async () => {
            openU('m-lib');
            const render = document.getElementById('my-lib-render');
            render.innerHTML = '<div style="text-align:center; padding:50px;"><i class="fa fa-spinner fa-spin fa-2x"></i></div>';
            
            // Tenta resgatar de ambos os IDs possíveis
            const q = query(collection(db, "playlists"), where("ownerID", "in", [deviceID, localStorage.getItem('zyver_id_v11')]));
            const snap = await getDocs(q);
            
            if(snap.empty) {
                render.innerHTML = '<p style="text-align:center; color:#555; margin-top:50px;">Nenhuma playlist encontrada.</p>';
                return;
            }

            render.innerHTML = snap.docs.map(d => `
                <div class="lib-card">
                    <div style="flex:1;" onclick="window.location.href='?pl=${d.id}'">
                        <b style="font-size:18px;">${d.data().nome}</b>
                        <p style="color:var(--gray); font-size:12px;">${d.data().musicas.length} músicas</p>
                    </div>
                    <i class="fa fa-trash-alt btn-del" onclick="deletePL('${d.id}')"></i>
                </div>
            `).join('');
        };

        window.deletePL = async (id) => { if(confirm("Deseja apagar esta playlist?")) { await deleteDoc(doc(db, "playlists", id)); loadLib(); } };

        window.saveNewPL = async () => {
            const name = document.getElementById('new-name').value;
            const tracks = allSongs.filter(m => selNew.includes(m.id));
            if(!name || tracks.length === 0) return alert("Dê um nome e selecione músicas!");
            await addDoc(collection(db, "playlists"), { nome: name, musicas: tracks, ownerID: deviceID, created: Date.now() });
            alert("Playlist criada com sucesso!"); closeU('m-create');
        };

        window.toggleSel = (id) => {
            const el = document.getElementById(`sel-${id}`);
            if(selNew.includes(id)) { selNew = selNew.filter(x => x !== id); el.style.background = "none"; }
            else { selNew.push(id); el.style.background = "rgba(29, 185, 84, 0.2)"; }
        };

        window.openU = (id) => {
            document.getElementById(id).style.display = 'flex';
            if(id === 'm-create') {
                document.getElementById('select-tracks-ui').innerHTML = allSongs.map(m => `
                    <div class="track-item" id="sel-${m.id}" onclick="toggleSel('${m.id}')">
                        <img class="track-img" src="${m.cover}"><b>${m.title}</b>
                    </div>
                `).join('');
            }
        };

        window.closeU = (id) => document.getElementById(id).style.display = 'none';
        
        init();
    </script>
</body>
</html>
