<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Premium</title>

    <script>(function(s){s.dataset.zone='10697810',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --accent: #9d4edd; --bg: #050505; --surface: #121212; --success: #2ecc71; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        #main-content { height: 100vh; overflow-y: auto; padding-bottom: 200px; scrollbar-width: none; }
        #main-content::-webkit-scrollbar { display: none; }

        header { padding: 25px 15px; background: #101010; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1.5px; }
        .logo span { color: var(--accent); }

        .btn-create-pl { background: var(--accent); color: white; padding: 12px 20px; border-radius: 30px; border: none; font-weight: 800; font-size: 12px; cursor: pointer; text-transform: uppercase; }

        .section-title { padding: 20px 15px 10px; font-size: 14px; font-weight: 900; color: #ff7a00; text-transform: uppercase; }

        /* RANKING TOP 10 (VOLTOU!) */
        .ranking-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 0 15px 25px; scrollbar-width: none; }
        .rank-card { min-width: 280px; background: var(--surface); border-radius: 15px; padding: 12px; display: flex; align-items: center; gap: 12px; border: 1px solid #222; position: relative; }
        .rank-number { position: absolute; top: -5px; left: -5px; background: var(--accent); width: 25px; height: 25px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; border: 2px solid #000; }
        .rank-card img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }

        /* LISTA DE MÚSICAS GERAL */
        .music-list { display: flex; flex-direction: column; padding: 0 12px; gap: 8px; }
        .music-item { display: flex; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .music-item img { width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; }

        /* MODAL CRIADOR DE PLAYLIST */
        #creator-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; flex-direction: column; padding-bottom: 80px; }
        .modal-header { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #222; }
        .pl-input { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 12px; color: white; width: calc(100% - 30px); margin: 15px; font-size: 16px; outline: none; }
        
        .select-item { display: flex; align-items: center; padding: 12px; margin: 0 15px 8px; background: #121212; border-radius: 10px; border: 1px solid #222; transition: 0.3s; }
        .select-item.selected { border-color: var(--success); background: rgba(46, 204, 113, 0.05); }
        .select-item img { width: 40px; height: 40px; border-radius: 6px; margin-right: 12px; }
        .select-item .fa-check-circle { margin-left: auto; color: #333; font-size: 20px; }
        .selected .fa-check-circle { color: var(--success); }

        .btn-finish { background: var(--success); color: white; padding: 18px; border-radius: 15px; border: none; font-weight: 900; margin: 15px; text-transform: uppercase; }

        /* PLAYER FIXO */
        #player { position: fixed; bottom: 20px; left: 10px; right: 10px; background: rgba(20,20,20,0.98); backdrop-filter: blur(25px); padding: 15px; border-radius: 20px; display: none; align-items: center; gap: 15px; z-index: 4000; border: 1px solid #333; }
        .p-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); }
    </style>
</head>
<body>

    <div id="creator-modal">
        <div class="modal-header"><i class="fa fa-close" onclick="fecharCriador()"></i> <h3>Criar Playlist</h3></div>
        <input type="text" id="pl-name-input" class="pl-input" placeholder="Nome da Playlist...">
        <div style="flex:1; overflow-y: auto;" id="selection-list"></div>
        <button class="btn-finish" onclick="confirmarPlaylist()">SALVAR PLAYLIST</button>
    </div>

    <div id="main-content">
        <header>
            <div class="logo">ZYVER<span>MUSIC</span></div>
            <button class="btn-create-pl" onclick="abrirCriador()">+ Criar</button>
        </header>

        <div class="section-title">🔥 Top 10 Mais Tocadas</div>
        <div id="top-10" class="ranking-scroll"></div>

        <div id="user-playlists-area"></div>

        <div class="section-title">Todas as Músicas</div>
        <div id="musics-all" class="music-list"></div>
    </div>

    <div id="player">
        <img id="p-img" class="p-img" src="">
        <div style="flex:1; overflow:hidden;"><b id="p-name" style="font-size:13px; white-space:nowrap;">Música</b></div>
        <i class="fa fa-pause" id="play-icon" onclick="togglePlay()" style="font-size:25px; padding:5px;"></i>
        <audio id="audio-engine"></audio>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        let todasMusicas = [];
        let selecionadas = [];
        let minhasPlaylists = JSON.parse(localStorage.getItem('my_z_playlists')) || [];
        const audio = document.getElementById('audio-engine');

        async function carregarTudo() {
            const snap = await getDocs(collection(db, "musics"));
            todasMusicas = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
            
            renderRanking();
            renderListaGeral();
            renderMinhasPlaylists();
        }

        // --- RANKING TOP 10 ---
        function renderRanking() {
            const top = [...todasMusicas].sort((a,b) => (b.plays || 0) - (a.plays || 0)).slice(0, 10);
            document.getElementById('top-10').innerHTML = top.map((m, i) => `
                <div class="rank-card" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <div class="rank-number">${i+1}</div>
                    <img src="${m.cover}">
                    <div style="overflow:hidden"><b style="font-size:14px; white-space:nowrap;">${m.title}</b></div>
                </div>`).join('');
        }

        // --- CRIADOR DE PLAYLIST ---
        window.abrirCriador = () => {
            document.getElementById('creator-modal').style.display = 'flex';
            document.getElementById('selection-list').innerHTML = todasMusicas.map(m => `
                <div class="select-item" id="item-${m.id}" onclick="selecionarMúsica('${m.id}')">
                    <img src="${m.cover}">
                    <b>${m.title}</b>
                    <i class="fa fa-check-circle"></i>
                </div>`).join('');
        };

        window.selecionarMúsica = (id) => {
            const el = document.getElementById(`item-${id}`);
            if(selecionadas.includes(id)) {
                selecionadas = selecionadas.filter(x => x !== id);
                el.classList.remove('selected');
            } else {
                selecionadas.push(id);
                el.classList.add('selected');
            }
        };

        window.confirmarPlaylist = () => {
            const nome = document.getElementById('pl-name-input').value;
            if(!nome || selecionadas.length === 0) return alert("Dê um nome e escolha as músicas!");
            
            const novaPl = {
                id: Date.now(),
                nome: nome,
                musicas: todasMusicas.filter(m => selecionadas.includes(m.id))
            };
            
            minhasPlaylists.push(novaPl);
            localStorage.setItem('my_z_playlists', JSON.stringify(minhasPlaylists));
            fecharCriador();
            renderMinhasPlaylists();
        };

        window.fecharCriador = () => {
            document.getElementById('creator-modal').style.display = 'none';
            selecionadas = [];
        };

        // --- EXIBIR PLAYLISTS ---
        function renderMinhasPlaylists() {
            const area = document.getElementById('user-playlists-area');
            if(minhasPlaylists.length === 0) { area.innerHTML = ""; return; }
            
            area.innerHTML = `<div class="section-title">Minhas Coleções ❤️</div>` + minhasPlaylists.map(pl => `
                <div style="padding: 0 15px; margin-bottom: 20px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h3 style="font-size:18px;">${pl.nome}</h3>
                        <div style="display:flex; gap:15px;">
                            <i class="fa fa-share-alt" onclick="compartilhar('${pl.nome}')"></i>
                            <i class="fa fa-trash" onclick="apagarPL(${pl.id})" style="color:#555"></i>
                        </div>
                    </div>
                    <div class="ranking-scroll">
                        ${pl.musicas.map(m => `<img src="${m.cover}" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')" style="width:100px; height:100px; border-radius:12px; border:1px solid #333;">`).join('')}
                    </div>
                </div>`).join('');
        }

        window.apagarPL = (id) => {
            minhasPlaylists = minhasPlaylists.filter(p => p.id !== id);
            localStorage.setItem('my_z_playlists', JSON.stringify(minhasPlaylists));
            renderMinhasPlaylists();
        };

        window.compartilhar = (nome) => {
            navigator.share({ title: 'ZyverMusic', text: 'Ouça minha playlist: ' + nome, url: window.location.href });
        };

        // --- PLAYER ---
        window.tocar = (id, url, tit, img) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-name').innerText = tit;
            document.getElementById('p-img').src = img;
            audio.src = url;
            audio.play();
            updateDoc(doc(db, "musics", id), { plays: increment(1) }).catch(()=>{});
        };

        window.togglePlay = () => {
            if(audio.paused) { audio.play(); document.getElementById('play-icon').className = 'fa fa-pause'; }
            else { audio.pause(); document.getElementById('play-icon').className = 'fa fa-play'; }
        };

        function renderListaGeral() {
            document.getElementById('musics-all').innerHTML = todasMusicas.map(m => `
                <div class="music-item" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <img src="${m.cover}">
                    <div><b style="font-size:15px;">${m.title}</b><p style="font-size:11px; color:#666;">Zyver Premium</p></div>
                </div>`).join('');
        }

        carregarTudo();
    </script>
</body>
</html>
