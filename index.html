<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyverMusic | Premium Player</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #09090b; color: #f4f4f5; font-family: sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Ajuste de layout dos cards */
        .music-card img, .top-chart-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 0.75rem;
        }
        .music-card, .top-chart-card {
            transition: all 0.3s ease;
        }
        .music-card:hover, .top-chart-card:hover {
            transform: translateY(-5px);
            background-color: rgba(39, 39, 42, 0.5);
        }
    </style>
</head>
<body class="min-h-screen pb-48">

    <nav class="flex flex-col md:flex-row justify-between items-center p-6 border-b border-zinc-800 sticky top-0 bg-[#09090b]/95 backdrop-blur-sm z-50 gap-4">
        <h1 class="text-2xl font-black tracking-tighter text-indigo-500">ZYVER<span class="text-white">MUSIC</span></h1>
        
        <div class="relative w-full md:w-96">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
            <input type="text" id="search-input" placeholder="O que queres ouvir?" class="w-full bg-zinc-900 border border-zinc-800 py-2 pl-12 pr-4 rounded-full outline-none focus:border-indigo-500 transition">
        </div>

        <a href="admin.html" class="text-xs uppercase tracking-widest text-zinc-600 hover:text-indigo-400">Admin</a>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <section class="mb-12">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-3 text-orange-400">
                <i class="fas fa-fire"></i> AS MAIS TOCADAS
            </h2>
            <div id="top-charts" class="flex gap-5 overflow-x-auto pb-4 no-scrollbar">
                </div>
        </section>

        <h2 class="text-xl font-bold mb-6 text-zinc-300">Explorar Tudo</h2>
        <div id="music-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
            </div>
    </main>

    <div id="player-bar" class="fixed bottom-0 left-0 w-full bg-zinc-950/95 border-t border-zinc-800 p-4 transform translate-y-full transition-all duration-500 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4 w-full md:w-1/3">
                <img id="player-img" src="" class="w-14 h-14 rounded-lg object-cover shadow-2xl border border-zinc-800">
                <div class="overflow-hidden text-left">
                    <p id="player-title" class="font-bold truncate text-sm"></p>
                    <p class="text-[10px] text-zinc-500 uppercase">A reproduzir agora</p>
                </div>
            </div>

            <div class="flex flex-col items-center gap-2 w-full md:w-1/3">
                <div class="flex items-center gap-8">
                    <button id="prev-btn" class="text-zinc-400 hover:text-white transition"><i class="fas fa-step-backward"></i></button>
                    <button id="play-pause-btn" class="bg-white text-black w-12 h-12 rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition shadow-lg shadow-white/10"><i class="fas fa-play"></i></button>
                    <button id="next-btn" class="text-zinc-400 hover:text-white transition"><i class="fas fa-step-forward"></i></button>
                </div>
                <div class="flex items-center gap-3 w-full text-[10px] font-mono text-zinc-500">
                    <span id="current-time">0:00</span>
                    <div class="relative w-full h-1.5 bg-zinc-800 rounded-full cursor-pointer group" id="progress-container">
                        <div id="progress-fill" class="absolute top-0 left-0 h-full bg-indigo-500 w-0 rounded-full group-hover:bg-indigo-400 transition-all"></div>
                    </div>
                    <span id="duration-time">0:00</span>
                </div>
            </div>

            <div class="hidden md:flex items-center justify-end gap-6 w-1/3">
                <button id="share-btn-player" class="text-zinc-500 hover:text-white transition" title="Compartilhar">
                    <i class="fas fa-share-alt"></i>
                </button>
                <div class="flex items-center gap-3">
                    <i class="fas fa-volume-up text-zinc-500 text-sm"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" class="w-24 accent-indigo-500 h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>
    <script type="module" src="app.js"></script>
</body>
</html>
