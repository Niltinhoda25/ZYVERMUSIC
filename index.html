<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | v8.6 Spotify Edition</title>
    
    <meta name="theme-color" content="#121212">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22ZyverMusic%22,%22short_name%22:%22Zyver%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#121212%22,%22theme_color%22:%22#1DB954%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/3844/3844724.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <script>
        (function(s){
            s.dataset.zone='10697810';
            s.src='https://nap5k.com/tag.min.js';
        })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --spotify-green: #1DB954;
            --spotify-black: #121212;
            --spotify-light-black: #181818;
            --spotify-grey: #b3b3b3;
            --card-hover: #282828;
        }
        
        /* TRAVA TOTAL DE MOVIMENTAÇÃO LATERAL */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Figtree', sans-serif;
        }
        
        html, body { 
            width: 100%; height: 100%; 
            overflow: hidden; /* Trava o body principal */
            background-color: #000;
            color: white;
            position: fixed; /* Impede o "elástico" do iOS */
        }

        /* CONTEÚDO SCROLLÁVEL APENAS VERTICAL */
        #main-content { 
            height: 100vh; width: 100%;
            overflow-y: auto; overflow-x: hidden; 
            padding-bottom: 220px;
            background: linear-gradient(to bottom, #222, var(--spotify-black) 30%);
            -webkit-overflow-scrolling: touch;
        }

        header { padding: 40px 20px 20px; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--spotify-green); }

        /* BUSCA SPOTIFY STYLE */
        .search-container { margin: 0 20px 25px; position: relative; }
        .search-container input { 
            width: 100%; background: white; border: none; 
            padding: 14px 45px; border-radius: 4px; color: black; 
            font-size: 14px; font-weight: 600;
        }
        .search-container i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #535353; font-size: 18px; }

        .section-title { padding: 10px 20px; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

        /* GRID HORIZONTAL TRAVADO */
        #top-list { 
            display: flex; overflow-x: auto; padding: 10px 20px; gap: 16px; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        #top-list::-webkit-scrollbar { display: none; }
        
        .top-card { 
            min-width: 140px; background: var(--spotify-light-black); 
            padding: 12px; border-radius: 8px; transition: 0.3s;
        }
        .top-card:active { background: var(--card-hover); }
        .top-img { width: 116px; height: 116px; border-radius: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); object-fit: cover; }
        .top-card b { display: block; margin-top: 10px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* LISTA DE MÚSICAS */
        .song-row { 
            display: flex; align-items: center; padding: 10px 20px; 
            transition: 0.2s; cursor: pointer;
        }
        .song-row:active { background: rgba(255,255,255,0.1); }
        .song-thumb { width: 48px; height: 48px; border-radius: 4px; margin-right: 15px; object-fit: cover; }
        .song-info { flex: 1; }
        .song-info b { font-size: 15px; display: block; }
        .song-info span { font-size: 13px; color: var(--spotify-grey); }

        /* PLAYER SPOTIFY STYLE */
        #player { 
            position: fixed; bottom: 85px; left: 8px; right: 8px; 
            background: #282828; padding: 8px 12px; border-radius: 8px; 
            display: none; align-items: center; gap: 12px; z-index: 5000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .p-thumb { width: 44px; height: 44px; border-radius: 4px; object-fit: cover; }
        .p-meta { flex: 1; overflow: hidden; }
        .p-meta b { font-size: 13px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-meta span { font-size: 11px; color: var(--spotify-grey); }

        /* BOTTOM NAV */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.95); display: flex; justify-content: space-around;
            padding-top: 10px; z-index: 4000;
        }
        .nav-item { color: var(--spotify-grey); text-align: center; font-size: 22px; flex: 1; }
        .nav-item.active { color: white; }
        .nav-item span { display: block; font-size: 10px; margin-top: 4px; font-weight: 500; }

        /* MODAIS */
        .modal-full { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #121212; z-index: 9999; display: none; flex-direction: column;
            padding: 40px 20px;
        }
        .modal-btn { 
            background: var(--spotify-green); color: black; border: none; 
            padding: 16px; border-radius: 500px; font-weight: 700; font-size: 15px;
            margin-top: auto;
        }
    </style>
</head>
<body>

    <div id="modal-cloud" class="modal-full">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2 style="font-size:24px;">Sua Biblioteca</h2>
            <i class="fa fa-times fa-lg" onclick="fecharModal('modal-cloud')"></i>
        </div>
        <div id="cloud-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="modal-create" class="modal-full">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2>Criar Playlist</h2>
            <i class="fa fa-times fa-lg" onclick="fecharModal('modal-create')"></i>
        </div>
        <input type="text" id="pl-title" placeholder="Dê um nome à sua playlist" style="width:100%; background:#333; border:none; padding:15px; border-radius:4px; color:white; margin-bottom:20px;">
        <div id="selection-list" style="overflow-y:auto; flex:1;"></div>
        <button class="modal-btn" onclick="salvarCloud()">CRIAR</button>
    </div>

    <div id="main-content">
        <header><div class="logo">Zyver<span>Music</span></div></header>

        <div class="search-container">
            <i class="fa fa-search"></i>
            <input type="text" id="search-bar" placeholder="O que você quer ouvir?" oninput="filtrar()">
        </div>

        <div class="section-title">Feito para você</div>
        <div id="top-list"></div>

        <div class="section-title" style="margin-top:20px;">Músicas recomendadas</div>
        <div id="full-list"></div>
    </div>

    <div id="player">
        <img id="p-img" class="p-thumb" src="">
        <div class="p-meta">
            <b id="p-name">...</b>
            <span id="p-artist">Spotify Edition</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <i class="fa fa-forward-step" onclick="proxima()" style="color:var(--spotify-grey);"></i>
            <i class="fa fa-play" id="play-icon" onclick="toggle()" style="font-size:24px;"></i>
        </div>
        <audio id="engine"></audio>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fa fa-house"></i><span>Início</span></div>
        <div class="nav-item" onclick="abrirModal('modal-create')"><i class="fa fa-plus-square"></i><span>Criar</span></div>
        <div class="nav-item" onclick="abrirCloud()"><i class="fa fa-book-open"></i><span>Sua Biblioteca</span></div>
    </nav>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, addDoc, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        let tracks = [], selecionadas = [];
        const audio = document.getElementById('engine');
        const pImg = document.getElementById('p-img');

        async function init() {
            const snap = await getDocs(collection(db, "musics"));
            tracks = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
            
            const params = new URLSearchParams(window.location.search);
            const plId = params.get('pl');
            if(plId) {
                const plSnap = await getDoc(doc(db, "playlists", plId));
                if(plSnap.exists()) renderLista(plSnap.data().musicas);
            } else { renderLista(tracks); }
            renderTop();
        }

        function renderLista(l) {
            document.getElementById('full-list').innerHTML = l.map(m => `
                <div class="song-row" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <img class="song-thumb" src="${m.cover}">
                    <div class="song-info"><b>${m.title}</b><span>Música • Zyver</span></div>
                </div>
            `).join('');
        }

        function renderTop() {
            const top = [...tracks].sort((a,b) => (b.plays || 0) - (a.plays || 0)).slice(0, 10);
            document.getElementById('top-list').innerHTML = top.map(m => `
                <div class="top-card" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <img class="top-img" src="${m.cover}">
                    <b>${m.title}</b>
                </div>
            `).join('');
        }

        window.tocar = (id, url, title, img) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-name').innerText = title;
            pImg.src = img; audio.src = url; audio.play();
            document.getElementById('play-icon').className = 'fa fa-pause';
            updateDoc(doc(db, "musics", id), { plays: increment(1) });
        };

        window.toggle = () => {
            if(audio.paused) { audio.play(); document.getElementById('play-icon').className = 'fa fa-pause'; }
            else { audio.pause(); document.getElementById('play-icon').className = 'fa fa-play'; }
        };

        audio.onended = () => proxima();
        window.proxima = () => {
            const r = tracks[Math.floor(Math.random()*tracks.length)];
            tocar(r.id, r.url, r.title, r.cover);
        };

        window.salvarCloud = async () => {
            const n = document.getElementById('pl-title').value;
            if(!n || selecionadas.length === 0) return;
            const m = tracks.filter(x => selecionadas.includes(x.id));
            const d = await addDoc(collection(db, "playlists"), { nome: n, musicas: m });
            prompt("Compartilhe sua playlist:", window.location.origin + window.location.pathname + "?pl=" + d.id);
            fecharModal('modal-create');
        };

        window.abrirCloud = async () => {
            abrirModal('modal-cloud');
            const snap = await getDocs(collection(db, "playlists"));
            document.getElementById('cloud-list').innerHTML = snap.docs.map(d => `
                <div class="song-row">
                    <div class="song-info"><b>${d.data().nome}</b><span>${d.data().musicas.length} músicas</span></div>
                    <i class="fa fa-share-alt" onclick="copy('${d.id}')" style="color:var(--spotify-green)"></i>
                </div>
            `).join('');
        };

        window.copy = (id) => {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?pl=" + id);
            alert("Link copiado!");
        };

        window.toggleSel = (id) => {
            const el = document.getElementById(`sel-${id}`);
            if(selecionadas.includes(id)) { selecionadas = selecionadas.filter(x => x !== id); el.style.background = "none"; }
            else { selecionadas.push(id); el.style.background = "#282828"; }
        };

        window.abrirModal = (id) => {
            document.getElementById(id).style.display = 'flex';
            if(id === 'modal-create') {
                document.getElementById('selection-list').innerHTML = tracks.map(m => `
                    <div class="song-row" id="sel-${m.id}" onclick="toggleSel('${m.id}')">
                        <img class="song-thumb" src="${m.cover}"><b>${m.title}</b>
                    </div>
                `).join('');
            }
        };

        window.fecharModal = (id) => document.getElementById(id).style.display = 'none';
        window.filtrar = () => {
            const v = document.getElementById('search-bar').value.toLowerCase();
            renderLista(tracks.filter(m => m.title.toLowerCase().includes(v)));
        };

        init();
    </script>
</body>
</html>
