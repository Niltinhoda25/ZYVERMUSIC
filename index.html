<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #9d4edd; --bg: #050505; --surface: #121212; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 110px; }

        /* HEADER & MENU */
        header { 
            padding: 15px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px); z-index: 100;
        }
        .menu-icon { font-size: 24px; cursor: pointer; padding: 5px; }
        .logo { font-size: 20px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* SIDEBAR (MENU LATERAL) */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 80%; height: 100%;
            background: var(--surface); z-index: 1000; transition: 0.4s;
            padding: 30px 20px; box-shadow: 10px 0 30px rgba(0,0,0,0.8);
        }
        .sidebar.active { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; margin-bottom: 40px; }
        .nav-item { 
            display: flex; align-items: center; gap: 15px; font-size: 18px; 
            font-weight: 600; padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer;
        }
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: none; z-index: 999; 
        }

        /* CONTEÚDO DA HOME (SÓ TOPS) */
        .container { padding: 15px; }
        .section-title { font-size: 18px; font-weight: 800; margin: 20px 0 15px; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: #ff7a00; }

        /* TOP 10 RANKING (Cards Maiores) */
        .top-list { display: flex; flex-direction: column; gap: 12px; }
        .rank-item {
            background: var(--surface); padding: 12px; border-radius: 15px;
            display: flex; align-items: center; gap: 15px; border: 1px solid #222;
        }
        .rank-number { font-size: 24px; font-weight: 900; color: var(--accent); min-width: 30px; }
        .rank-item img { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .rank-info h4 { font-size: 14px; margin-bottom: 2px; }
        .rank-info p { font-size: 11px; color: #777; }

        /* MODAL DA BIBLIOTECA (ABRE QUANDO CLICA NO MENU) */
        #library-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 2000; display: none; overflow-y: auto; padding: 20px;
        }
        .grid-lib { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .lib-card { background: var(--surface); padding: 10px; border-radius: 12px; text-align: center; }
        .lib-card img { width: 100%; aspect-ratio: 1/1; border-radius: 10px; object-fit: cover; margin-bottom: 8px; }
        .lib-card h5 { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER FLUTUANTE */
        #player {
            position: fixed; bottom: 20px; left: 10px; right: 10px;
            background: rgba(25,25,25,0.95); backdrop-filter: blur(15px);
            padding: 12px; border-radius: 18px; display: none; align-items: center;
            gap: 12px; border: 1px solid #333; z-index: 3000;
        }
        .p-img { width: 45px; height: 45px; border-radius: 10px; }
        .p-txt { flex: 1; overflow: hidden; }
        .p-txt h6 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-play { width: 40px; height: 40px; background: white; color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header>
        <div class="menu-icon" onclick="toggleMenu()"><i class="fa fa-bars"></i></div>
        <div class="logo">ZYVER<span>MUSIC</span></div>
        <div style="width: 30px;"></div> </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="logo">MENU</h2>
            <i class="fa fa-times" onclick="toggleMenu()"></i>
        </div>
        <div class="nav-item" onclick="toggleMenu()">
            <i class="fa fa-home"></i> Início
        </div>
        <div class="nav-item" onclick="openLibrary()">
            <i class="fa fa-music"></i> Minha Biblioteca
        </div>
        <div class="nav-item" onclick="window.location.href='clipes.html'">
            <i class="fa fa-play-circle"></i> Clipes
        </div>
    </nav>

    <div class="container">
        <div class="section-title"><i class="fa fa-fire"></i> TOP 10 SEMANAL</div>
        <div id="top-list" class="top-list">
            </div>
    </div>

    <div id="library-view">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
            <i class="fa fa-arrow-left" onclick="closeLibrary()" style="font-size: 20px;"></i>
            <h2>Todas as Músicas</h2>
        </div>
        <div id="lib-grid" class="grid-lib"></div>
    </div>

    <div id="player">
        <img id="p-img" class="p-img" src="">
        <div class="p-txt"><h6 id="p-title">Música</h6><span style="font-size: 10px; color: var(--accent);">Tocando agora</span></div>
        <div class="btn-play" onclick="togglePlay()"><i id="play-icon" class="fa fa-play"></i></div>
        <audio id="main-audio"></audio>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let tracks = [];
        const audio = document.getElementById('main-audio');

        async function init() {
            const snap = await getDocs(collection(db, "musics"));
            tracks = snap.docs.map(d => ({id: d.id, ...d.data()}));

            // Injeta o Top 10 na Home
            const top10 = [...tracks].sort((a,b) => (b.plays || 0) - (a.plays || 0)).slice(0, 10);
            document.getElementById('top-list').innerHTML = top10.map((m, i) => `
                <div class="rank-item" onclick="play('${m.url}','${m.title}','${m.cover}')">
                    <div class="rank-number">${i+1}</div>
                    <img src="${m.cover}">
                    <div class="rank-info">
                        <h4>${m.title}</h4>
                        <p>${m.plays || 0} execuções</p>
                    </div>
                </div>
            `).join('');

            // Prepara a biblioteca (mas deixa escondida)
            document.getElementById('lib-grid').innerHTML = tracks.map(m => `
                <div class="lib-card" onclick="play('${m.url}','${m.title}','${m.cover}')">
                    <img src="${m.cover}">
                    <h5>${m.title}</h5>
                </div>
            `).join('');
        }

        // Funções de Interface
        window.toggleMenu = () => {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('active');
            ov.style.display = sb.classList.contains('active') ? 'block' : 'none';
        }

        window.openLibrary = () => {
            toggleMenu();
            document.getElementById('library-view').style.display = 'block';
        }

        window.closeLibrary = () => {
            document.getElementById('library-view').style.display = 'none';
        }

        window.play = (url, title, img) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-img').src = img;
            audio.src = url;
            audio.play();
            document.getElementById('play-icon').className = 'fa fa-pause';
            closeLibrary(); // Fecha a biblioteca ao dar play pra ver o top 10
        }

        window.togglePlay = () => {
            if(audio.paused) { audio.play(); document.getElementById('play-icon').className = 'fa fa-pause'; }
            else { audio.pause(); document.getElementById('play-icon').className = 'fa fa-play'; }
        }

        init();
    </script>
</body>
</html>
