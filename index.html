<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZyverMusic | v10.4 Master Index</title>
    
    <script>
        (function(s){
            s.dataset.zone='10697810';
            s.src='https://nap5k.com/tag.min.js';
        })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --sp-green: #1DB954; 
            --sp-black: #121212; 
            --sp-light: #181818; 
            --sp-gray: #b3b3b3; 
            --sp-red: #ff4444;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Figtree', sans-serif; }
        
        html, body { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #000; position: fixed; color: white; 
        }

        /* SCROLLER PRINCIPAL */
        #scroller {
            height: 100vh; width: 100%; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 280px; scrollbar-width: none;
            background: linear-gradient(to bottom, #252525 0%, #121212 40%, #000 100%);
        }
        #scroller::-webkit-scrollbar { display: none; }

        /* HEADER & LOGO */
        header { padding: 60px 20px 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: -1.5px; }
        .logo span { color: var(--sp-green); }

        /* BUSCA PREMIUM */
        .search-wrap { margin: 10px 20px 25px; position: relative; }
        .search-wrap input {
            width: 100%; background: #fff; border: none; padding: 16px 45px;
            border-radius: 6px; font-size: 15px; font-weight: 700; color: #000;
        }
        .search-wrap i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #555; }

        /* SEÇÕES */
        .section-h { padding: 20px 20px 10px; font-size: 22px; font-weight: 800; display: flex; justify-content: space-between; align-items: center; }
        .section-h span { font-size: 12px; color: var(--sp-gray); font-weight: 600; }

        /* TOP 10 HORIZONTAL */
        .h-list { display: flex; overflow-x: auto; padding: 10px 20px; gap: 16px; scrollbar-width: none; }
        .card-p { min-width: 160px; background: var(--sp-light); padding: 12px; border-radius: 8px; transition: 0.3s; }
        .card-p img { width: 136px; height: 136px; border-radius: 4px; object-fit: cover; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .card-p b { display: block; margin-top: 12px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* LISTA DE MÚSICAS */
        .track-item { display: flex; align-items: center; padding: 12px 20px; margin: 0 10px; border-radius: 8px; }
        .track-item:active { background: rgba(255,255,255,0.1); }
        .track-img { width: 54px; height: 54px; border-radius: 4px; margin-right: 15px; object-fit: cover; }
        .track-meta { flex: 1; overflow: hidden; }
        .track-meta b { font-size: 16px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-meta span { font-size: 12px; color: var(--sp-gray); }

        /* PLAYER FLUTUANTE */
        #player-ui {
            position: fixed; bottom: 100px; left: 10px; right: 10px;
            background: #282828; border-radius: 10px; padding: 12px;
            display: none; align-items: center; gap: 12px; z-index: 6000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .p-thumb { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; }
        .p-info { flex: 1; overflow: hidden; }
        .p-info b { font-size: 14px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-info span { font-size: 11px; color: var(--sp-green); font-weight: 700; }

        /* NAVBAR */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: linear-gradient(to top, #000 70%, transparent); 
            display: flex; justify-content: space-around; padding-top: 15px; z-index: 5000;
        }
        .nav-link { color: var(--sp-gray); text-align: center; flex: 1; text-decoration: none; }
        .nav-link i { font-size: 22px; margin-bottom: 5px; display: block; }
        .nav-link span { font-size: 10px; font-weight: 700; }
        .nav-link.active { color: white; }

        /* MODAIS */
        .modal-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 9999; display: none; flex-direction: column;
            padding: 65px 20px 100px;
        }
        .modal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .modal-top h2 { font-size: 26px; font-weight: 900; }

        /* BIBLIOTECA CARDS */
        .lib-card {
            background: #1c1c1c; margin-bottom: 15px; border-radius: 12px;
            display: flex; align-items: center; padding: 18px; gap: 15px;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .lib-info { flex: 1; }
        .lib-info b { font-size: 18px; display: block; margin-bottom: 2px; }
        .lib-info span { font-size: 13px; color: var(--sp-gray); }
        .lib-btns { display: flex; gap: 20px; align-items: center; }
        .lib-btns i { font-size: 22px; }
        .btn-play-pl { color: var(--sp-green) !important; font-size: 32px !important; }
        .btn-del-pl { color: var(--sp-red) !important; opacity: 0.7; }

        /* FORMULÁRIOS */
        .input-dark {
            width: 100%; background: #252525; border: 1px solid #333; padding: 18px;
            border-radius: 8px; color: white; margin-bottom: 20px; font-size: 16px;
        }
        .btn-confirm {
            background: var(--sp-green); color: black; border: none;
            padding: 20px; border-radius: 50px; font-weight: 900; font-size: 16px; width: 100%;
        }

        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div id="loader"><i class="fa fa-circle-notch fa-spin fa-3x" style="color:var(--sp-green);"></i></div>

    <div id="m-lib" class="modal-ui">
        <div class="modal-top"><h2>Sua Biblioteca</h2><i class="fa fa-times fa-2x" onclick="closeU('m-lib')"></i></div>
        <div id="my-lib-render" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="m-create" class="modal-ui">
        <div class="modal-top"><h2>Nova Playlist</h2><i class="fa fa-times fa-2x" onclick="closeU('m-create')"></i></div>
        <input type="text" id="new-name" class="input-dark" placeholder="Nome da playlist...">
        <div id="select-tracks-ui" style="overflow-y:auto; flex:1; border-top: 1px solid #333; padding-top: 10px;"></div>
        <button class="btn-confirm" onclick="saveNewPL()">CRIAR PLAYLIST</button>
    </div>

    <div id="m-add-to" class="modal-ui">
        <div class="modal-top"><h2>Salvar em...</h2><i class="fa fa-times fa-2x" onclick="closeU('m-add-to')"></i></div>
        <div id="pl-options-render" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="scroller">
        <header><div class="logo">Zyver<span>Music</span></div></header>
        
        <div class="search-wrap">
            <i class="fa fa-search"></i>
            <input type="text" id="main-search" placeholder="O que você quer ouvir?" oninput="filterTracks()">
        </div>

        <div class="section-h">Top Cloud 10</div>
        <div id="top-row-ui" class="h-list"></div>

        <div class="section-h" style="margin-top:20px;">Explorar Tudo</div>
        <div id="main-list-ui"></div>
    </div>

    <div id="player-ui">
        <img id="p-img" class="p-thumb" src="">
        <div class="p-info">
            <b id="p-title">...</b>
            <span>ZYVER CLOUD AUDIO</span>
        </div>
        <i class="fa fa-play-circle" id="p-icon" onclick="doPlay()" style="font-size:38px;"></i>
        <audio id="core-engine"></audio>
    </div>

    <nav>
        <a href="#" class="nav-link active" onclick="location.reload()"><i class="fa fa-house"></i><span>Início</span></a>
        <a href="#" class="nav-link" onclick="openU('m-create')"><i class="fa fa-plus-square"></i><span>Criar</span></a>
        <a href="#" class="nav-link" onclick="loadLib()"><i class="fa fa-book-open"></i><span>Biblioteca</span></a>
    </nav>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, addDoc, doc, getDoc, updateDoc, deleteDoc, increment, query, where, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allSongs = [], selNew = [], targetSong = null, currentPL = [];
        let deviceID = localStorage.getItem('zyver_device_id');
        const engine = document.getElementById('core-engine');

        if(!deviceID) {
            deviceID = 'zy_' + Math.random().toString(36).substr(2, 10);
            localStorage.setItem('zyver_device_id', deviceID);
        }

        async function startApp() {
            try {
                const snap = await getDocs(collection(db, "musics"));
                allSongs = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
                
                const urlParams = new URLSearchParams(window.location.search);
                const plId = urlParams.get('pl');
                const playNowPL = urlParams.get('play');

                if(plId) {
                    const plSnap = await getDoc(doc(db, "playlists", plId));
                    if(plSnap.exists()) {
                        currentPL = plSnap.data().musicas || [];
                        renderMain(currentPL);
                        if(playNowPL && currentPL.length > 0) {
                            playNow(currentPL[0].id, currentPL[0].url, currentPL[0].title, currentPL[0].cover);
                        }
                    }
                } else {
                    renderMain(allSongs);
                }
                renderTop();
                document.getElementById('loader').style.display = 'none';
                
                // Scanner de resgate
                resgate();
            } catch(e) { console.error(e); }
        }

        function renderMain(data) {
            document.getElementById('main-list-ui').innerHTML = data.map(m => `
                <div class="track-item">
                    <img class="track-img" src="${m.cover}" onclick="playNow('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <div class="track-meta" onclick="playNow('${m.id}','${m.url}','${m.title}','${m.cover}')">
                        <b>${m.title}</b>
                        <span>Zyver Cloud</span>
                    </div>
                    <i class="fa fa-plus-circle" style="color:#555; font-size:22px; padding:10px;" onclick="preAdd('${m.id}')"></i>
                </div>
            `).join('');
        }

        function renderTop() {
            document.getElementById('top-row-ui').innerHTML = allSongs.slice(0, 10).map(m => `
                <div class="card-p" onclick="playNow('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <img src="${m.cover}">
                    <b>${m.title}</b>
                </div>
            `).join('');
        }

        window.playNow = (id, url, title, img) => {
            if(!url || url === "undefined") {
                const f = allSongs.find(s => s.id === id);
                if(f) { url = f.url; title = f.title; img = f.cover; }
            }
            if(!url) return;

            document.getElementById('player-ui').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-img').src = img;
            
            engine.src = url;
            engine.play();
            document.getElementById('p-icon').className = 'fa fa-pause-circle';
            updateDoc(doc(db, "musics", id), { plays: increment(1) });
        };

        window.doPlay = () => {
            if(engine.paused) { engine.play(); document.getElementById('p-icon').className = 'fa fa-pause-circle'; }
            else { engine.pause(); document.getElementById('p-icon').className = 'fa fa-play-circle'; }
        };

        window.loadLib = async () => {
            openU('m-lib');
            const render = document.getElementById('my-lib-render');
            render.innerHTML = '<div style="text-align:center; padding:20px;"><i class="fa fa-spinner fa-spin"></i></div>';
            
            const q = query(collection(db, "playlists"), where("ownerID", "==", deviceID));
            const snap = await getDocs(q);
            
            if(snap.empty) {
                render.innerHTML = '<p style="text-align:center; color:#555;">Sua biblioteca está vazia.</p>';
                return;
            }

            const docs = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.created - a.created);
            render.innerHTML = docs.map(p => `
                <div class="lib-card">
                    <div class="lib-info" onclick="window.location.href='?pl=${p.id}'">
                        <b>${p.nome}</b>
                        <span>${p.musicas ? p.musicas.length : 0} músicas</span>
                    </div>
                    <div class="lib-btns">
                        <i class="fa fa-play-circle btn-play-pl" onclick="window.location.href='?pl=${p.id}&play=true'"></i>
                        <i class="fa fa-share-nodes" onclick="copyPL('${p.id}')"></i>
                        <i class="fa fa-trash-can btn-del-pl" onclick="deletePL('${p.id}')"></i>
                    </div>
                </div>
            `).join('');
        };

        window.deletePL = async (id) => {
            if(confirm("Deseja excluir esta playlist?")) {
                await deleteDoc(doc(db, "playlists", id));
                loadLib();
            }
        };

        window.preAdd = (id) => {
            targetSong = allSongs.find(m => m.id === id);
            openU('m-add-to');
            loadOptions();
        };

        async function loadOptions() {
            const q = query(collection(db, "playlists"), where("ownerID", "==", deviceID));
            const snap = await getDocs(q);
            document.getElementById('pl-options-render').innerHTML = snap.docs.map(d => `
                <div class="lib-card" onclick="confirmAdd('${d.id}')"><b>${d.data().nome}</b></div>
            `).join('');
        }

        window.confirmAdd = async (id) => {
            await updateDoc(doc(db, "playlists", id), { musicas: arrayUnion(targetSong) });
            alert("Adicionado!"); closeU('m-add-to');
        };

        window.saveNewPL = async () => {
            const name = document.getElementById('new-name').value;
            if(!name || selNew.length === 0) return alert("Preencha tudo!");
            const tracks = allSongs.filter(m => selNew.includes(m.id));
            await addDoc(collection(db, "playlists"), {
                nome: name, musicas: tracks, ownerID: deviceID, created: Date.now()
            });
            alert("Criada!"); closeU('m-create'); selNew = [];
        };

        window.toggleSel = (id) => {
            const el = document.getElementById(`sel-${id}`);
            if(selNew.includes(id)) { selNew = selNew.filter(x => x !== id); el.style.background = "none"; }
            else { selNew.push(id); el.style.background = "rgba(29, 185, 84, 0.2)"; }
        };

        window.filterTracks = () => {
            const t = document.getElementById('main-search').value.toLowerCase();
            renderMain(allSongs.filter(m => m.title.toLowerCase().includes(t)));
        };

        async function resgate() {
            const snap = await getDocs(collection(db, "playlists"));
            snap.forEach(async d => {
                if(!d.data().ownerID) await updateDoc(doc(db, "playlists", d.id), { ownerID: deviceID });
            });
        }

        window.openU = (id) => {
            document.getElementById(id).style.display = 'flex';
            if(id === 'm-create') {
                document.getElementById('select-tracks-ui').innerHTML = allSongs.map(m => `
                    <div class="track-item" id="sel-${m.id}" onclick="toggleSel('${m.id}')">
                        <img class="track-img" src="${m.cover}"><b>${m.title}</b>
                    </div>
                `).join('');
            }
        };

        window.closeU = (id) => document.getElementById(id).style.display = 'none';
        window.copyPL = (id) => {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?pl=" + id);
            alert("Link copiado!");
        };

        startApp();
    </script>
</body>
</html>
