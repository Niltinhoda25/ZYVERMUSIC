<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Spotify Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #1DB954; --bg: #000; --surface: #121212; --text-dim: #b3b3b3; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Circular', 'Segoe UI', sans-serif; 
            padding-bottom: 110px; 
        }

        /* HEADER */
        header { 
            padding: 20px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            background: linear-gradient(to bottom, #1a1a1a, var(--bg));
        }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: #9d4edd; }
        .btn-clipes { background: #9d4edd; padding: 8px 15px; border-radius: 20px; text-decoration: none; color: white; font-size: 11px; font-weight: bold; }

        /* BUSCA */
        .search-container { padding: 0 15px 15px; }
        .search-box { 
            background: #242424; 
            display: flex; 
            align-items: center; 
            padding: 10px 15px; 
            border-radius: 8px; 
        }
        .search-box input { background: transparent; border: none; color: white; margin-left: 10px; width: 100%; outline: none; }

        /* SEÇÃO TITULO */
        .section-title { padding: 20px 15px 10px; font-size: 18px; font-weight: 800; }

        /* BIBLIOTECA ESTILO LISTA (O QUE VOCÊ PEDIU) */
        .lista-musicas { 
            display: flex; 
            flex-direction: column; 
            gap: 4px; 
            padding: 0 10px; 
        }

        .m-card { 
            display: flex; 
            align-items: center; 
            padding: 8px 10px; 
            border-radius: 6px;
            transition: background 0.2s;
        }
        .m-card:active { background: #282828; }

        .m-card img { 
            width: 52px; 
            height: 52px; 
            border-radius: 4px; 
            object-fit: cover; 
            margin-right: 14px; 
        }

        .m-info { flex: 1; overflow: hidden; }
        .m-info h4 { 
            font-size: 15px; 
            font-weight: 500; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            margin-bottom: 2px;
        }
        .m-info p { font-size: 12px; color: var(--text-dim); }

        /* ICONE DE OPÇÕES (3 PONTINHOS) */
        .m-card i.fa-ellipsis-v { color: var(--text-dim); padding: 10px; font-size: 14px; }

        /* PLAYER FLUTUANTE */
        #player { 
            position: fixed; 
            bottom: 15px; 
            left: 10px; 
            right: 10px; 
            background: #282828; 
            padding: 10px; 
            border-radius: 10px; 
            display: none; 
            align-items: center; 
            gap: 12px; 
            z-index: 2000;
        }
        .p-img { width: 42px; height: 42px; border-radius: 4px; }
        .p-meta { flex: 1; overflow: hidden; }
        .p-meta h5 { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-meta span { font-size: 10px; color: #9d4edd; font-weight: bold; }
        .btn-play { font-size: 20px; padding: 0 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ZYVER<span>MUSIC</span></div>
        <a href="clipes.html" class="btn-clipes"><i class="fa fa-play-circle"></i> CLIPES</a>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fa fa-search" style="color:#b3b3b3"></i>
            <input type="text" id="busca" placeholder="O que você quer ouvir?" onkeyup="filtrar()">
        </div>
    </div>

    <div class="section-title">Minha Biblioteca</div>
    <div id="grid-geral" class="lista-musicas">
        </div>

    <div id="player">
        <img id="p-img" class="p-img" src="">
        <div class="p-meta">
            <h5 id="p-name">Música</h5>
            <span>REPRODUZINDO AGORA</span>
        </div>
        <div class="btn-play" onclick="togglePlay()">
            <i class="fa fa-play" id="play-icon"></i>
        </div>
        <audio id="audio-engine"></audio>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let tracks = [];
        const audio = document.getElementById('audio-engine');

        async function init() {
            try {
                const snap = await getDocs(collection(db, "musics"));
                tracks = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderList(tracks);
            } catch (e) {
                console.error("Erro:", e);
            }
        }

        function renderList(data) {
            const container = document.getElementById('grid-geral');
            container.innerHTML = data.map(m => `
                <div class="m-card" onclick="play('${m.url}','${m.title}','${m.cover}')">
                    <img src="${m.cover}">
                    <div class="m-info">
                        <h4>${m.title}</h4>
                        <p>Música • Zyver Music</p>
                    </div>
                    <i class="fa fa-ellipsis-v"></i>
                </div>
            `).join('');
        }

        window.play = (url, name, img) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-name').innerText = name;
            document.getElementById('p-img').src = img;
            audio.src = url;
            audio.play();
            document.getElementById('play-icon').className = 'fa fa-pause';
        }

        window.togglePlay = () => {
            if(audio.paused) { 
                audio.play(); 
                document.getElementById('play-icon').className = 'fa fa-pause'; 
            } else { 
                audio.pause(); 
                document.getElementById('play-icon').className = 'fa fa-play'; 
            }
        }

        window.filtrar = () => {
            const t = document.getElementById('busca').value.toLowerCase();
            const filtrados = tracks.filter(m => m.title.toLowerCase().includes(t));
            renderList(filtrados);
        }

        init();
    </script>
</body>
</html>
