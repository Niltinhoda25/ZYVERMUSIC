<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZyverMusic | v9.5 Omega 9000%</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --sp-green: #1DB954; --sp-black: #121212; --sp-light: #181818; --sp-gray: #b3b3b3; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Figtree', sans-serif; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; position: fixed; color: white; }

        #scroller {
            height: 100vh; width: 100%; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 280px; scrollbar-width: none;
            background: linear-gradient(to bottom, #252525 0%, #121212 45%);
        }
        #scroller::-webkit-scrollbar { display: none; }

        header { padding: 50px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: -1.5px; }
        .logo span { color: var(--sp-green); }

        #shared-header { 
            display: none; padding: 15px; background: rgba(29, 185, 84, 0.15); 
            border-bottom: 2px solid var(--sp-green); align-items: center; justify-content: space-between;
        }

        .search-wrap { margin: 15px 20px 25px; position: relative; }
        .search-wrap input {
            width: 100%; background: #fff; border: none; padding: 16px 45px;
            border-radius: 4px; font-size: 15px; font-weight: 700; color: #000;
        }
        .search-wrap i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #555; }

        .section-h { padding: 15px 20px; font-size: 22px; font-weight: 800; }
        .h-list { display: flex; overflow-x: auto; padding: 10px 20px; gap: 16px; scrollbar-width: none; }
        .card-p { min-width: 155px; background: var(--sp-light); padding: 12px; border-radius: 8px; }
        .card-p img { width: 131px; height: 131px; border-radius: 4px; object-fit: cover; }
        .card-p b { display: block; margin-top: 12px; font-size: 13px; color: white; }

        .track-item { display: flex; align-items: center; padding: 12px 20px; }
        .track-img { width: 50px; height: 50px; border-radius: 4px; margin-right: 15px; object-fit: cover; }
        .track-meta { flex: 1; overflow: hidden; }
        .track-meta b { font-size: 16px; display: block; color: #fff; }

        #player-ui {
            position: fixed; bottom: 95px; left: 8px; right: 8px;
            background: #282828; border-radius: 8px; padding: 10px;
            display: none; align-items: center; gap: 12px; z-index: 6000;
        }
        .p-thumb { width: 45px; height: 45px; border-radius: 4px; object-fit: cover; }

        nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: #000; display: flex; justify-content: space-around; padding-top: 12px; z-index: 5000;
            border-top: 1px solid #222;
        }
        .nav-link { color: var(--sp-gray); text-align: center; flex: 1; text-decoration: none; }
        .nav-link.active { color: white; }
        .nav-link span { display: block; font-size: 10px; font-weight: 600; margin-top: 4px; }

        /* MODAL E TEXTO BRANCO 9000% */
        .modal-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121212; z-index: 9999; display: none; flex-direction: column;
            padding: 60px 20px; color: white !important;
        }
        .modal-ui * { color: white !important; }
        .modal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .input-dark { width: 100%; background: #333; border: 1px solid #444; padding: 18px; border-radius: 8px; color: white !important; margin-bottom: 20px; font-size: 16px; }
        .btn-confirm { background: var(--sp-green); color: black !important; border: none; padding: 20px; border-radius: 50px; font-weight: 900; font-size: 16px; margin-top: 15px; width: 100%; }
        
        .pl-box { padding: 20px; background: #222; margin-bottom: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
        .btn-add { color: var(--sp-gray) !important; font-size: 22px; padding: 10px; }
    </style>
</head>
<body>

    <div id="m-lib" class="modal-ui">
        <div class="modal-top"><h2>Sua Biblioteca</h2><i class="fa fa-times fa-2x" onclick="closeU('m-lib')"></i></div>
        <div id="my-lib-render" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="m-create" class="modal-ui">
        <div class="modal-top"><h2>Nova Playlist</h2><i class="fa fa-times fa-2x" onclick="closeU('m-create')"></i></div>
        <input type="text" id="new-name" class="input-dark" placeholder="Dê um nome...">
        <div id="select-tracks-ui" style="overflow-y:auto; flex:1;"></div>
        <button class="btn-confirm" onclick="saveNewPL()">CRIAR PLAYLIST PRIVADA</button>
    </div>

    <div id="m-add-to" class="modal-ui">
        <div class="modal-top"><h2>Adicionar em...</h2><i class="fa fa-times fa-2x" onclick="closeU('m-add-to')"></i></div>
        <div id="pl-options-render" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="scroller">
        <div id="shared-header">
            <span style="font-weight: 900; font-size: 14px;">Playlist de Outro Usuário</span>
            <button onclick="cloneCurrentPL()" style="background:var(--sp-green); border:none; padding:8px 15px; border-radius:20px; font-weight:900; font-size:11px;">COPIAR PARA MIM</button>
        </div>

        <header>
            <div class="logo">Zyver<span>Music</span></div>
            <i class="fa fa-expand" onclick="doFS()" style="opacity:0.4;"></i>
        </header>

        <div class="search-wrap"><i class="fa fa-search"></i><input type="text" id="main-search" placeholder="Buscar músicas..." oninput="filterTracks()"></div>

        <div class="section-h">Top Cloud</div>
        <div id="top-row-ui" class="h-list"></div>

        <div class="section-h" style="margin-top:20px;">Músicas Disponíveis</div>
        <div id="main-list-ui"></div>
    </div>

    <div id="player-ui">
        <img id="p-img" class="p-thumb" src=""><div class="p-info"><b id="p-title">...</b><span style="color:var(--sp-green); font-size:11px;">Tocando Agora</span></div>
        <div style="display:flex; align-items:center; gap:20px;"><i class="fa fa-play" id="p-icon" onclick="doPlay()" style="font-size:30px; color:white;"></i></div>
        <audio id="core-engine"></audio>
    </div>

    <nav>
        <a href="#" class="nav-link active" onclick="location.reload()"><i class="fa fa-house"></i><span>Início</span></a>
        <a href="#" class="nav-link" onclick="openU('m-create')"><i class="fa fa-plus-square"></i><span>Criar</span></a>
        <a href="#" class="nav-link" onclick="loadLib()"><i class="fa fa-book-open"></i><span>Biblioteca</span></a>
    </nav>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, addDoc, doc, getDoc, updateDoc, increment, query, orderBy, arrayUnion, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allSongs = [], selNew = [], targetSong = null, currentPLData = null;
        const engine = document.getElementById('core-engine');

        // GERAÇÃO DE ID UNICO PERMANENTE
        let deviceID = localStorage.getItem('zyver_device_id');
        if(!deviceID) {
            deviceID = 'u_' + Math.random().toString(36).substr(2, 12);
            localStorage.setItem('zyver_device_id', deviceID);
        }

        async function startApp() {
            const snap = await getDocs(query(collection(db, "musics"), orderBy("plays", "desc")));
            allSongs = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
            
            const plId = new URLSearchParams(window.location.search).get('pl');
            if(plId) {
                const plSnap = await getDoc(doc(db, "playlists", plId));
                if(plSnap.exists()) {
                    currentPLData = { id: plSnap.id, ...plSnap.data() };
                    renderMain(currentPLData.musicas);
                    if(currentPLData.ownerID !== deviceID) document.getElementById('shared-header').style.display = 'flex';
                }
            } else { renderMain(allSongs); }
            renderTop();
            
            // 🔥 RESTAURAÇÃO DE PLAYLISTS ANTIGAS (SISTEMA OMEGA)
            const rescueQuery = query(collection(db, "playlists"));
            const rescueSnap = await getDocs(rescueQuery);
            rescueSnap.forEach(async (d) => {
                const data = d.data();
                // Se a playlist não tem dono, ela se torna de quem abrir o app primeiro (Você)
                if(!data.ownerID || data.ownerID === "") {
                    await updateDoc(doc(db, "playlists", d.id), { ownerID: deviceID });
                }
            });
        }

        function renderMain(data) {
            document.getElementById('main-list-ui').innerHTML = data.map(m => `
                <div class="track-item">
                    <img class="track-img" src="${m.cover}" onclick="playNow('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <div class="track-meta" onclick="playNow('${m.id}','${m.url}','${m.title}','${m.cover}')"><b>${m.title}</b></div>
                    <i class="fa fa-plus btn-add" onclick="preAdd('${m.id}')"></i>
                </div>
            `).join('');
        }

        function renderTop() {
            document.getElementById('top-row-ui').innerHTML = allSongs.slice(0, 10).map(m => `
                <div class="card-p" onclick="playNow('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <img src="${m.cover}"><b>${m.title}</b>
                </div>
            `).join('');
        }

        window.playNow = (id, url, title, img) => {
            document.getElementById('player-ui').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-img').src = img;
            engine.src = url; engine.play();
            document.getElementById('p-icon').className = 'fa fa-pause';
            updateDoc(doc(db, "musics", id), { plays: increment(1) });
        };

        window.doPlay = () => {
            if(engine.paused) { engine.play(); document.getElementById('p-icon').className = 'fa fa-pause'; }
            else { engine.pause(); document.getElementById('p-icon').className = 'fa fa-play'; }
        };

        // BIBLIOTECA 100% PRIVADA
        window.loadLib = async () => {
            openU('m-lib');
            const q = query(collection(db, "playlists"), where("ownerID", "==", deviceID));
            const snap = await getDocs(q);
            const libDiv = document.getElementById('my-lib-render');
            libDiv.innerHTML = snap.empty ? "<p style='text-align:center; padding:40px;'>Nenhuma playlist encontrada.</p>" : 
                snap.docs.map(d => `
                    <div class="pl-box">
                        <div onclick="window.location.href='?pl=${d.id}'">${d.data().nome}</div>
                        <i class="fa fa-share-nodes" onclick="copyPL('${d.id}')" style="color:var(--sp-green); font-size:22px;"></i>
                    </div>
                `).join('');
        };

        window.cloneCurrentPL = async () => {
            if(!currentPLData) return;
            await addDoc(collection(db, "playlists"), {
                nome: currentPLData.nome + " (Cópia)",
                musicas: currentPLData.musicas,
                ownerID: deviceID
            });
            alert("Playlist salva na sua biblioteca!");
            document.getElementById('shared-header').style.display = 'none';
        };

        window.preAdd = async (id) => {
            targetSong = allSongs.find(m => m.id === id);
            openU('m-add-to');
            const q = query(collection(db, "playlists"), where("ownerID", "==", deviceID));
            const snap = await getDocs(q);
            document.getElementById('pl-options-render').innerHTML = snap.docs.map(d => `
                <div class="pl-box" onclick="confirmAdd('${d.id}')">${d.data().nome}</div>
            `).join('');
        };

        window.confirmAdd = async (idPL) => {
            await updateDoc(doc(db, "playlists", idPL), { musicas: arrayUnion(targetSong) });
            alert("Música adicionada!");
            closeU('m-add-to');
        };

        window.saveNewPL = async () => {
            const n = document.getElementById('new-name').value;
            if(!n || selNew.length === 0) return alert("Escolha o nome e as músicas!");
            const list = allSongs.filter(m => selNew.includes(m.id));
            await addDoc(collection(db, "playlists"), { nome: n, musicas: list, ownerID: deviceID });
            alert("Playlist Criada!");
            closeU('m-create');
        };

        window.toggleSel = (id) => {
            const el = document.getElementById(`sel-${id}`);
            if(selNew.includes(id)) { selNew = selNew.filter(x => x !== id); el.style.background = "none"; }
            else { selNew.push(id); el.style.background = "rgba(29, 185, 84, 0.3)"; }
        };

        window.openU = (id) => {
            document.getElementById(id).style.display = 'flex';
            if(id === 'm-create') {
                document.getElementById('select-tracks-ui').innerHTML = allSongs.map(m => `
                    <div class="track-item" id="sel-${m.id}" onclick="toggleSel('${m.id}')">
                        <img class="track-img" src="${m.cover}"><b>${m.title}</b>
                    </div>
                `).join('');
            }
        };
        window.closeU = (id) => document.getElementById(id).style.display = 'none';
        window.copyPL = (id) => {
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?pl=" + id);
            alert("Link de compartilhamento copiado!");
        };
        window.doFS = () => { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };

        startApp();
    </script>
</body>
</html>
