<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | v5 Neon</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --accent: #bc47fb; 
            --bg: #0a0118; 
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --success: #00f2fe; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(135deg, #0a0118 0%, #1a083d 100%); 
            color: white; 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            height: 100vh;
            overflow: hidden;
        }

        #main-content { height: 100vh; overflow-y: auto; padding-bottom: 180px; scrollbar-width: none; }
        #main-content::-webkit-scrollbar { display: none; }

        header { padding: 30px 20px; text-align: center; }
        .logo { font-size: 26px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 15px var(--accent); }
        .logo span { color: var(--accent); }

        /* BUSCA GLASS */
        .search-box { margin: 0 20px 20px; position: relative; }
        .search-box input { 
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 15px 45px; border-radius: 20px; color: white; backdrop-filter: blur(10px);
        }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--accent); }

        .section-title { padding: 10px 20px; font-size: 14px; font-weight: 800; text-transform: uppercase; color: #a1a1a1; }

        /* LISTA ESTILO SPOTIFY */
        .track-card { 
            display: flex; align-items: center; padding: 12px 20px; margin: 5px 15px;
            background: var(--glass); border-radius: 15px; border: 1px solid var(--glass-border);
        }
        .track-card img { width: 50px; height: 50px; border-radius: 10px; margin-right: 15px; }
        .track-info { flex: 1; overflow: hidden; }
        .track-info b { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        .track-info span { font-size: 11px; color: #888; }
        
        .btn-add-quick { font-size: 20px; color: var(--accent); padding: 10px; }

        /* MODAIS */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 6000; display: none; flex-direction: column; padding: 25px;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* PLAYER FLOAT */
        #player { 
            position: fixed; bottom: 85px; left: 15px; right: 15px; 
            background: rgba(20, 10, 40, 0.95); border: 1px solid var(--accent);
            padding: 12px; border-radius: 20px; display: none; align-items: center; gap: 12px; z-index: 5000;
        }
        .p-img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--accent); }
        .spinning { animation: rotate 5s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* NAV BAR INFERIOR */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px); display: flex; justify-content: space-around;
            padding: 15px 0 25px; border-top: 1px solid var(--glass-border); z-index: 4000;
        }
        .nav-item { color: #666; font-size: 20px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 10px; font-weight: bold; }

        /* PICKER DE PLAYLIST */
        .pl-option { 
            background: var(--glass); padding: 20px; border-radius: 15px; 
            margin-bottom: 10px; border: 1px solid var(--glass-border); text-align: center; font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="add-to-pl-modal" class="modal">
        <div class="modal-header">
            <h3>Adicionar à Playlist</h3>
            <i class="fa fa-times" onclick="fecharModalAdd()"></i>
        </div>
        <div id="pl-options-list" style="overflow-y: auto;"></div>
    </div>

    <div id="playlists-modal" class="modal">
        <div class="modal-header"><h3>Minhas Coleções</h3> <i class="fa fa-times" onclick="fecharPlaylists()"></i></div>
        <div id="my-collections-area" style="overflow-y: auto;"></div>
    </div>

    <div id="create-modal" class="modal">
        <div class="modal-header"><h3>Nova Pasta</h3> <i class="fa fa-times" onclick="fecharCriador()"></i></div>
        <input type="text" id="new-pl-name" style="width:100%; background:var(--glass); border:1px solid var(--accent); padding:18px; border-radius:15px; color:white; margin-bottom:20px;" placeholder="Nome da playlist...">
        <div id="create-selection-list" style="flex:1; overflow-y: auto;"></div>
        <button onclick="salvarNovaPlaylist()" style="background:var(--accent); color:white; padding:20px; border-radius:15px; border:none; font-weight:900; margin-top:20px;">CRIAR PLAYLIST</button>
    </div>

    <div id="main-content">
        <header><div class="logo">ZYVER<span>MUSIC</span></div></header>

        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" id="search-input" placeholder="Buscar no v5..." oninput="filtrarMusicas()">
        </div>

        <div id="shared-section" style="display:none; padding: 10px 20px;">
            <div class="section-title">Playlist Recebida</div>
            <div id="shared-list"></div>
        </div>

        <div class="section-title">Top Hits</div>
        <div id="top-list" style="display:flex; overflow-x:auto; padding: 0 15px 20px; gap: 10px; scrollbar-width: none;"></div>

        <div class="section-title">Explorar</div>
        <div id="full-list"></div>
    </div>

    <div id="player">
        <img id="p-img" class="p-img" src="">
        <div class="track-info">
            <b id="p-title">Música</b>
            <span id="p-artist">ZyverMusic Premium</span>
        </div>
        <i class="fa fa-pause" id="play-btn" onclick="togglePlay()" style="font-size:25px; margin-right:10px;"></i>
        <audio id="audio-engine"></audio>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()">
            <i class="fa fa-home"></i><span>Início</span>
        </div>
        <div class="nav-item" onclick="abrirCriador()">
            <i class="fa fa-plus-circle" style="color:var(--accent); font-size:28px;"></i><span>Criar</span>
        </div>
        <div class="nav-item" onclick="abrirPlaylists()">
            <i class="fa fa-compact-disc"></i><span>Library</span>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, addDoc, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        let allMusics = [];
        let myPlaylists = JSON.parse(localStorage.getItem('z_v5_pl')) || [];
        let currentTrackToAdd = null;
        const audio = document.getElementById('audio-engine');
        const pImg = document.getElementById('p-img');

        async function init() {
            const snap = await getDocs(collection(db, "musics"));
            allMusics = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
            renderAll(allMusics);
            renderTop();
            checkShared();
        }

        // --- NOVO BOTÃO "+" (QUICK ADD) ---
        window.abrirModalAdd = (id) => {
            currentTrackToAdd = allMusics.find(m => m.id === id);
            document.getElementById('add-to-pl-modal').style.display = 'flex';
            const list = document.getElementById('pl-options-list');
            
            if(myPlaylists.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#666;'>Crie uma playlist primeiro!</p>";
                return;
            }

            list.innerHTML = myPlaylists.map(pl => `
                <div class="pl-option" onclick="adicionarMusicaAPlaylist('${pl.id}')">
                    ${pl.nome}
                </div>
            `).join('');
        };

        window.adicionarMusicaAPlaylist = (plId) => {
            const index = myPlaylists.findIndex(p => p.id == plId);
            const jaTem = myPlaylists[index].musicas.some(m => m.id === currentTrackToAdd.id);

            if(jaTem) {
                alert("Essa música já está na playlist '" + myPlaylists[index].nome + "'!");
            } else {
                myPlaylists[index].musicas.push(currentTrackToAdd);
                localStorage.setItem('z_v5_pl', JSON.stringify(myPlaylists));
                alert("Adicionado com sucesso!");
                fecharModalAdd();
            }
        };

        window.fecharModalAdd = () => document.getElementById('add-to-pl-modal').style.display = 'none';

        // --- VISUAL E FILTRO ---
        window.filtrarMusicas = () => {
            const val = document.getElementById('search-input').value.toLowerCase();
            renderAll(allMusics.filter(m => m.title.toLowerCase().includes(val)));
        };

        function renderAll(data) {
            document.getElementById('full-list').innerHTML = data.map(m => `
                <div class="track-card">
                    <img src="${m.cover}" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <div class="track-info" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')">
                        <b>${m.title}</b>
                        <span>ZyverMusic • Single</span>
                    </div>
                    <i class="fa fa-plus-circle btn-add-quick" onclick="abrirModalAdd('${m.id}')"></i>
                </div>
            `).join('');
        }

        // --- LOGICA PLAYER ---
        window.play = (id, url, title, img) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            pImg.src = img;
            pImg.classList.add('spinning');
            audio.src = url;
            audio.play();
            updateDoc(doc(db, "musics", id), { plays: increment(1) });
        };

        window.togglePlay = () => {
            if(audio.paused) { audio.play(); pImg.classList.add('spinning'); document.getElementById('play-btn').className = 'fa fa-pause'; }
            else { audio.pause(); pImg.classList.remove('spinning'); document.getElementById('play-btn').className = 'fa fa-play'; }
        };

        // --- GESTÃO PLAYLISTS ---
        window.abrirPlaylists = () => {
            document.getElementById('playlists-modal').style.display = 'flex';
            const area = document.getElementById('my-collections-area');
            area.innerHTML = myPlaylists.map(pl => `
                <div style="background:var(--glass); border-radius:20px; padding:15px; margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${pl.nome}</b>
                        <div>
                            <i class="fa fa-share" style="color:var(--success); margin-right:15px;" onclick="sharePL('${pl.cloudId}','${pl.nome}')"></i>
                            <i class="fa fa-trash" style="color:var(--danger);" onclick="deletePL('${pl.id}')"></i>
                        </div>
                    </div>
                    <div style="display:flex; gap:10px; overflow-x:auto; margin-top:10px;">
                        ${pl.musicas.map(m => `<img src="${m.cover}" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')" style="width:60px; height:60px; border-radius:10px;">`).join('')}
                    </div>
                </div>
            `).join('');
        };

        window.deletePL = (id) => {
            if(confirm("Excluir?")) {
                myPlaylists = myPlaylists.filter(p => p.id != id);
                localStorage.setItem('z_v5_pl', JSON.stringify(myPlaylists));
                abrirPlaylists();
            }
        };

        window.sharePL = (cloudId, nome) => {
            const link = window.location.origin + window.location.pathname + "?pl=" + cloudId;
            navigator.share({ title: 'Playlist: ' + nome, url: link });
        };

        window.abrirCriador = () => {
            document.getElementById('create-modal').style.display = 'flex';
            document.getElementById('create-selection-list').innerHTML = allMusics.map(m => `
                <div class="track-card" id="sel-${m.id}" onclick="toggleSelect('${m.id}')" style="margin:5px 0;">
                    <img src="${m.cover}"> <b>${m.title}</b>
                </div>
            `).join('');
        };

        let selecionadas = [];
        window.toggleSelect = (id) => {
            const el = document.getElementById(`sel-${id}`);
            if(selecionadas.includes(id)) { 
                selecionadas = selecionadas.filter(x => x !== id); 
                el.style.border = "1px solid var(--glass-border)";
            } else { 
                selecionadas.push(id); 
                el.style.border = "1px solid var(--accent)";
            }
        };

        window.salvarNovaPlaylist = async () => {
            const nome = document.getElementById('new-pl-name').value;
            if(!nome || selecionadas.length === 0) return alert("Preencha tudo!");
            const data = allMusics.filter(m => selecionadas.includes(m.id));
            const cloud = await addDoc(collection(db, "playlists"), { nome, musicas: data });
            myPlaylists.push({id: Date.now(), cloudId: cloud.id, nome, musicas: data});
            localStorage.setItem('z_v5_pl', JSON.stringify(myPlaylists));
            fecharCriador();
            abrirPlaylists();
        };

        window.fecharCriador = () => { document.getElementById('create-modal').style.display = 'none'; selecionadas = []; };
        window.fecharPlaylists = () => document.getElementById('playlists-modal').style.display = 'none';

        function renderTop() {
            const top = [...allMusics].sort((a,b) => (b.plays || 0) - (a.plays || 0)).slice(0, 10);
            document.getElementById('top-list').innerHTML = top.map(m => `
                <div onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')" style="min-width:120px; text-align:center;">
                    <img src="${m.cover}" style="width:120px; height:120px; border-radius:20px; border:1px solid var(--glass-border);">
                    <b style="font-size:11px; display:block; margin-top:5px; white-space:nowrap; overflow:hidden;">${m.title}</b>
                </div>
            `).join('');
        }

        async function checkShared() {
            const pid = new URLSearchParams(window.location.search).get('pl');
            if(pid) {
                const docSnap = await getDoc(doc(db, "playlists", pid));
                if(docSnap.exists()){
                    const d = docSnap.data();
                    document.getElementById('shared-section').style.display = 'block';
                    document.getElementById('shared-list').innerHTML = `
                        <div class="track-card" style="background:var(--accent); border:none;">
                            <div class="track-info"><b>Playlist de Amigo: ${d.nome}</b></div>
                            <button onclick="importarPL('${pid}')" style="background:white; color:black; border:none; padding:8px 15px; border-radius:10px; font-weight:900;">SALVAR</button>
                        </div>
                    `;
                }
            }
        }

        window.importarPL = async (pid) => {
            const docSnap = await getDoc(doc(db, "playlists", pid));
            const d = docSnap.data();
            myPlaylists.push({id: Date.now(), cloudId: pid, nome: d.nome, musicas: d.musicas});
            localStorage.setItem('z_v5_pl', JSON.stringify(myPlaylists));
            alert("Playlist Importada!");
            location.href = window.location.pathname;
        };

        init();
    </script>
</body>
</html>
