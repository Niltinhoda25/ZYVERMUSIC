<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #9d4edd;
            --bg-deep: #0a0a0a;
            --surface: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { 
            background: var(--bg-deep); 
            color: var(--text-main); 
            line-height: 1.5;
            padding-bottom: 110px; /* Espaço para o player */
        }

        /* Header Minimalista */
        header {
            padding: 20px 15px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 20px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        .btn-clipes {
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.3);
        }

        /* Busca Moderna */
        .search-container { padding: 0 15px 20px; }
        .search-box {
            background: var(--surface);
            display: flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .search-box input {
            background: transparent;
            border: none;
            color: white;
            margin-left: 10px;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        /* Seções */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
        }
        .section-header h2 { font-size: 18px; font-weight: 800; }

        /* Ranking Horizontal (Destaques) */
        .trending-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 15px 25px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }
        .trending-scroll::-webkit-scrollbar { display: none; }

        .trending-card {
            min-width: 280px;
            background: linear-gradient(135deg, #2a2a2a 0%, #151515 100%);
            padding: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            scroll-snap-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .trend-rank { font-size: 32px; font-weight: 900; color: rgba(255,255,255,0.1); }
        .trending-card img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }
        .trend-info h3 { font-size: 15px; margin-bottom: 4px; }
        .trend-info p { font-size: 12px; color: var(--text-dim); }

        /* Grid de Exploração (2 Colunas para ser Legível) */
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .music-item {
            background: var(--surface);
            padding: 10px;
            border-radius: 16px;
            transition: transform 0.2s;
        }
        .music-item:active { transform: scale(0.95); }

        .music-item img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .music-item h4 {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-item p { font-size: 11px; color: var(--text-dim); }

        /* Player Flutuante Moderno */
        #player {
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px;
            border-radius: 20px;
            display: none;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .p-thumb { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; }
        .p-meta { flex: 1; overflow: hidden; }
        .p-meta h5 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-meta p { font-size: 11px; color: var(--accent); font-weight: 600; }

        .p-controls { display: flex; align-items: center; gap: 15px; }
        .btn-play-sm { 
            width: 38px; height: 38px; background: white; color: black; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ZYVER<span>MUSIC</span></div>
        <a href="clipes.html" class="btn-clipes"><i class="fa-solid fa-bolt"></i> CLIPES</a>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fa fa-search" style="color: #666;"></i>
            <input type="text" id="main-search" placeholder="O que você quer ouvir?" onkeyup="search()">
        </div>
    </div>

    <div class="section-header">
        <h2>Em Alta</h2>
    </div>
    <div id="top-ranking" class="trending-scroll">
        </div>

    <div class="section-header">
        <h2>Sua Biblioteca</h2>
    </div>
    <div id="main-grid" class="explore-grid">
        </div>

    <div id="player">
        <img id="p-img" class="p-thumb" src="">
        <div class="p-meta">
            <h5 id="p-title">Música</h5>
            <p>Tocando agora</p>
        </div>
        <div class="p-controls">
            <div class="btn-play-sm" onclick="togglePlay()">
                <i id="play-icon" class="fa fa-play"></i>
            </div>
        </div>
        <audio id="audio-core"></audio>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allMusic = [];
        const audio = document.getElementById('audio-core');

        async function loadApp() {
            const snap = await getDocs(collection(db, "musics"));
            allMusic = snap.docs.map(d => ({id: d.id, ...d.data()}));

            // Ranking
            const top = [...allMusic].sort((a,b) => (b.plays || 0) - (a.plays || 0)).slice(0, 5);
            renderTrending(top);
            
            // Grid
            renderGrid(allMusic);
        }

        function renderTrending(data) {
            document.getElementById('top-ranking').innerHTML = data.map((m, i) => `
                <div class="trending-card" onclick="play('${m.url}','${m.title}','${m.cover}')">
                    <span class="trend-rank">${i+1}</span>
                    <img src="${m.cover}">
                    <div class="trend-info">
                        <h3>${m.title}</h3>
                        <p>${m.plays || 0} reproduções</p>
                    </div>
                </div>
            `).join('');
        }

        function renderGrid(data) {
            document.getElementById('main-grid').innerHTML = data.map(m => `
                <div class="music-item" onclick="play('${m.url}','${m.title}','${m.cover}')">
                    <img src="${m.cover}">
                    <h4>${m.title}</h4>
                    <p>Música Oficial</p>
                </div>
            `).join('');
        }

        window.play = (url, title, img) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-img').src = img;
            audio.src = url;
            audio.play();
            document.getElementById('play-icon').className = 'fa fa-pause';
        }

        window.togglePlay = () => {
            if(audio.paused) { audio.play(); document.getElementById('play-icon').className = 'fa fa-pause'; }
            else { audio.pause(); document.getElementById('play-icon').className = 'fa fa-play'; }
        }

        window.search = () => {
            const val = document.getElementById('main-search').value.toLowerCase();
            renderGrid(allMusic.filter(m => m.title.toLowerCase().includes(val)));
        }

        loadApp();
    </script>
</body>
</html>
