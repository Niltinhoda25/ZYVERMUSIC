<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyverMusic | Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --purple: #8a2be2; --dark: #0b0b0b; --card-bg: #181818; --orange: #ff7a00; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; padding-bottom: 110px; overflow-x: hidden; }
        
        /* Header */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 5%; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #222;
        }
        .logo { font-weight: 900; font-size: 24px; }
        .logo span { color: var(--purple); }

        .search-box { flex: 1; max-width: 500px; margin: 0 20px; position: relative; }
        .search-box input { 
            width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 10px 40px; 
            border-radius: 25px; color: white; outline: none;
        }
        .search-box i { position: absolute; left: 15px; top: 12px; color: #666; }

        /* SEÇÃO TOP 10 (ESTILO RANKING LATERAL) */
        .ranking-container { 
            display: flex; overflow-x: auto; gap: 20px; padding: 20px 5%;
            scrollbar-width: none; /* Esconde scroll no Firefox */
        }
        .ranking-container::-webkit-scrollbar { display: none; } /* Esconde scroll no Chrome */

        .ranking-card { 
            min-width: 300px; background: var(--card-bg); border-radius: 20px; 
            padding: 20px; display: flex; align-items: center; gap: 20px;
            border: 1px solid #222; cursor: pointer; transition: 0.3s;
        }
        .ranking-card:hover { transform: scale(1.05); border-color: var(--purple); }

        .rank-number { 
            font-size: 40px; font-weight: 900; font-style: italic;
            color: transparent; -webkit-text-stroke: 2px rgba(138,43,226,0.5);
        }
        .ranking-card img { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; }
        .ranking-info h3 { font-size: 16px; margin-bottom: 5px; }
        .ranking-info p { font-size: 12px; color: #888; text-transform: uppercase; }

        /* SEÇÃO EXPLORAR TUDO (BIBLIOTECA) */
        .container { padding: 0 5%; }
        .section-title { margin: 30px 0 20px; font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .section-title i { color: var(--orange); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 10px; transition: 0.3s; border: 1px solid transparent; }
        .card:hover { border-color: var(--purple); background: #222; }
        .card img { width: 100%; aspect-ratio: 1/1; border-radius: 8px; object-fit: cover; cursor: pointer; }
        .card-info { padding-top: 10px; }
        .card-info h4 { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        /* Player Fixo */
        #player { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: #121212; 
            padding: 15px 5%; border-top: 2px solid var(--purple); display: none; 
            align-items: center; justify-content: space-between; z-index: 2000;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">ZYVER<span>MUSIC</span></div>
    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" id="inputBusca" placeholder="Pesquisar músicas..." onkeyup="filtrar()">
    </div>
    <a href="clipes.html" style="background:var(--purple); color:white; padding:8px 15px; border-radius:20px; text-decoration:none; font-size:12px; font-weight:bold;">🎥 CLIPES</a>
</header>

<div class="container">
    <h2 class="section-title"><i class="fa fa-fire"></i> AS MAIS TOCADAS</h2>
</div>

<div id="top-10" class="ranking-container">
    </div>

<div class="container">
    <h2 class="section-title">Explorar Tudo</h2>
    <div id="grid-geral" class="grid">
        </div>
</div>

<div id="player">
    <div style="display:flex; align-items:center; gap:15px;">
        <img id="p-capa" src="" style="width:50px; border-radius:5px;">
        <div>
            <div id="p-titulo" style="font-weight:bold; font-size:14px;"></div>
            <div style="font-size:12px; color:var(--purple);">A REPRODUZIR AGORA</div>
        </div>
    </div>
    <audio id="main-audio" controls style="flex:1; max-width:500px; margin: 0 20px;"></audio>
</div>

<script type="module">
    import { db } from "./firebase-config.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    let musicas = [];

    async function iniciar() {
        const snap = await getDocs(collection(db, "musics"));
        musicas = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        // Ordenar por plays para o Top 10
        const top10 = [...musicas].sort((a, b) => (b.plays || 0) - (a.plays || 0)).slice(0, 10);
        
        renderRanking(top10);
        renderBiblioteca(musicas);
    }

    function renderRanking(lista) {
        const container = document.getElementById('top-10');
        container.innerHTML = lista.map((m, index) => `
            <div class="ranking-card" onclick="tocar('${m.url}', '${m.title}', '${m.cover}')">
                <div class="rank-number">#${index + 1}</div>
                <img src="${m.cover}">
                <div class="ranking-info">
                    <h3>${m.title}</h3>
                    <p>${m.plays || 0} EXECUÇÕES</p>
                </div>
            </div>
        `).join('');
    }

    function renderBiblioteca(lista) {
        const grid = document.getElementById('grid-geral');
        grid.innerHTML = lista.map(m => `
            <div class="card">
                <img src="${m.cover}" onclick="tocar('${m.url}', '${m.title}', '${m.cover}')">
                <div class="card-info">
                    <h4>${m.title}</h4>
                    <div style="display:flex; justify-content:space-between; margin-top:8px;">
                         <i class="fa fa-heart" style="cursor:pointer; font-size:12px;" onclick="alert('Favoritado!')"></i>
                         <i class="fa fa-share" style="cursor:pointer; font-size:12px;" onclick="alert('Link copiado!')"></i>
                    </div>
                </div>
            </div>
        `).join('');
    }

    window.tocar = (url, title, cover) => {
        document.getElementById('player').style.display = 'flex';
        document.getElementById('main-audio').src = url;
        document.getElementById('main-audio').play();
        document.getElementById('p-titulo').innerText = title;
        document.getElementById('p-capa').src = cover;
    };

    window.filtrar = () => {
        const t = document.getElementById('inputBusca').value.toLowerCase();
        const f = musicas.filter(m => m.title.toLowerCase().includes(t));
        renderBiblioteca(f);
    };

    iniciar();
</script>
</body>
</html>
