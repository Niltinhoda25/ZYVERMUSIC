<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | v7.0 Elite</title>
    
    <script src="https://alwingulla.com/88/prm/atama.js" async></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --accent: #bc47fb; --bg: #0a0118; 
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --success: #00f2fe;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: linear-gradient(135deg, #0a0118 0%, #1a083d 100%); 
            color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
        }

        #main-content { height: 100vh; overflow-y: auto; padding-bottom: 220px; scrollbar-width: none; }
        #main-content::-webkit-scrollbar { display: none; }

        header { padding: 35px 20px; text-align: center; }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px var(--accent); }
        .logo span { color: var(--accent); }

        .search-box { margin: 0 20px 25px; position: relative; }
        .search-box input { 
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 16px 45px; border-radius: 20px; color: white; backdrop-filter: blur(15px); outline: none;
        }
        .search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--accent); }

        .section-title { padding: 15px 20px; font-size: 13px; font-weight: 800; text-transform: uppercase; color: #a1a1a1; display: flex; align-items: center; gap: 8px; }

        /* --- CORREÇÃO DAS IMAGENS (7000% FIX) --- */
        
        /* Capas do Top 10 / Mais Tocadas */
        .top-card { min-width: 145px; text-align: center; }
        .top-img-wrapper {
            width: 145px; 
            height: 145px; /* Altura forçada */
            border-radius: 25px;
            overflow: hidden; /* Corta o que sobrar */
            border: 1.5px solid var(--glass-border);
            background: #111;
        }
        .top-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* A mágica que preenche tudo sem barras pretas */
            display: block;
        }

        /* Capas da Lista Geral e Playlists */
        .track-card { 
            display: flex; align-items: center; padding: 12px 18px; margin: 8px 15px;
            background: var(--glass); border-radius: 20px; border: 1px solid var(--glass-border);
        }
        .track-img-box {
            width: 55px; height: 55px; 
            border-radius: 12px; margin-right: 15px; 
            overflow: hidden; flex-shrink: 0;
            background: #111;
        }
        .track-img-box img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .track-info { flex: 1; overflow: hidden; }
        .track-info b { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px; }
        .track-info span { font-size: 11px; color: #888; }
        
        .btn-add-quick { font-size: 22px; color: var(--accent); padding: 5px; cursor: pointer; }

        /* PLAYER E NAV */
        #player { 
            position: fixed; bottom: 95px; left: 12px; right: 12px; 
            background: rgba(20, 10, 45, 0.98); border: 1.5px solid var(--accent);
            padding: 12px; border-radius: 25px; display: none; align-items: center; gap: 12px; z-index: 5000;
        }
        .p-img-box { width: 50px; height: 50px; border-radius: 50%; border: 2.5px solid var(--accent); overflow: hidden; flex-shrink: 0; }
        .p-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .spinning { animation: rotate 5s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(25px); display: flex; justify-content: space-around;
            padding: 12px 0 30px; border-top: 1px solid var(--glass-border); z-index: 4000;
        }
        .nav-item { color: #555; font-size: 22px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 10px; font-weight: 800; }

        /* MODAIS */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            z-index: 6000; display: none; flex-direction: column; padding: 25px;
        }
    </style>
</head>
<body>

    <div id="add-to-pl-modal" class="modal">
        <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:20px;"><h3>Salvar em...</h3><i class="fa fa-times" onclick="fecharModalAdd()"></i></div>
        <div id="pl-options-list" style="overflow-y: auto; flex:1;"></div>
    </div>

    <div id="playlists-modal" class="modal">
        <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:20px;"><h3>Minha Biblioteca</h3> <i class="fa fa-times" onclick="fecharPlaylists()"></i></div>
        <div id="library-content" style="overflow-y: auto; flex:1;"></div>
    </div>

    <div id="create-modal" class="modal">
        <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:20px;"><h3>Nova Playlist</h3> <i class="fa fa-times" onclick="fecharCriador()"></i></div>
        <input type="text" id="new-pl-name" style="width:100%; background:var(--glass); border:1px solid var(--accent); padding:16px; border-radius:15px; color:white; margin-bottom:15px; outline:none;" placeholder="Nome da pasta...">
        <div id="create-selection-list" style="flex:1; overflow-y: auto;"></div>
        <button onclick="salvarNovaPlaylist()" style="background:var(--accent); color:white; padding:18px; border-radius:18px; border:none; font-weight:900; margin-top:15px;">CRIAR PLAYLIST</button>
    </div>

    <div id="main-content">
        <header><div class="logo">ZYVER<span>MUSIC</span></div></header>

        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" id="search-input" placeholder="O que vamos ouvir?" oninput="filtrarMusicas()">
        </div>

        <div class="section-title"><i class="fa fa-bolt"></i> Mais Tocadas</div>
        <div id="top-list" style="display:flex; overflow-x:auto; padding: 0 15px 15px; gap: 15px; scrollbar-width: none;"></div>

        <div class="section-title"><i class="fa fa-compact-disc"></i> Biblioteca Geral</div>
        <div id="full-list"></div>
    </div>

    <div id="player">
        <div class="p-img-box"><img id="p-img" src=""></div>
        <div class="track-info">
            <b id="p-title">Música</b>
            <span style="color:var(--accent);">Zyver v7.0 Full</span>
        </div>
        <i class="fa fa-pause" id="play-btn" onclick="togglePlay()" style="font-size:28px; margin-right:10px;"></i>
        <audio id="audio-engine"></audio>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()"><i class="fa fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="abrirCriador()"><i class="fa fa-plus-circle" style="font-size:32px; color:var(--accent);"></i><span>Criar</span></div>
        <div class="nav-item" onclick="abrirPlaylists()"><i class="fa fa-layer-group"></i><span>Library</span></div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, addDoc, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        let allMusics = [];
        let myPlaylists = JSON.parse(localStorage.getItem('z_v6_pl')) || [];

        const audio = document.getElementById('audio-engine');
        const pImg = document.getElementById('p-img');

        async function init() {
            const snap = await getDocs(collection(db, "musics"));
            allMusics = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
            renderAll(allMusics);
            renderTop();
        }

        // --- RENDERIZAÇÃO COM CORREÇÃO DE IMAGEM ---
        function renderAll(data) {
            document.getElementById('full-list').innerHTML = data.map(m => `
                <div class="track-card">
                    <div class="track-img-box" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')">
                        <img src="${m.cover}">
                    </div>
                    <div class="track-info" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')">
                        <b>${m.title}</b>
                        <span>Zyver Original</span>
                    </div>
                    <i class="fa fa-plus-circle btn-add-quick" onclick="abrirModalAdd('${m.id}')"></i>
                </div>
            `).join('');
        }

        function renderTop() {
            const top = [...allMusics].sort((a,b) => (b.plays || 0) - (a.plays || 0)).slice(0, 10);
            document.getElementById('top-list').innerHTML = top.map(m => `
                <div class="top-card" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <div class="top-img-wrapper"><img src="${m.cover}"></div>
                    <b style="font-size:12px; display:block; margin-top:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${m.title}</b>
                </div>
            `).join('');
        }

        // --- LÓGICA DO PLAYER ---
        window.play = (id, url, title, img) => {
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            pImg.src = img;
            pImg.parentElement.classList.add('spinning');
            audio.src = url;
            audio.play();
            updateDoc(doc(db, "musics", id), { plays: increment(1) });
        };

        window.togglePlay = () => {
            if(audio.paused) { audio.play(); pImg.parentElement.classList.add('spinning'); document.getElementById('play-btn').className = 'fa fa-pause'; }
            else { audio.pause(); pImg.parentElement.classList.remove('spinning'); document.getElementById('play-btn').className = 'fa fa-play'; }
        };

        // --- FUNÇÕES DE PLAYLIST (MANTIDAS DO V6) ---
        let trackToAdd = null;
        window.abrirModalAdd = (id) => {
            trackToAdd = allMusics.find(m => m.id === id);
            document.getElementById('add-to-pl-modal').style.display = 'flex';
            const list = document.getElementById('pl-options-list');
            if(myPlaylists.length === 0) { list.innerHTML = "<p style='text-align:center; padding:20px;'>Crie uma playlist primeiro!</p>"; return; }
            list.innerHTML = myPlaylists.map(pl => `<div style="background:var(--glass); padding:18px; border-radius:15px; margin-bottom:10px; text-align:center; font-weight:800;" onclick="adicionarAqui('${pl.id}')">${pl.nome}</div>`).join('');
        };

        window.adicionarAqui = (plId) => {
            const idx = myPlaylists.findIndex(p => p.id == plId);
            if(myPlaylists[idx].musicas.some(m => m.id === trackToAdd.id)) alert("Já está na playlist!");
            else {
                myPlaylists[idx].musicas.push(trackToAdd);
                localStorage.setItem('z_v6_pl', JSON.stringify(myPlaylists));
                alert("Música salva!");
                document.getElementById('add-to-pl-modal').style.display = 'none';
            }
        };

        window.fecharModalAdd = () => document.getElementById('add-to-pl-modal').style.display = 'none';
        window.abrirPlaylists = () => {
            document.getElementById('playlists-modal').style.display = 'flex';
            const area = document.getElementById('library-content');
            area.innerHTML = myPlaylists.map(pl => `
                <div style="background:var(--glass); border-radius:20px; padding:15px; margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>${pl.nome}</b> <i class="fa fa-trash" style="color:red;" onclick="deletePL('${pl.id}')"></i></div>
                    <div style="display:flex; gap:10px; overflow-x:auto;">
                        ${pl.musicas.map(m => `<div class="track-img-box"><img src="${m.cover}" onclick="play('${m.id}','${m.url}','${m.title}','${m.cover}')"></div>`).join('')}
                    </div>
                </div>
            `).join('');
        };
        window.deletePL = (id) => { if(confirm("Apagar?")) { myPlaylists = myPlaylists.filter(p => p.id != id); localStorage.setItem('z_v6_pl', JSON.stringify(myPlaylists)); abrirPlaylists(); } };
        window.fecharPlaylists = () => document.getElementById('playlists-modal').style.display = 'none';
        window.abrirCriador = () => { document.getElementById('create-modal').style.display = 'flex'; document.getElementById('create-selection-list').innerHTML = allMusics.map(m => `<div class="track-card" id="sel-${m.id}" onclick="toggleSelect('${m.id}')"><div class="track-img-box"><img src="${m.cover}"></div><b>${m.title}</b></div>`).join(''); };
        let selecionadas = [];
        window.toggleSelect = (id) => { const el = document.getElementById(`sel-${id}`); if(selecionadas.includes(id)) { selecionadas = selecionadas.filter(x => x !== id); el.style.border = "1px solid var(--glass-border)"; } else { selecionadas.push(id); el.style.border = "1px solid var(--accent)"; } };
        window.salvarNovaPlaylist = async () => {
            const nome = document.getElementById('new-pl-name').value;
            if(!nome || selecionadas.length === 0) return alert("Preencha!");
            const data = allMusics.filter(m => selecionadas.includes(m.id));
            const cloud = await addDoc(collection(db, "playlists"), { nome, musicas: data });
            myPlaylists.push({id: Date.now(), cloudId: cloud.id, nome, musicas: data});
            localStorage.setItem('z_v6_pl', JSON.stringify(myPlaylists));
            document.getElementById('create-modal').style.display = 'none';
            abrirPlaylists();
        };
        window.fecharCriador = () => document.getElementById('create-modal').style.display = 'none';
        window.filtrarMusicas = () => { const val = document.getElementById('search-input').value.toLowerCase(); renderAll(allMusics.filter(m => m.title.toLowerCase().includes(val))); };

        init();
    </script>
</body>
</html>
