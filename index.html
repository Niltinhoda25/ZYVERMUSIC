<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | v8.1 Gold Elite</title>
    
    <meta name="theme-color" content="#0a0118">
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22ZyverMusic%22,%22short_name%22:%22Zyver%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#0a0118%22,%22theme_color%22:%22#bc47fb%22,%22icons%22:[{%22src%22:%22https://cdn-icons-png.flaticon.com/512/3844/3844724.png%22,%22sizes%22:%22512x512%22,%22type%22:%22image/png%22}]}">

    <script src="https://alwingulla.com/88/prm/atama.js" async></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #bc47fb; 
            --bg: #0a0118; 
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #00f2fe;
            --danger: #ff4b5c;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: radial-gradient(circle at top right, #1a083d, #0a0118); 
            color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; 
        }

        #main-content { height: 100vh; overflow-y: auto; padding-bottom: 250px; scrollbar-width: none; scroll-behavior: smooth; }
        #main-content::-webkit-scrollbar { display: none; }

        header { padding: 40px 20px 20px; text-align: center; }
        .logo { font-size: 32px; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 25px var(--accent); }
        .logo span { color: var(--accent); }

        .search-box { margin: 0 20px 30px; position: relative; }
        .search-box input { 
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border); 
            padding: 18px 50px; border-radius: 25px; color: white; backdrop-filter: blur(20px); outline: none; 
        }
        .search-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--accent); }

        .section-title { padding: 10px 25px; font-size: 12px; font-weight: 900; text-transform: uppercase; color: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 10px; }

        /* GRID FIXO (8001% ANTI-BUG) */
        #top-list { display: flex; overflow-x: auto; padding: 15px 20px; gap: 20px; scrollbar-width: none; }
        .top-card { min-width: 150px; cursor: pointer; transition: 0.3s; }
        .top-card:active { transform: scale(0.9); }
        .top-img-box { width: 150px; height: 150px; border-radius: 28px; overflow: hidden; border: 1px solid var(--glass-border); background: #111; }
        .top-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .top-card b { display: block; margin-top: 12px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .track-card { 
            display: flex; align-items: center; padding: 15px; margin: 10px 20px; 
            background: var(--glass); border-radius: 22px; border: 1px solid var(--glass-border); backdrop-filter: blur(10px); 
        }
        .track-img { width: 60px; height: 60px; border-radius: 14px; overflow: hidden; margin-right: 15px; flex-shrink: 0; }
        .track-img img { width: 100%; height: 100%; object-fit: cover; }
        .track-info { flex: 1; overflow: hidden; }
        .track-info b { font-size: 15px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-add { font-size: 24px; color: var(--accent); margin-left: 10px; padding: 5px; }

        /* PLAYER */
        #player { 
            position: fixed; bottom: 100px; left: 15px; right: 15px; 
            background: rgba(15, 5, 35, 0.95); border: 1.5px solid var(--accent); 
            padding: 15px; border-radius: 30px; display: none; align-items: center; gap: 15px; z-index: 5000; backdrop-filter: blur(25px); 
        }
        .p-img-box { width: 55px; height: 55px; border-radius: 50%; border: 3px solid var(--accent); overflow: hidden; flex-shrink: 0; }
        .p-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .spinning { animation: rotate 6s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* NAV */
        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.92); 
            backdrop-filter: blur(30px); display: flex; justify-content: space-around; padding: 15px 0 35px; border-top: 1px solid var(--glass-border); z-index: 4000; 
        }
        .nav-item { color: #666; font-size: 24px; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { font-size: 10px; font-weight: 900; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: none; flex-direction: column; padding: 30px 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .btn-create { background: var(--accent); color: white; width: 100%; padding: 20px; border: none; border-radius: 20px; font-weight: 900; margin-top: auto; }
    </style>
</head>
<body>

    <div id="add-modal" class="modal">
        <div class="modal-header"><h2>Salvar em...</h2> <i class="fa fa-times-circle fa-2x" onclick="fecharModal('add-modal')"></i></div>
        <div id="pl-choices" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="lib-modal" class="modal">
        <div class="modal-header"><h2>Biblioteca</h2> <i class="fa fa-times-circle fa-2x" onclick="fecharModal('lib-modal')"></i></div>
        <div id="lib-list" style="overflow-y:auto; flex:1;"></div>
    </div>

    <div id="create-modal" class="modal">
        <div class="modal-header"><h2>Nova Playlist</h2> <i class="fa fa-times-circle fa-2x" onclick="fecharModal('create-modal')"></i></div>
        <input type="text" id="pl-name-input" placeholder="Nome da Playlist..." style="width:100%; background:var(--glass); border:1px solid var(--accent); padding:20px; border-radius:20px; color:white; outline:none; margin-bottom:20px;">
        <div id="selection-list" style="flex:1; overflow-y:auto;"></div>
        <button class="btn-create" onclick="confirmarCriacao()">CRIAR AGORA</button>
    </div>

    <div id="main-content">
        <header><div class="logo">ZYVER<span>MUSIC</span></div></header>

        <div class="search-box">
            <i class="fa fa-search"></i>
            <input type="text" id="search-input" placeholder="Pesquisar..." oninput="filtrar()">
        </div>

        <div class="section-title"><i class="fa fa-bolt"></i> Mais Tocadas</div>
        <div id="top-list"></div>

        <div class="section-title"><i class="fa fa-compact-disc"></i> Biblioteca</div>
        <div id="full-list"></div>
    </div>

    <div id="player">
        <div class="p-img-box"><img id="p-img" src=""></div>
        <div class="track-info">
            <b id="p-title">...</b>
            <span style="color:var(--accent); font-size:10px; font-weight:900;">AD-SUPPORTED v8.1</span>
        </div>
        <div style="display:flex; align-items:center; gap:20px;">
            <i class="fa fa-forward-step" onclick="proximaMusica()" style="color:#666;"></i>
            <i class="fa fa-pause" id="play-btn" onclick="togglePlay()" style="font-size:32px;"></i>
        </div>
        <audio id="audio-engine"></audio>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="location.reload(); dispararAnuncio();"><i class="fa fa-house"></i><span>Home</span></div>
        <div class="nav-item" onclick="abrirModal('create-modal'); dispararAnuncio();"><i class="fa fa-plus-circle" style="font-size:35px; color:var(--accent);"></i><span>Criar</span></div>
        <div class="nav-item" onclick="abrirLibrary(); dispararAnuncio();"><i class="fa fa-layer-group"></i><span>Playlists</span></div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, addDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        let allTracks = [];
        let myPlaylists = JSON.parse(localStorage.getItem('zyver_v8_db')) || [];
        let currentId = null;
        let selectedForPL = [];
        const audio = document.getElementById('audio-engine');
        const pImg = document.getElementById('p-img');

        // GATILHO MONETAG
        window.dispararAnuncio = () => {
            console.log("Chamando Anúncio...");
            // In-Page Push da Monetag costuma ser automático, mas forçamos o refresh de tags se necessário
        };

        async function init() {
            const snap = await getDocs(collection(db, "musics"));
            allTracks = snap.docs.map(d => ({id: d.id, ...d.data()})).filter(m => m.cover);
            renderTudo(allTracks);
            renderTop();
        }

        function renderTudo(lista) {
            document.getElementById('full-list').innerHTML = lista.map(m => `
                <div class="track-card">
                    <div class="track-img" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')"><img src="${m.cover}"></div>
                    <div class="track-info" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')">
                        <b>${m.title}</b><span>Zyver Music</span>
                    </div>
                    <i class="fa fa-plus-circle btn-add" onclick="prepararAdd('${m.id}')"></i>
                </div>
            `).join('');
        }

        function renderTop() {
            const top = [...allTracks].sort((a,b) => (b.plays || 0) - (a.plays || 0)).slice(0, 10);
            document.getElementById('top-list').innerHTML = top.map(m => `
                <div class="top-card" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')">
                    <div class="top-img-box"><img src="${m.cover}"></div>
                    <b>${m.title}</b>
                </div>
            `).join('');
        }

        window.tocar = (id, url, title, img) => {
            currentId = id;
            document.getElementById('player').style.display = 'flex';
            document.getElementById('p-title').innerText = title;
            pImg.src = img;
            pImg.parentElement.classList.add('spinning');
            audio.src = url;
            audio.play();
            updateDoc(doc(db, "musics", id), { plays: increment(1) });
            dispararAnuncio(); // Monetização no Play
        };

        audio.onended = () => proximaMusica();
        window.proximaMusica = () => {
            const rand = allTracks[Math.floor(Math.random() * allTracks.length)];
            tocar(rand.id, rand.url, rand.title, rand.cover);
        };

        window.togglePlay = () => {
            if(audio.paused) { audio.play(); pImg.parentElement.classList.add('spinning'); document.getElementById('play-btn').className = 'fa fa-pause'; }
            else { audio.pause(); pImg.parentElement.classList.remove('spinning'); document.getElementById('play-btn').className = 'fa fa-play'; }
        };

        window.abrirModal = (id) => { 
            document.getElementById(id).style.display = 'flex'; 
            if(id === 'create-modal') {
                document.getElementById('selection-list').innerHTML = allTracks.map(m => `
                    <div class="track-card" id="sel-${m.id}" onclick="toggleSelect('${m.id}')">
                        <div class="track-img"><img src="${m.cover}"></div><b>${m.title}</b>
                    </div>
                `).join('');
            }
        };

        window.toggleSelect = (id) => {
            const el = document.getElementById(`sel-${id}`);
            if(selectedForPL.includes(id)) { selectedForPL = selectedForPL.filter(x => x !== id); el.style.border = "1px solid var(--glass-border)"; }
            else { selectedForPL.push(id); el.style.border = "2px solid var(--accent)"; }
        };

        window.confirmarCriacao = () => {
            const nome = document.getElementById('pl-name-input').value;
            if(!nome || selectedForPL.length === 0) return alert("Erro!");
            const tracks = allTracks.filter(m => selectedForPL.includes(m.id));
            myPlaylists.push({ id: Date.now(), nome, musicas: tracks });
            localStorage.setItem('zyver_v8_db', JSON.stringify(myPlaylists));
            fecharModal('create-modal');
            abrirLibrary();
        };

        window.abrirLibrary = () => {
            abrirModal('lib-modal');
            const area = document.getElementById('lib-list');
            area.innerHTML = myPlaylists.map(p => `
                <div style="background:var(--glass); border-radius:25px; padding:20px; margin-bottom:15px; border:1px solid var(--glass-border);">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>${p.nome}</b> <i class="fa fa-trash" style="color:var(--danger);" onclick="removerPL('${p.id}')"></i></div>
                    <div style="display:flex; gap:10px; overflow-x:auto;">
                        ${p.musicas.map(m => `<img src="${m.cover}" onclick="tocar('${m.id}','${m.url}','${m.title}','${m.cover}')" style="width:70px; height:70px; border-radius:12px; object-fit:cover;">`).join('')}
                    </div>
                </div>
            `).join('');
        };

        window.removerPL = (id) => { myPlaylists = myPlaylists.filter(p => p.id != id); localStorage.setItem('zyver_v8_db', JSON.stringify(myPlaylists)); abrirLibrary(); };
        window.fecharModal = (id) => document.getElementById(id).style.display = 'none';
        window.filtrar = () => { const v = document.getElementById('search-input').value.toLowerCase(); renderTudo(allTracks.filter(m => m.title.toLowerCase().includes(v))); };

        init();
    </script>
</body>
</html>
