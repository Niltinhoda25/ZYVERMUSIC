<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Galeria de Clipes</title>
    <style>
        /* Estilização Geral */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #1db954; /* Verde estilo Spotify */
            margin-bottom: 20px;
        }

        /* Container do Player Principal */
        .main-player {
            width: 100%;
            max-width: 800px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            border-radius: 5px;
            background-color: #000;
        }

        .video-info {
            margin-top: 15px;
            padding: 10px;
            border-left: 4px solid #1db954;
        }

        /* Lista de Clipes (Playlist) */
        .playlist {
            margin-top: 30px;
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .clip-card {
            background: #282828;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }

        .clip-card:hover {
            transform: scale(1.05);
            background: #383838;
        }

        .clip-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .clip-card p {
            padding: 10px;
            margin: 0;
            font-size: 0.9em;
            text-align: center;
        }

        .active-clip {
            border: 2px solid #1db954;
        }
    </style>
</head>
<body>

    <h1>🎬 Meus Clipes Favoritos</h1>

    <div class="main-player">
        <video id="video-display" controls autoplay>
            <source src="video1.mp4" type="video/mp4">
            Seu navegador não suporta vídeos em HTML5.
        </video>
        <div class="video-info">
            <h2 id="video-title">Título do Clipe 1</h2>
            <p id="video-desc">Descrição curta sobre este clipe de vídeo.</p>
        </div>
    </div>

    <div class="playlist">
        <div class="clip-card" onclick="changeVideo('video1.mp4', 'Título do Clipe 1', 'Descrição detalhada do primeiro vídeo.')">
            <img src="https://via.placeholder.com/200x120/1db954/ffffff?text=Video+1" alt="Thumbnail 1">
            <p>Clipe 1</p>
        </div>

        <div class="clip-card" onclick="changeVideo('video2.mp4', 'Título do Clipe 2', 'Descrição detalhada do segundo vídeo.')">
            <img src="https://via.placeholder.com/200x120/1db954/ffffff?text=Video+2" alt="Thumbnail 2">
            <p>Clipe 2</p>
        </div>

        <div class="clip-card" onclick="changeVideo('video3.mp4', 'Título do Clipe 3', 'Descrição detalhada do terceiro vídeo.')">
            <img src="https://via.placeholder.com/200x120/1db954/ffffff?text=Video+3" alt="Thumbnail 3">
            <p>Clipe 3</p>
        </div>
    </div>

    <script>
        /**
         * Função para trocar o vídeo e as informações na tela
         * @param {string} src - O caminho do arquivo de vídeo
         * @param {string} title - O título que aparecerá abaixo do vídeo
         * @param {string} desc - A descrição do vídeo
         */
        function changeVideo(src, title, desc) {
            const videoPlayer = document.getElementById('video-display');
            const videoTitle = document.getElementById('video-title');
            const videoDesc = document.getElementById('video-desc');

            // Altera a fonte do vídeo
            videoPlayer.src = src;
            
            // Altera o texto informativo
            videoTitle.innerText = title;
            videoDesc.innerText = desc;

            // Recarrega e dá play
            videoPlayer.load();
            videoPlayer.play();
        }
    </script>

</body>
</html>
