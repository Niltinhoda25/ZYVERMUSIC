<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zyver Music | Clips</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ff7a00; --bg: #000; --glass: rgba(255, 255, 255, 0.1); }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Container Principal Estilo TikTok */
        .clips-container {
            height: 100vh;
            overflow-y: scroll;
            snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .clip-card {
            height: 100vh;
            width: 100vw;
            snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Botão Voltar */
        .btn-back {
            position: absolute;
            top: 50px;
            left: 20px;
            z-index: 100;
            color: white;
            font-size: 24px;
            text-decoration: none;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        /* Ações Laterais (Direita) */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 50;
            align-items: center;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .action-btn i {
            font-size: 35px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .action-btn i.fa-heart.active { color: #ff2d55; transform: scale(1.2); }
        .action-btn span { font-size: 13px; font-weight: bold; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        /* Informações do Clipe (Esquerda) */
        .clip-info {
            position: absolute;
            bottom: 40px;
            left: 15px;
            z-index: 50;
            max-width: 75%;
            pointer-events: none;
        }

        .clip-info p { color: var(--accent); font-weight: 800; font-size: 14px; margin-bottom: 5px; }
        .clip-info h2 { font-size: 18px; font-weight: 700; text-shadow: 0 1px 5px rgba(0,0,0,0.8); line-height: 1.2; }

        /* Modal de Comentários */
        #modal-comments {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 65%;
            background: #151515;
            z-index: 1000;
            border-radius: 20px 20px 0 0;
            transition: bottom 0.4s cubic-bezier(0, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #modal-comments.open { bottom: 0; }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .comments-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }

        .comment-item {
            margin-bottom: 15px;
            font-size: 14px;
            line-height: 1.4;
        }

        .comment-item b { color: var(--accent); display: block; margin-bottom: 2px; }

        .comment-input-area {
            display: flex;
            gap: 10px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .comment-input-area input {
            flex: 1;
            background: #252525;
            border: none;
            border-radius: 12px;
            padding: 15px;
            color: white;
            outline: none;
        }

        .btn-post {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            padding: 0 20px;
            color: white;
            font-weight: bold;
        }

        /* Dica de Som (iPhone) */
        #sound-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 15px 25px;
            border-radius: 50px;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--accent);
            font-weight: bold;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back"><i class="fa fa-chevron-left"></i></a>

    <div id="sound-tip">
        <i class="fa fa-volume-high"></i> TOQUE PARA O SOM
    </div>

    <div id="clips-feed" class="clips-container">
        </div>

    <div id="modal-comments">
        <div class="modal-header">
            <h3>Comentários</h3>
            <i class="fa fa-times" onclick="toggleComments(false)" style="font-size: 24px; cursor: pointer;"></i>
        </div>
        <div id="comments-content" class="comments-list">
            </div>
        <div class="comment-input-area">
            <input type="text" id="new-comment" placeholder="Adicione um comentário...">
            <button class="btn-post" onclick="sendComment()">Postar</button>
        </div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, updateDoc, doc, increment, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let audioUnlocked = false;
        let activeClipId = "";

        async function loadClips() {
            try {
                const querySnapshot = await getDocs(collection(db, "clips"));
                const feed = document.getElementById('clips-feed');
                
                if (querySnapshot.empty) {
                    feed.innerHTML = "<div class='clip-card'><h2>Nenhum vídeo disponível</h2></div>";
                    return;
                }

                feed.innerHTML = querySnapshot.docs.map(docSnap => {
                    const clip = docSnap.data();
                    const id = docSnap.id;
                    return `
                        <div class="clip-card" onclick="handleVideoTap(this)">
                            <video 
                                id="video-${id}"
                                src="${clip.url}" 
                                loop 
                                muted 
                                playsinline 
                                webkit-playsinline
                                preload="auto">
                            </video>
                            
                            <div class="side-actions">
                                <div class="action-btn" onclick="event.stopPropagation(); likeClip('${id}')">
                                    <i class="fa fa-heart" id="heart-${id}"></i>
                                    <span id="likes-count-${id}">${clip.likes || 0}</span>
                                </div>
                                <div class="action-btn" onclick="event.stopPropagation(); openComments('${id}')">
                                    <i class="fa fa-comment-dots"></i>
                                    <span>${clip.comments ? clip.comments.length : 0}</span>
                                </div>
                            </div>

                            <div class="clip-info">
                                <p>@ZyverMusic</p>
                                <h2>${clip.title}</h2>
                            </div>
                        </div>
                    `;
                }).join('');

                setupIntersectionObserver();
            } catch (error) {
                console.error("Erro ao carregar clips:", error);
            }
        }

        // Play/Pause e Destrava Áudio no iPhone
        window.handleVideoTap = (card) => {
            const video = card.querySelector('video');
            
            if (!audioUnlocked) {
                document.querySelectorAll('video').forEach(v => v.muted = false);
                audioUnlocked = true;
                const tip = document.getElementById('sound-tip');
                tip.style.opacity = '0';
                setTimeout(() => tip.remove(), 500);
            }

            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        };

        // Sistema de Like Real
        window.likeClip = async (id) => {
            const heart = document.getElementById(`heart-${id}`);
            const countSpan = document.getElementById(`likes-count-${id}`);
            
            if (!heart.classList.contains('active')) {
                heart.classList.add('active');
                countSpan.innerText = parseInt(countSpan.innerText) + 1;
                
                await updateDoc(doc(db, "clips", id), {
                    likes: increment(1)
                });
            }
        };

        // Sistema de Comentários Real
        window.openComments = (id) => {
            activeClipId = id;
            toggleComments(true);
            
            // Escuta comentários em tempo real
            onSnapshot(doc(db, "clips", id), (docSnap) => {
                const data = docSnap.data();
                const container = document.getElementById('comments-content');
                
                if (data.comments && data.comments.length > 0) {
                    container.innerHTML = data.comments.map(text => `
                        <div class="comment-item">
                            <b>Anônimo</b>
                            ${text}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = "<p style='text-align:center; opacity:0.5;'>Nenhum comentário ainda.</p>";
                }
            });
        };

        window.toggleComments = (show) => {
            const modal = document.getElementById('modal-comments');
            show ? modal.classList.add('open') : modal.classList.remove('open');
        };

        window.sendComment = async () => {
            const input = document.getElementById('new-comment');
            if (!input.value.trim() || !activeClipId) return;

            const text = input.value.trim();
            input.value = "";

            await updateDoc(doc(db, "clips", activeClipId), {
                comments: arrayUnion(text)
            });
        };

        // Observer para dar play automático ao rolar
        function setupIntersectionObserver() {
            const options = { threshold: 0.8 };
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(err => console.log("Auto-play bloqueado pelo navegador"));
                    } else {
                        video.pause();
                    }
                });
            }, options);

            document.querySelectorAll('.clip-card').forEach(card => observer.observe(card));
        }

        loadClips();
    </script>
</body>
</html>
