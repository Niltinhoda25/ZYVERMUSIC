<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Clipes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #9d4edd; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding: 15px; }

        .header-clipes { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .btn-back { color: white; text-decoration: none; font-size: 20px; }

        /* GRID OTIMIZADO */
        .clipes-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }

        .clip-card { 
            background: #111; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #222;
            transition: 0.3s;
        }

        /* CONTAINER DE VÍDEO COM PROPORÇÃO 16:9 */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Mantém o player no tamanho certo antes de carregar */
            background: #000;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .clip-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .clip-title { font-size: 14px; font-weight: 800; }
        
        /* Efeito de carregamento (Skeleton) */
        .loading-shimmer {
            background: linear-gradient(90deg, #111 25%, #222 50%, #111 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div class="header-clipes">
        <a href="index.html" class="btn-back"><i class="fa fa-arrow-left"></i></a>
        <h2 style="font-weight: 900; letter-spacing: -1px;">OS MELHORES <span>CLIPES</span></h2>
    </div>

    <div id="grid-clipes" class="clipes-grid">
        </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const grid = document.getElementById('grid-clipes');

        // Puxa os clipes do Firebase
        onSnapshot(query(collection(db, "clips"), orderBy("date", "desc")), (snap) => {
            grid.innerHTML = snap.docs.map(doc => {
                const clip = doc.data();
                return `
                <div class="clip-card">
                    <div class="video-container loading-shimmer">
                        <video 
                            controls 
                            preload="none" 
                            poster="https://via.placeholder.com/640x360/111/9d4edd?text=Zyver+Clipes"
                            playsinline
                        >
                            <source src="${clip.url}" type="video/mp4">
                            Seu navegador não suporta vídeos.
                        </video>
                    </div>
                    <div class="clip-info">
                        <span class="clip-title">${clip.title}</span>
                        <div style="display:flex; gap:10px; color:#9d4edd">
                             <i class="fa fa-share-nodes"></i>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            // Remove o shimmer quando o vídeo puder ser tocado
            document.querySelectorAll('video').forEach(v => {
                v.onloadeddata = () => v.parentElement.classList.remove('loading-shimmer');
            });
        });
    </script>
</body>
</html>
