<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zyver Clips</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ff7a00; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }

        .clips-container {
            height: 100vh;
            overflow-y: scroll;
            snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .clip-card {
            height: 100vh;
            width: 100vw;
            snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; /* Deixa o clique passar para o card */
        }

        .ui-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 40%);
            z-index: 10;
            pointer-events: none;
        }

        .clip-info h2 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
        .clip-info p { color: var(--accent); font-weight: 700; font-size: 14px; }

        .btn-back {
            position: absolute;
            top: 40px; left: 20px;
            z-index: 100;
            color: white; font-size: 24px;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Aviso de "Toque para Som" */
        .mute-notice {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            z-index: 20;
            pointer-events: none;
            opacity: 1; transition: 0.5s;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back"><i class="fa fa-chevron-left"></i></a>

    <div id="clips-feed" class="clips-container"></div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function init() {
            const snap = await getDocs(collection(db, "clips"));
            const feed = document.getElementById('clips-feed');
            
            feed.innerHTML = snap.docs.map((d, index) => {
                const c = d.data();
                return `
                    <div class="clip-card" onclick="handleInteraction(this)">
                        <video 
                            id="vid-${index}"
                            src="${c.url}" 
                            loop 
                            muted
                            playsinline 
                            webkit-playsinline
                            preload="metadata">
                        </video>
                        <div class="mute-notice" id="mute-${index}">
                            <i class="fa fa-volume-xmark"></i> TOQUE PARA O SOM
                        </div>
                        <div class="ui-overlay">
                            <div class="clip-info">
                                <p>@ZyverMusic</p>
                                <h2>${c.title}</h2>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Tenta rodar o primeiro mudo (iPhone aceita autoplay mudo)
            setTimeout(() => {
                const first = document.querySelector('video');
                if(first) first.play();
            }, 500);
        }

        // FUNÇÃO PARA INTERAÇÃO (IPHONE LIBERA SOM AQUI)
        window.handleInteraction = (card) => {
            const v = card.querySelector('video');
            const notice = card.querySelector('.mute-notice');

            if (v.muted) {
                v.muted = false; // Libera o som
                notice.style.opacity = '0';
                v.play();
            } else {
                if (v.paused) {
                    v.play();
                    notice.style.opacity = '0';
                } else {
                    v.pause();
                    notice.style.opacity = '1';
                    notice.innerHTML = '<i class="fa fa-play"></i> PAUSADO';
                }
            }
        };

        // Scroll Detector para Play/Pause automático
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    v.play().catch(() => {});
                } else {
                    v.pause();
                    v.muted = true; // Volta a ser mudo ao sair da tela
                    const notice = entry.target.querySelector('.mute-notice');
                    if(notice) {
                        notice.style.opacity = '1';
                        notice.innerHTML = '<i class="fa fa-volume-xmark"></i> TOQUE PARA O SOM';
                    }
                }
            });
        }, { threshold: 0.6 });

        setTimeout(() => {
            document.querySelectorAll('.clip-card').forEach(c => observer.observe(c));
        }, 1500);

        init();
    </script>
</body>
</html>
