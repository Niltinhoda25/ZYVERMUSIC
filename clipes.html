<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zyver Clips</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ff7a00; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: sans-serif; overflow: hidden; }

        /* Container TikTok */
        .clips-container {
            height: 100vh;
            overflow-y: scroll;
            snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .clip-card {
            height: 100vh;
            width: 100vw;
            snap-align: start;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* BOTÕES LATERAIS (CURTIR E COMENTAR) */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            align-items: center;
        }
        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }
        .action-btn i { font-size: 32px; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .action-btn span { font-size: 12px; font-weight: 900; }
        .fa-heart.active { color: #ff2d55; }

        /* INFO DO CLIPE */
        .clip-info {
            position: absolute;
            bottom: 30px;
            left: 15px;
            z-index: 20;
            max-width: 70%;
        }
        .clip-info h2 { font-size: 16px; font-weight: 800; margin-bottom: 5px; }
        .clip-info p { color: var(--accent); font-weight: 700; font-size: 13px; }

        .btn-back {
            position: absolute;
            top: 40px; left: 20px;
            z-index: 100; color: white; font-size: 24px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-back"><i class="fa fa-chevron-left"></i></a>

    <div id="clips-feed" class="clips-container"></div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function init() {
            const snap = await getDocs(collection(db, "clips"));
            const feed = document.getElementById('clips-feed');
            
            feed.innerHTML = snap.docs.map((d, index) => {
                const c = d.data();
                return `
                    <div class="clip-card" id="card-${d.id}">
                        <video 
                            src="${c.url}" 
                            loop 
                            playsinline 
                            webkit-playsinline
                            onclick="this.paused ? this.play() : this.pause()">
                        </video>
                        
                        <div class="side-actions">
                            <div class="action-btn" onclick="curtir('${d.id}')">
                                <i class="fa fa-heart" id="heart-${d.id}"></i>
                                <span>${c.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="alert('Comentários em breve!')">
                                <i class="fa fa-comment-dots"></i>
                                <span>0</span>
                            </div>
                        </div>

                        <div class="clip-info">
                            <p>@ZyverMusic</p>
                            <h2>${c.title}</h2>
                        </div>
                    </div>
                `;
            }).join('');

            // Inicia o primeiro vídeo
            startVideos();
        }

        window.curtir = async (id) => {
            const heart = document.getElementById(`heart-${id}`);
            heart.classList.toggle('active');
            // Opcional: Atualizar no Firebase se quiser salvar os likes
            // await updateDoc(doc(db, "clips", id), { likes: increment(1) });
        };

        function startVideos() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        v.play().catch(() => {
                            // Se o iPhone bloquear, ele toca no primeiro clique na tela
                            document.addEventListener('click', () => v.play(), {once: true});
                        });
                    } else {
                        v.pause();
                    }
                });
            }, { threshold: 0.7 });

            document.querySelectorAll('.clip-card').forEach(c => observer.observe(c));
        }

        init();
    </script>
</body>
</html>
