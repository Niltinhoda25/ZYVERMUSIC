<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Clipes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #ff7a00; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }

        /* Container de Rolagem Estilo TikTok */
        .clips-container {
            height: 100vh;
            overflow-y: scroll;
            snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .clip-card {
            height: 100vh;
            width: 100vw;
            snap-align: start;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* VÍDEO AJUSTADO PARA IPHONE */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz o vídeo ocupar a tela toda */
        }

        .clip-info {
            position: absolute;
            bottom: 40px;
            left: 20px;
            z-index: 10;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        .clip-info h2 { font-size: 18px; font-weight: 900; margin-bottom: 5px; }
        .clip-info p { font-size: 14px; color: var(--accent); font-weight: bold; }

        .btn-voltar {
            position: absolute;
            top: 25px;
            left: 20px;
            z-index: 100;
            color: white;
            font-size: 22px;
            text-decoration: none;
            background: rgba(0,0,0,0.5);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        /* Overlay para o iPhone carregar o som no clique */
        .play-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.1);
            z-index: 5;
        }
        .play-overlay i { font-size: 60px; opacity: 0.5; display: none; }
    </style>
</head>
<body>

    <a href="index.html" class="btn-voltar"><i class="fa fa-arrow-left"></i></a>

    <div id="clips-feed" class="clips-container">
        </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function carregarClipes() {
            const snap = await getDocs(collection(db, "clips"));
            const feed = document.getElementById('clips-feed');
            
            if (snap.empty) {
                feed.innerHTML = "<div class='clip-card'><h2>Nenhum clipe postado.</h2></div>";
                return;
            }

            feed.innerHTML = snap.docs.map(d => {
                const clipe = d.data();
                return `
                    <div class="clip-card" onclick="togglePlay(this)">
                        <video 
                            src="${clipe.url}" 
                            loop 
                            playsinline 
                            webkit-playsinline
                            preload="auto">
                        </video>
                        <div class="clip-info">
                            <p>@ZyverMusic</p>
                            <h2>${clipe.title}</h2>
                        </div>
                        <div class="play-overlay"><i class="fa fa-play"></i></div>
                    </div>
                `;
            }).join('');

            // Tenta dar play no primeiro vídeo automaticamente
            const primeiroVideo = document.querySelector('video');
            if(primeiroVideo) {
                primeiroVideo.play().catch(() => {
                    console.log("iPhone bloqueou o autoplay. O usuário precisa clicar.");
                });
            }
        }

        // Função para Play/Pause ao clicar (Necessário no iPhone)
        window.togglePlay = (card) => {
            const v = card.querySelector('video');
            const icon = card.querySelector('.play-overlay i');
            
            if (v.paused) {
                v.play();
                icon.style.display = 'none';
            } else {
                v.pause();
                icon.style.display = 'block';
            }
        };

        // Pausar vídeos que saem da tela e tocar o que entra
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                if (entry.isIntersecting) {
                    v.play().catch(() => {});
                } else {
                    v.pause();
                }
            });
        }, { threshold: 0.5 });

        // Aplica o observer em cada card
        setTimeout(() => {
            document.querySelectorAll('.clip-card').forEach(card => observer.observe(card));
        }, 1000);

        carregarClipes();
    </script>
</body>
</html>
