<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverClips | Reels</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:#fff; font-family:sans-serif; overflow:hidden; }
        .clips-container { height:100vh; overflow-y:scroll; scroll-snap-type:y mandatory; scrollbar-width:none; }
        .clips-container::-webkit-scrollbar { display:none; }

        .clip-section { height:100vh; width:100vw; scroll-snap-align:start; position:relative; }
        video { width:100%; height:100%; object-fit:cover; }

        /* BOTÕES LATERAIS (INTERAÇÃO) */
        .side-actions { position:absolute; right:15px; bottom:120px; display:flex; flex-direction:column; gap:22px; align-items:center; z-index:20; }
        .action-item { display:flex; flex-direction:column; align-items:center; gap:5px; }
        .action-item i { font-size:28px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        .action-item span { font-size:12px; font-weight:bold; }

        .overlay { position:absolute; bottom:0; left:0; width:100%; padding:40px 20px; background:linear-gradient(transparent, rgba(0,0,0,0.9)); pointer-events:none; }
        .btn-voltar { position:absolute; top:20px; left:20px; z-index:100; color:white; font-size:20px; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-voltar"><i class="fa fa-arrow-left"></i></a>
    <div id="clips-feed" class="clips-container"></div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function loadClips() {
            const snap = await getDocs(collection(db, "clips"));
            document.getElementById('clips-feed').innerHTML = snap.docs.map(doc => {
                const data = doc.data();
                return `
                <div class="clip-section">
                    <video src="${data.url}" loop playsinline preload="metadata" onclick="this.paused ? this.play() : this.pause()"></video>
                    <div class="side-actions">
                        <div class="action-item" onclick="this.style.color='#ff0050'"><i class="fa-solid fa-heart"></i><span>${data.likes || 'Curtir'}</span></div>
                        <div class="action-item"><i class="fa-solid fa-comment-dots"></i><span>72</span></div>
                        <div class="action-item" onclick="navigator.share({url:window.location.href})"><i class="fa-solid fa-share"></i><span>Enviar</span></div>
                    </div>
                    <div class="overlay"><h2>${data.title}</h2><p>@zyvermusic • Som Original</p></div>
                </div>`;
            }).join('');
            setupAutoPlay();
        }

        function setupAutoPlay() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) v.play(); else v.pause();
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.clip-section').forEach(s => observer.observe(s));
        }
        loadClips();
    </script>
</body>
</html>
