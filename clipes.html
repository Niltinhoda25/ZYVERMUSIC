<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverClips | Feed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: sans-serif; }
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }

        .clip-item { position: relative; width: 100%; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        
        /* Loader */
        .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 3px solid #333; border-top-color: #8a2be2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Overlay Visível */
        .overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); pointer-events: none; }
        .clip-info h2 { font-size: 18px; color: white; text-shadow: 2px 2px 5px #000; margin-bottom: 10px; }
        
        .share-btn { position: absolute; right: 20px; bottom: 100px; color: white; font-size: 24px; pointer-events: auto; background: none; border: none; }
        .back { position: absolute; top: 20px; left: 20px; z-index: 100; color: white; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    </style>
</head>
<body>

<a href="index.html" class="back">✕</a>
<div id="feed"></div>

<script type="module">
    import { db } from "./firebase-config.js";
    import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    async function loadFeed() {
        const feed = document.getElementById('feed');
        const snap = await getDocs(collection(db, "clips"));

        for (const d of snap.docs) {
            const clip = d.data();
            const mSnap = await getDoc(doc(db, "musics", clip.musicId));
            const music = mSnap.data();

            if (music) {
                const item = document.createElement('div');
                item.className = 'clip-item';
                item.innerHTML = `
                    <div class="loader"></div>
                    <video src="${clip.url}" loop muted playsinline preload="auto"></video>
                    <audio src="${music.url}" loop preload="auto"></audio>
                    <div class="overlay">
                        <div class="clip-info">
                            <h2>${clip.title}</h2>
                        </div>
                    </div>
                    <button class="share-btn" onclick="share('${clip.title}')"><i class="fa fa-share"></i></button>
                `;
                feed.appendChild(item);
            }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const v = entry.target.querySelector('video');
                const a = entry.target.querySelector('audio');
                const loader = entry.target.querySelector('.loader');

                if (entry.isIntersecting) {
                    // TRAVA DE SINCRONIZAÇÃO: Só toca se AMBOS estiverem carregados
                    const check = setInterval(() => {
                        if (v.readyState >= 3 && a.readyState >= 3) {
                            clearInterval(check);
                            v.style.opacity = 1;
                            loader.style.display = 'none';
                            v.play();
                            a.play();
                            a.currentTime = v.currentTime;
                        }
                    }, 200);
                } else {
                    v.pause(); a.pause();
                    v.style.opacity = 0;
                    loader.style.display = 'block';
                }
            });
        }, { threshold: 0.8 });

        document.querySelectorAll('.clip-item').forEach(c => observer.observe(c));
    }

    window.share = (title) => {
        if(navigator.share) navigator.share({ title: 'ZyverMusic', text: 'Olha esse clipe: ' + title, url: window.location.href });
    };

    loadFeed();
</script>
</body>
</html>
