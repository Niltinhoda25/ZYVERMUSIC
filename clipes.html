<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverClips</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: sans-serif; }
        #feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #feed::-webkit-scrollbar { display: none; }
        .clip-item { position: relative; width: 100%; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        
        .loader { position: absolute; border: 3px solid #222; border-top-color: #8a2be2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Overlay com nome bonito e visível */
        .overlay { position: absolute; bottom: 30px; left: 15px; width: 80%; pointer-events: none; }
        .clip-title { font-size: 20px; font-weight: 800; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.9); margin-bottom: 15px; }
        
        /* Barra da música com disco rodando */
        .music-bar { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 40px; width: fit-content; border: 1px solid rgba(255,255,255,0.1); }
        .disco { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; animation: rotate 4s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .share-btn { position: absolute; right: 20px; bottom: 120px; color: white; font-size: 24px; background: none; border: none; cursor: pointer; text-shadow: 0 2px 5px #000; }
        .back { position: absolute; top: 20px; left: 20px; z-index: 100; color: white; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; }
    </style>
</head>
<body>
    <a href="index.html" class="back">✕</a>
    <div id="feed"></div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function loadFeed() {
            const snap = await getDocs(collection(db, "clips"));
            for (const d of snap.docs) {
                const clip = d.data();
                const mSnap = await getDoc(doc(db, "musics", clip.musicId));
                const music = mSnap.data();
                if (music) {
                    const item = document.createElement('div');
                    item.className = 'clip-item';
                    item.innerHTML = `
                        <div class="loader"></div>
                        <video src="${clip.url}" loop muted playsinline></video>
                        <audio src="${music.url}" loop></audio>
                        <div class="overlay">
                            <div class="clip-title">${clip.title}</div>
                            <div class="music-bar">
                                <img src="${music.cover}" class="disco">
                                <div><p style="font-size:13px; font-weight:bold; color:#fff">${music.title}</p></div>
                            </div>
                        </div>
                        <button class="share-btn" onclick="share('${clip.title}')"><i class="fa fa-share"></i></button>`;
                    document.getElementById('feed').appendChild(item);
                }
            }
            startObserver();
        }

        function startObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const v = entry.target.querySelector('video');
                    const a = entry.target.querySelector('audio');
                    const loader = entry.target.querySelector('.loader');
                    if (entry.isIntersecting) {
                        const check = setInterval(() => {
                            if (v.readyState >= 3 && a.readyState >= 3) {
                                clearInterval(check);
                                v.style.opacity = 1; loader.style.display = 'none';
                                v.play(); a.play(); a.currentTime = v.currentTime;
                            }
                        }, 200);
                    } else { v.pause(); a.pause(); v.style.opacity = 0; loader.style.display = 'block'; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.clip-item').forEach(c => observer.observe(c));
        }

        window.share = (t) => { if(navigator.share) navigator.share({ title: 'ZyverMusic', text: 'Veja este clipe: ' + t, url: window.location.href }); };
        loadFeed();
    </script>
</body>
</html>
