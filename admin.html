<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ZyverMusic | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white p-6">

    <div id="login-form" class="max-w-md mx-auto mt-20 bg-zinc-900 p-8 rounded-2xl border border-zinc-800">
        <h2 class="text-2xl font-black mb-6 text-center">LOGIN ADMIN</h2>
        <input type="email" id="email" placeholder="Email" class="w-full bg-zinc-950 border border-zinc-700 p-3 rounded mb-4">
        <input type="password" id="pass" placeholder="Senha" class="w-full bg-zinc-950 border border-zinc-700 p-3 rounded mb-6">
        <button id="login-btn" class="w-full bg-indigo-600 py-3 rounded-lg font-bold hover:bg-indigo-700 transition">Entrar</button>
    </div>

    <div id="admin-panel" class="max-w-6xl mx-auto hidden">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold">Painel de Gerenciamento</h2>
            <button id="logout-btn" class="text-zinc-500 hover:text-white">Sair</button>
        </div>

        <div class="grid lg:grid-cols-3 gap-10">
            <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 h-fit">
                <h3 class="text-lg font-bold mb-4">Nova Música</h3>
                <input type="text" id="m-title" placeholder="Título da Música" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded mb-3">
                <input type="text" id="m-cover" placeholder="URL da Capa" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded mb-3">
                <input type="text" id="m-url" placeholder="URL do Dropbox" class="w-full bg-zinc-950 border border-zinc-800 p-3 rounded mb-6">
                <button id="add-btn" class="w-full bg-green-600 py-3 rounded-lg font-bold">Publicar Agora</button>
            </div>

            <div class="lg:col-span-2">
                <h3 class="text-lg font-bold mb-4">Músicas Publicadas</h3>
                <div id="admin-list" class="space-y-3">
                    </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
