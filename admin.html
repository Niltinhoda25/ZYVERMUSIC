<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM | ZyverMusic</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #9d4edd; --bg: #0b0b0b; --surface: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .card { background: var(--surface); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; }
        .btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .item { display: flex; justify-content: space-between; background: #111; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 14px; }
        .del { color: #ff4444; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom:20px;">Painel <span>Zyver</span></h2>

    <div class="card">
        <input type="text" id="t" placeholder="Título">
        <input type="text" id="c" placeholder="Link da Capa">
        <input type="text" id="u" placeholder="Link do MP3">
        <label><input type="checkbox" id="l"> MARCAR LANÇAMENTO</label><br><br>
        <button class="btn" onclick="postar()">POSTAR MÚSICA</button>
    </div>

    <div class="card">
        <h3>Músicas no Ar (<span id="total">0</span>)</h3><br>
        <div id="lista">Carregando...</div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, addDoc, getDocs, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.postar = async () => {
            const title = document.getElementById('t').value;
            const cover = document.getElementById('c').value;
            const url = document.getElementById('u').value;
            const isLaunch = document.getElementById('l').checked;

            if(!title || !url) return alert("Preencha tudo!");

            await addDoc(collection(db, "musics"), {
                title, cover, url, isLaunch, date: Date.now(), plays: 0
            });
            alert("Postado!");
            location.reload();
        };

        // Escuta o banco em tempo real
        onSnapshot(collection(db, "musics"), (snap) => {
            const lista = document.getElementById('lista');
            document.getElementById('total').innerText = snap.size;
            let tracks = snap.docs.map(d => ({id: d.id, ...d.data()}));
            tracks.sort((a,b) => (b.date || 0) - (a.date || 0));

            lista.innerHTML = tracks.map(m => `
                <div class="item">
                    <span>${m.title}</span>
                    <i class="fa fa-trash del" onclick="apagar('${m.id}')"></i>
                </div>
            `).join('');
        });

        window.apagar = async (id) => {
            if(confirm("Apagar?")) await deleteDoc(doc(db, "musics", id));
        };
    </script>
</body>
</html>
