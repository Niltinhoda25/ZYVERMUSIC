<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyverMusic | Admin Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
        .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div id="login-form" class="max-w-md mx-auto mt-20 glass p-8 rounded-[2.5rem] border border-zinc-800 shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black text-indigo-500 italic">ZYVER<span class="text-white">ADMIN</span></h2>
            <p class="text-zinc-500 text-xs mt-2 uppercase tracking-[0.2em]">Painel de Controle</p>
        </div>
        <div class="space-y-4">
            <input type="email" id="email" placeholder="E-mail do administrador" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl outline-none focus:border-indigo-500 transition">
            <input type="password" id="pass" placeholder="Sua senha secreta" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl outline-none focus:border-indigo-500 transition">
            <button id="login-btn" class="w-full bg-indigo-600 py-4 rounded-2xl font-bold hover:bg-indigo-700 active:scale-95 transition shadow-lg shadow-indigo-500/20">Entrar no Sistema</button>
        </div>
    </div>

    <div id="admin-panel" class="max-w-7xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div>
                <h2 class="text-4xl font-black tracking-tighter">Dashboard</h2>
                <p class="text-zinc-500">Gestão de catálogo e streaming</p>
            </div>
            <button id="logout-btn" class="bg-zinc-900 border border-zinc-800 px-8 py-3 rounded-full text-sm font-bold hover:bg-red-600 transition hover:border-red-600">Sair com Segurança</button>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="glass p-8 rounded-[2rem] border border-zinc-800">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-2 text-indigo-400">
                        <i class="fas fa-plus-circle"></i> Adicionar Única
                    </h3>
                    <div class="space-y-3">
                        <input type="text" id="m-title" placeholder="Título da Música" class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-indigo-500">
                        <input type="text" id="m-cover" placeholder="URL da Capa" class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-indigo-500">
                        <input type="text" id="m-url" placeholder="URL do Dropbox" class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-indigo-500">
                        <select id="m-category" class="w-full bg-black border border-zinc-800 p-3 rounded-xl outline-none focus:border-indigo-500">
                            <option value="Trap">Trap</option>
                            <option value="Funk">Funk</option>
                            <option value="Hip Hop">Hip Hop</option>
                            <option value="Sertanejo">Sertanejo</option>
                            <option value="Eletrônica">Eletrônica</option>
                        </select>
                        <button id="add-btn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mt-2 hover:bg-indigo-700 transition">Publicar na Vitrine</button>
                    </div>
                </div>

                <div class="glass p-8 rounded-[2rem] border border-zinc-800">
                    <h3 class="text-lg font-bold mb-2 flex items-center gap-2 text-emerald-400">
                        <i class="fas fa-bolt"></i> Envio em Massa
                    </h3>
                    <p class="text-[10px] text-zinc-500 mb-4 uppercase tracking-widest">Título | Capa | Link | Categoria</p>
                    <textarea id="mass-upload" rows="5" placeholder="Ex: Dubai | https://capa.jpg | https://dropbox.com... | Trap" class="w-full bg-black border border-zinc-800 p-4 rounded-2xl text-xs font-mono mb-4 outline-none focus:border-emerald-500"></textarea>
                    <button id="mass-btn" class="w-full bg-emerald-600 py-3 rounded-xl font-bold hover:bg-emerald-700 transition">Processar Lista</button>
                </div>
            </div>

            <div class="lg:col-span-7 glass p-8 rounded-[2rem] border border-zinc-800 h-fit">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">Catálogo Ativo</h3>
                    <span id="music-count" class="bg-indigo-500/10 text-indigo-400 px-4 py-1 rounded-full text-xs font-bold border border-indigo-500/20">0 Músicas</span>
                </div>
                <div id="admin-list" class="space-y-4 max-h-[700px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
