<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyverMusic | Painel Administrativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="login-form" class="max-w-md mx-auto mt-20 bg-zinc-900 p-8 rounded-3xl border border-zinc-800 shadow-2xl">
        <h2 class="text-3xl font-black mb-2 text-center text-indigo-500">ZYVER ADMIN</h2>
        <p class="text-zinc-500 text-center mb-8 text-sm">Acesso restrito ao proprietário</p>
        <input type="email" id="email" placeholder="E-mail" class="w-full bg-black border border-zinc-700 p-4 rounded-xl mb-4 focus:border-indigo-500 outline-none transition">
        <input type="password" id="pass" placeholder="Senha" class="w-full bg-black border border-zinc-700 p-4 rounded-xl mb-6 focus:border-indigo-500 outline-none transition">
        <button id="login-btn" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-700 active:scale-95 transition">Entrar no Painel</button>
    </div>

    <div id="admin-panel" class="max-w-6xl mx-auto hidden">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h2 class="text-3xl font-black">ZyverMusic Dashboard</h2>
                <p class="text-zinc-500">Gerencie sua biblioteca de streaming</p>
            </div>
            <button id="logout-btn" class="bg-zinc-800 px-6 py-2 rounded-full text-sm font-bold hover:bg-red-600 transition">Sair do Painel</button>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="space-y-6">
                <div class="bg-zinc-900/50 p-6 rounded-3xl border border-zinc-800">
                    <h3 class="text-lg font-bold mb-4 flex items-center gap-2"><i class="fas fa-plus-circle text-indigo-500"></i> Adicionar Única</h3>
                    <input type="text" id="m-title" placeholder="Título da Música" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mb-3 outline-none focus:border-indigo-500">
                    <input type="text" id="m-cover" placeholder="URL da Imagem da Capa" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mb-3 outline-none focus:border-indigo-500">
                    <input type="text" id="m-url" placeholder="URL do Dropbox" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mb-4 outline-none focus:border-indigo-500">
                    <button id="add-btn" class="w-full bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Publicar Música</button>
                </div>

                <div class="bg-zinc-900/50 p-6 rounded-3xl border border-zinc-800">
                    <h3 class="text-lg font-bold mb-2 flex items-center gap-2"><i class="fas fa-layer-group text-indigo-500"></i> Postar em Massa</h3>
                    <p class="text-[10px] text-zinc-500 mb-4 uppercase tracking-wider">Use o formato: Título | Link da Capa | Link do Dropbox (Um por linha)</p>
                    <textarea id="mass-upload" rows="6" placeholder="Exemplo:&#10;Dubai | https://capa.jpg | https://dropbox.com/s/musica.mp3?dl=0" class="w-full bg-black border border-zinc-800 p-4 rounded-xl mb-4 text-xs font-mono outline-none focus:border-indigo-500"></textarea>
                    <button id="mass-btn" class="w-full bg-emerald-600 py-3 rounded-xl font-bold hover:bg-emerald-700 transition">Publicar Lista Completa</button>
                </div>
            </div>

            <div class="bg-zinc-900/50 p-6 rounded-3xl border border-zinc-800">
                <h3 class="text-lg font-bold mb-4">Músicas no Ar</h3>
                <div id="admin-list" class="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
