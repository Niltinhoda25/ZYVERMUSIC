<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ZyverAdmin - Painel Profissional</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #181818; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        input, select { background: #000; color: white; border: 1px solid #444; }
        button { background: #8a2be2; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #a04ef6; }
        .lista { margin-top: 15px; max-height: 200px; overflow-y: auto; font-size: 13px; }
        .item-lista { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <h1 style="color: #8a2be2;">ZYVER<span>ADMIN</span></h1>

    <div class="grid">
        <div class="card">
            <h3>🎵 Nova Música</h3>
            <input type="text" id="m-titulo" placeholder="Título da Música">
            <input type="text" id="m-capa" placeholder="URL da Capa">
            <input type="text" id="m-url" placeholder="URL Dropbox (.mp3)">
            <button onclick="salvarMusica()">Publicar Música</button>
        </div>

        <div class="card">
            <h3>🎥 Novo Clipe (TikTok Style)</h3>
            <input type="text" id="c-titulo" placeholder="Título do Clipe">
            <input type="text" id="c-video" placeholder="URL do Vídeo (.mp4)">
            
            <label style="font-size: 12px; color: #8a2be2;">Vincular à Música:</label>
            <select id="c-musica-select">
                <option value="">Carregando músicas...</option>
            </select>
            
            <button onclick="salvarClipe()" style="background: #4b0082;">Publicar Clipe</button>
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>Gerenciar Conteúdo</h3>
        <div id="gerenciar-lista" class="lista"></div>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Carrega músicas no Select e na Lista de Gerenciamento
        async function carregarDados() {
            const mSelect = document.getElementById('c-musica-select');
            const gLista = document.getElementById('gerenciar-lista');
            const snap = await getDocs(collection(db, "musics"));
            
            mSelect.innerHTML = '<option value="">Selecione a música do clipe</option>';
            gLista.innerHTML = "";

            snap.forEach(docSnap => {
                const m = docSnap.data();
                // Preenche o Select com as músicas que você já tem
                mSelect.innerHTML += `<option value="${docSnap.id}">${m.title}</option>`;
                
                // Lista de exclusão
                gLista.innerHTML += `
                    <div class="item-lista">
                        <span>${m.title}</span>
                        <span style="color:red; cursor:pointer;" onclick="excluirMusica('${docSnap.id}')">X</span>
                    </div>`;
            });
        }

        window.salvarMusica = async () => {
            const data = {
                title: document.getElementById('m-titulo').value,
                cover: document.getElementById('m-capa').value,
                url: document.getElementById('m-url').value,
                createdAt: new Date().toISOString()
            };
            await addDoc(collection(db, "musics"), data);
            alert("Música salva!");
            carregarDados();
        };

        window.salvarClipe = async () => {
            const musicId = document.getElementById('c-musica-select').value;
            if(!musicId) return alert("Selecione uma música primeiro!");

            const data = {
                title: document.getElementById('c-titulo').value,
                url: document.getElementById('c-video').value,
                musicId: musicId // Usa o ID da música existente
            };
            await addDoc(collection(db, "clips"), data);
            alert("Clipe publicado!");
        };

        window.excluirMusica = async (id) => {
            if(confirm("Deseja apagar?")) {
                await deleteDoc(doc(db, "musics", id));
                carregarDados();
            }
        };

        carregarDados();
    </script>
</body>
</html>
