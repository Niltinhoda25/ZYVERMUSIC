<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Minhas Playlists</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #9d4edd;
            --accent-glow: rgba(157, 78, 221, 0.4);
            --bg: #050505;
            --surface: #101010;
            --text-dim: #999;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; padding-bottom: 120px; overflow-x: hidden; }

        /* HEADER INTEGRADO */
        header { padding: 20px; display: flex; align-items: center; gap: 15px; background: linear-gradient(to bottom, #1a1a1a, var(--bg)); border-bottom: 1px solid #222; }
        .btn-voltar { color: white; font-size: 24px; text-decoration: none; cursor: pointer; }
        header h2 { font-size: 22px; font-weight: 900; letter-spacing: -1.5px; }

        /* ÁREA DE CRIAÇÃO PREMIUM */
        .create-area { padding: 25px 20px; border-bottom: 1px solid #222; background: #080808; }
        .label-neon { margin-bottom: 15px; font-size: 14px; font-weight: 900; color: #ff7a00; text-transform: uppercase; letter-spacing: 1px; display: block; }
        
        .input-group { display: flex; gap: 12px; margin-bottom: 25px; align-items: center; }
        input#pl-name { flex: 1; background: var(--surface); border: 1px solid #333; padding: 14px 18px; color: white; border-radius: 30px; outline: none; font-size: 15px; transition: 0.2s; }
        input#pl-name:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

        .btn-ready { background: var(--accent); border: none; height: 48px; padding: 0 25px; border-radius: 25px; color: white; font-weight: 900; font-size: 13px; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 15px var(--accent-glow); }
        .btn-ready:active { transform: scale(0.96); box-shadow: 0 2px 5px var(--accent-glow); }

        /* LISTA DE SELEÇÃO CORRIGIDA (SEM CORTAR TEXTO) */
        .selector-list { display: flex; flex-direction: column; gap: 10px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .select-card { display: flex; align-items: center; gap: 15px; padding: 12px 18px; background: rgba(30, 30, 30, 0.8); border-radius: 12px; border: 1px solid transparent; transition: 0.2s; }
        .select-card:has(input:checked) { border-color: var(--accent); background: rgba(157, 78, 221, 0.1); }
        .select-card input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--accent); flex-shrink: 0; }
        .song-name { font-size: 15px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 10px; }

        /* SEÇÃO "SUAS CRIAÇÕES" */
        .saved-section { padding: 30px 20px; }
        .pl-card { background: var(--surface); padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; transition: 0.2s; }
        .playlist-info h3 { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 3px; }
        .playlist-info p { font-size: 12px; color: var(--text-dim); }
        .btn-play-pl { background: white; color: black; height: 38px; padding: 0 20px; border-radius: 20px; font-weight: 800; text-decoration: none; font-size: 12px; text-transform: uppercase; border: none; cursor: pointer; }

        /* PLAYER DA PLAYLIST (COM IMAGEM E DESIGN PREMIUM CORRIGIDO) */
        #player-pl {
            position: fixed; bottom: 15px; left: 15px; right: 15px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 15px;
            border-radius: 15px;
            display: none;
            align-items: center;
            gap: 15px;
            z-index: 2000;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .pl-p-img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; } /* Adicionado */
        .pl-info-playing { flex: 1; overflow: hidden; }
        #p-name { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #pl-context { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; }
        #next-btn { font-size: 24px; color: #fff; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-voltar"><i class="fa fa-arrow-left"></i></a>
        <h2>Minhas Playlists</h2>
    </header>

    <div class="create-area">
        <span class="label-neon">1. Nome e Seleção das Músicas:</span>
        <div class="input-group">
            <input type="text" id="pl-name" placeholder="Ex: Treino Pesado">
            <button class="btn-ready" onclick="savePlaylist()">PRONTO</button>
        </div>
        <div id="selector" class="selector-list"></div>
    </div>

    <div class="saved-section">
        <span class="label-neon">Suas Criações:</span>
        <div id="pl-list"></div>
    </div>

    <div id="player-pl">
        <img id="pl-p-img" src="" class="pl-p-img"> <div class="pl-info-playing">
            <h5 id="p-name">Música</h5>
            <small id="pl-context"></small>
        </div>
        <i class="fa fa-step-forward" id="next-btn"></i>
        <audio id="audio-pl"></audio>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allTracks = [];
        let currentQueue = [];
        let currentIndex = 0;
        const audio = document.getElementById('audio-pl');

        async function init() {
            const snap = await getDocs(collection(db, "musics"));
            allTracks = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            // Renderiza lista de seleção ALINHADA (CORREÇÃO DE TEXTO VAZANDO)
            document.getElementById('selector').innerHTML = allTracks.map(m => `
                <div class="select-card">
                    <input type="checkbox" value="${m.id}" class="m-check">
                    <span class="song-name">${m.title}</span>
                </div>
            `).join('');
            loadPlaylists();
        }

        window.savePlaylist = () => {
            const name = document.getElementById('pl-name').value;
            const selected = Array.from(document.querySelectorAll('.m-check:checked')).map(c => c.value);
            if(!name || selected.length === 0) return alert("Preencha tudo!");

            const storage = JSON.parse(localStorage.getItem('zyver_final_pls') || '[]');
            storage.push({ name, tracks: selected });
            localStorage.setItem('zyver_final_pls', JSON.stringify(storage));
            location.reload();
        };

        function loadPlaylists() {
            const storage = JSON.parse(localStorage.getItem('zyver_final_pls') || '[]');
            document.getElementById('pl-list').innerHTML = storage.map((pl, idx) => `
                <div class="pl-card">
                    <div class="playlist-info"><h3>${pl.name}</h3><p>${pl.tracks.length} músicas</p></div>
                    <button class="btn-play-pl" onclick="playPL(${idx})">OUVIR</button>
                </div>
            `).join('');
        }

        window.playPL = (idx) => {
            const pl = JSON.parse(localStorage.getItem('zyver_final_pls') || '[]')[idx];
            currentQueue = allTracks.filter(m => pl.tracks.includes(m.id));
            currentIndex = 0;
            if(currentQueue.length > 0) {
                tocarMusica();
                document.getElementById('player-pl').style.display = 'flex';
                document.getElementById('pl-context').innerText = "Playlist: " + pl.name;
            }
        };

        function tocarMusica() {
            const m = currentQueue[currentIndex];
            document.getElementById('p-name').innerText = m.title;
            
            // CORREÇÃO: ADICIONA A IMAGEM DA MÚSICA AO PLAYER DA PLAYLIST
            document.getElementById('pl-p-img').src = m.cover;
            
            audio.src = m.url;
            audio.play();
        }

        document.getElementById('next-btn').onclick = () => {
            currentIndex = (currentIndex + 1) % currentQueue.length;
            tocarMusica();
        };

        init();
    </script>
</body>
</html>
