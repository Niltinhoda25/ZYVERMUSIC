<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZyverMusic | Criar Playlist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #9d4edd; --bg: #050505; --surface: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 120px; }
        
        /* HEADER COM VOLTAR */
        header { padding: 20px; display: flex; align-items: center; gap: 15px; background: #111; border-bottom: 1px solid #222; }
        .btn-back { color: white; font-size: 24px; text-decoration: none; }
        header h2 { font-size: 20px; font-weight: 800; }

        /* ÁREA DE CRIAÇÃO CORRIGIDA */
        .create-area { padding: 20px; }
        .label-neon { color: #ff7a00; font-size: 11px; font-weight: 900; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input#pl-name { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 18px; color: white; border-radius: 12px; outline: none; font-size: 14px; }
        .btn-ready { background: var(--accent); border: none; padding: 0 20px; border-radius: 12px; color: white; font-weight: 900; font-size: 12px; cursor: pointer; }

        /* LISTA DE SELEÇÃO ALINHADA (O CORAÇÃO DO BUG) */
        .selector-list { display: flex; flex-direction: column; gap: 8px; max-height: 320px; overflow-y: auto; padding-right: 5px; }
        .select-card { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            background: #161616; 
            border-radius: 12px; 
            border: 1px solid transparent;
            width: 100%;
        }
        .select-card input[type="checkbox"] { 
            width: 20px; height: 20px; 
            accent-color: var(--accent); 
            margin-right: 15px; /* Espaço fixo após o check */
            flex-shrink: 0;
        }
        .select-card .song-name { 
            font-size: 14px; 
            font-weight: 600; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            flex: 1; /* Faz o texto ocupar o resto do espaço alinhado */
        }
        .select-card:has(input:checked) { border-color: var(--accent); background: #1e122a; }

        /* SEÇÃO DE PLAYLISTS SALVAS */
        .saved-section { padding: 20px; }
        .pl-card { 
            background: var(--surface); 
            padding: 18px; 
            border-radius: 15px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #222; 
        }
        .pl-info h3 { font-size: 17px; margin-bottom: 4px; }
        .pl-info p { font-size: 12px; color: #777; }
        
        .pl-actions { display: flex; gap: 10px; align-items: center; }
        .btn-share { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 12px; border-radius: 10px; font-size: 14px; }
        .btn-play { background: white; color: black; border: none; padding: 10px 18px; border-radius: 10px; font-weight: 800; font-size: 12px; }

        /* PLAYER DA PLAYLIST */
        #player-pl { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(25,25,25,0.98); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; display: none; align-items: center; gap: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-back"><i class="fa fa-arrow-left"></i></a>
        <h2>Minhas Playlists</h2>
    </header>

    <div class="create-area">
        <span class="label-neon">1. NOME E SELEÇÃO:</span>
        <div class="input-group">
            <input type="text" id="pl-name" placeholder="Nome da Playlist...">
            <button class="btn-ready" onclick="savePlaylist()">PRONTO</button>
        </div>
        <div id="selector" class="selector-list"></div>
    </div>

    <div class="saved-section">
        <span class="label-neon">SUAS CRIAÇÕES:</span>
        <div id="pl-list"></div>
    </div>

    <div id="player-pl">
        <div style="flex:1; overflow:hidden;">
            <h5 id="p-name" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">Música</h5>
            <small id="pl-context" style="color:var(--accent); font-weight:bold;"></small>
        </div>
        <i class="fa fa-step-forward" id="next-btn" style="font-size: 22px; cursor:pointer;"></i>
        <audio id="audio-pl"></audio>
    </div>

    <script type="module">
        import { db } from "./firebase-config.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let allTracks = [];
        let currentQueue = [];
        let currentIndex = 0;
        const audio = document.getElementById('audio-pl');

        async function init() {
            const snap = await getDocs(collection(db, "musics"));
            allTracks = snap.docs.map(d => ({id: d.id, ...d.data()}));
            
            // Renderiza lista de seleção ALINHADA
            document.getElementById('selector').innerHTML = allTracks.map(m => `
                <div class="select-card">
                    <input type="checkbox" value="${m.id}" class="m-check">
                    <span class="song-name">${m.title}</span>
                </div>
            `).join('');
            loadPlaylists();
        }

        window.savePlaylist = () => {
            const name = document.getElementById('pl-name').value;
            const selected = Array.from(document.querySelectorAll('.m-check:checked')).map(c => c.value);
            if(!name || selected.length === 0) return alert("Dê um nome e selecione as músicas!");

            const storage = JSON.parse(localStorage.getItem('zyver_v2_pls') || '[]');
            storage.push({ id: Date.now(), name, tracks: selected });
            localStorage.setItem('zyver_v2_pls', JSON.stringify(storage));
            location.reload();
        };

        function loadPlaylists() {
            const storage = JSON.parse(localStorage.getItem('zyver_v2_pls') || '[]');
            document.getElementById('pl-list').innerHTML = storage.map((pl, idx) => `
                <div class="pl-card">
                    <div class="pl-info">
                        <h3>${pl.name}</h3>
                        <p>${pl.tracks.length} músicas</p>
                    </div>
                    <div class="pl-actions">
                        <button class="btn-share" onclick="compartilharPlaylist('${pl.name}', ${pl.tracks.length})">
                            <i class="fa fa-share-nodes"></i>
                        </button>
                        <button class="btn-play" onclick="playPL(${idx})">OUVIR</button>
                    </div>
                </div>
            `).join('');
        }

        // FUNÇÃO DE COMPARTILHAR
        window.compartilharPlaylist = (nome, total) => {
            const texto = `🔥 Ouça minha playlist "${nome}" no ZyverMusic! Tem ${total} músicas pesadas.`;
            if (navigator.share) {
                navigator.share({ title: 'ZyverMusic', text: texto, url: window.location.href });
            } else {
                alert("Texto copiado: " + texto);
            }
        };

        window.playPL = (idx) => {
            const pl = JSON.parse(localStorage.getItem('zyver_v2_pls') || '[]')[idx];
            currentQueue = allTracks.filter(m => pl.tracks.includes(m.id));
            currentIndex = 0;
            if(currentQueue.length > 0) {
                tocarMusica();
                document.getElementById('player-pl').style.display = 'flex';
                document.getElementById('pl-context').innerText = "Playlist: " + pl.name;
            }
        };

        function tocarMusica() {
            const m = currentQueue[currentIndex];
            document.getElementById('p-name').innerText = m.title;
            audio.src = m.url;
            audio.play();
        }

        document.getElementById('next-btn').onclick = () => {
            currentIndex = (currentIndex + 1) % currentQueue.length;
            tocarMusica();
        };

        init();
    </script>
</body>
</html>
